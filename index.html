<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CI Posts">
  <title>CI Threads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #6b8e7f;
      --primary-light: #e8f0ec;
      --accent: #c4956a;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --success: #4caf50;
      --danger: #ef5350;
      --warn: #ff9800;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    .header {
      padding: 14px 20px 12px;
      padding-top: calc(14px + env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-week { font-size: 11px; color: var(--accent); font-weight: 600;
      background: #fff3e0; padding: 3px 9px; border-radius: 12px; }

    /* Content */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    /* Tab bar */
    .tab-bar {
      display: flex; background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 10px 0; border: none; background: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-family: inherit;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-icon { font-size: 21px; position: relative; display: inline-block; }
    .badge {
      position: absolute; top: -3px; right: -8px;
      background: var(--accent); color: white;
      font-size: 9px; font-weight: 700; min-width: 15px; height: 15px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
    }

    /* Section header */
    .section-header {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; margin-top: 4px;
    }

    /* New batch banner */
    .batch-banner {
      background: linear-gradient(135deg, var(--primary), #4a7a6b);
      color: white; border-radius: 14px; padding: 16px 18px;
      margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
    }
    .batch-banner-icon { font-size: 28px; }
    .batch-banner-text h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .batch-banner-text p { font-size: 12px; opacity: 0.85; line-height: 1.4; }
    .btn-load-batch {
      margin-top: 10px; width: 100%; padding: 10px; background: rgba(255,255,255,0.2);
      color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    /* Review cards */
    .card {
      background: var(--surface); border-radius: 18px; padding: 20px;
      margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border);
      transition: transform 0.28s ease, opacity 0.28s ease;
    }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .chip {
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
    }
    .chip-confidence { background: #fff3e0; color: var(--accent); }
    .card-body {
      font-size: 15px; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .card-reply {
      margin-top: 12px; padding: 10px 14px;
      background: var(--bg); border-radius: 10px; border-left: 3px solid var(--primary);
    }
    .reply-label {
      font-size: 9px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
    }
    .reply-text { font-size: 13px; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }
    .card-tag { margin-top: 9px; font-size: 12px; color: var(--accent); font-weight: 500; }
    .card-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn { flex: 1; padding: 13px; border-radius: 12px; border: none;
      font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; }
    .btn:active { opacity: 0.82; transform: scale(0.98); }
    .btn-approve { background: var(--success); color: white; }
    .btn-skip { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-skip:active { background: #fde; }

    /* Stock cards */
    .stock-card {
      background: var(--surface); border-radius: 16px; padding: 17px;
      margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .stock-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .posted-chip { background: #e3f2fd; color: #1976d2; }
    .stock-body {
      font-size: 14px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word; margin-bottom: 10px;
    }
    .stock-reply {
      padding: 9px 12px; background: var(--bg); border-radius: 9px;
      border-left: 2px solid var(--primary); margin-bottom: 12px;
    }
    .stock-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn-sm {
      padding: 9px 14px; border-radius: 10px; border: none;
      font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer;
    }
    .btn-copy-main { background: var(--primary); color: white; flex: 1; }
    .btn-copy-main.copied { background: var(--success); }
    .btn-copy-reply { background: var(--primary-light); color: var(--primary); }
    .btn-posted { background: #e3f2fd; color: #1976d2; }
    .btn-del { background: none; color: var(--muted); border: 1px solid var(--border); }

    /* Performance tracker */
    .perf-row {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .perf-btn {
      flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 12px; font-family: inherit; cursor: pointer; background: var(--bg);
      text-align: center;
    }
    .perf-btn.active-buzz { background: #fff3cd; border-color: #ff9800; }
    .perf-btn.active-ok { background: #e8f5e9; border-color: #4caf50; }
    .perf-btn.active-miss { background: #fce4ec; border-color: #e91e63; }

    /* History view */
    .history-card {
      background: var(--surface); border-radius: 14px; padding: 15px;
      margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .history-body { font-size: 13px; color: var(--text); white-space: pre-wrap;
      word-break: break-word; line-height: 1.65; margin-bottom: 8px; }
    .history-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .result-pill {
      font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px;
    }
    .result-buzz { background: #fff3cd; color: #e65100; }
    .result-ok { background: #e8f5e9; color: #2e7d32; }
    .result-miss { background: #fce4ec; color: #880e4f; }

    /* Generate view */
    .gen-card { background: var(--surface); border-radius: 16px; padding: 20px;
      margin-bottom: 14px; box-shadow: var(--shadow); }
    .gen-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .gen-card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .btn-gen-main {
      width: 100%; padding: 15px; background: var(--primary); color: white;
      border: none; border-radius: 13px; font-size: 16px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }
    .btn-gen-main:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Empty state */
    .empty { text-align: center; padding: 56px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(76px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1a1a1a; color: white; padding: 10px 20px;
      border-radius: 22px; font-size: 13px; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Separator */
    .sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Research view - quick collect form */
    .form-row { margin-bottom: 12px; }
    .form-row-3 { display: flex; gap: 8px; }
    .form-row-3 > div { flex: 1; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .form-input {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); font-size: 14px; font-family: inherit; color: var(--text);
    }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    /* Tag filter chips */
    .chip-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip-filter {
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px;
      background: var(--surface); color: var(--muted); border: 1px solid var(--border);
      font-family: inherit; cursor: pointer;
    }
    .chip-filter.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Buzz library cards */
    .buzz-card {
      background: var(--surface); border-radius: 16px; padding: 17px;
      margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .buzz-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .buzz-body {
      font-size: 14px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word; margin-bottom: 6px;
    }
    .buzz-body.clamp {
      display: -webkit-box; -webkit-line-clamp: 8; -webkit-box-orient: vertical; overflow: hidden;
    }
    .buzz-expand { font-size: 12px; color: var(--primary); font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .buzz-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .buzz-why { font-size: 12px; color: var(--muted); background: var(--bg); padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; line-height: 1.6; }
    .buzz-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .buzz-link {
      text-decoration: none; display: inline-flex; align-items: center;
    }

    /* Dashboard bars */
    .dash-row { margin-bottom: 10px; }
    .dash-row-label { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; margin-bottom: 4px; }
    .dash-bar-track { background: var(--bg); border-radius: 6px; height: 8px; overflow: hidden; }
    .dash-bar-fill { background: var(--primary); height: 100%; border-radius: 6px; }
    .dash-subhead { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.6px; margin: 14px 0 8px; }
    .dash-subhead:first-child { margin-top: 0; }
    .dash-empty { font-size: 12px; color: var(--muted); line-height: 1.7; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">CI Threads</div>
      <div class="header-sub">クリスタルインセンス 投稿ストック</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-week" id="header-week"></div>
      <button onclick="hardReload()" style="background:var(--primary-light);border:none;color:var(--primary);font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;" title="最新版に更新">🔄</button>
    </div>
  </div>

  <div class="content">
    <!-- レビュー -->
    <div id="view-review" class="view active">
      <div id="batch-banner-area"></div>
      <div class="section-header" id="review-section-header"></div>
      <div id="review-list"></div>
    </div>

    <!-- ストック -->
    <div id="view-stock" class="view">
      <div class="section-header" id="stock-section-header"></div>
      <div id="stock-list"></div>
    </div>

    <!-- 実績 -->
    <div id="view-history" class="view">
      <div class="section-header">投稿済み・反応記録</div>
      <div id="history-list"></div>
    </div>

    <!-- 情報 -->
    <div id="view-generate" class="view">
      <div class="gen-card">
        <h3>🔄 週次自動更新</h3>
        <p>毎週月曜朝5時にClaudeが最新のThreadsトレンドを調べて投稿案を自動追加します。Macの電源オフでも動きます。</p>
        <button class="btn-gen-main" onclick="hardReload()">🔄 今すぐ最新版に更新</button>
        <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center;">新しいバッチがある場合、レビュータブにバナーが出ます</p>
      </div>
      <div class="gen-card">
        <h3>📊 統計</h3>
        <div style="font-size:13px;color:var(--muted);line-height:2;">
          最終更新: <span id="last-batch-date">—</span><br>
          累計生成: <span id="total-generated">0</span>投稿 ／
          承認済: <span id="total-approved">0</span>投稿 ／
          投稿済: <span id="total-posted">0</span>投稿
        </div>
      </div>
    </div>

    <!-- 研究 -->
    <div id="view-research" class="view">
      <div class="section-header">🔍 国産バズ・リサーチ</div>

      <!-- a) クイック収集フォーム -->
      <div class="gen-card">
        <h3>📥 バズ投稿をクイック収集</h3>
        <p>Threadsで見つけた「#国産」系のバズ投稿をコピペで登録します。</p>
        <div class="form-row">
          <label class="form-label">投稿URL（任意）</label>
          <input type="text" id="bz-url" class="form-input" placeholder="https://www.threads.net/...">
        </div>
        <div class="form-row">
          <label class="form-label">投稿本文 *</label>
          <textarea id="bz-body" class="form-input form-textarea" placeholder="投稿本文をペースト" rows="4"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">投稿者（任意）</label>
          <input type="text" id="bz-author" class="form-input" placeholder="@なしでもOK">
        </div>
        <div class="form-row">
          <label class="form-label">タグ</label>
          <select id="bz-tag" class="form-input">
            <option value="国産">#国産</option>
            <option value="国産を守ろう">#国産を守ろう</option>
            <option value="国産を選ぼう">#国産を選ぼう</option>
            <option value="国産メーカー品">#国産メーカー品</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row form-row-3">
          <div>
            <label class="form-label">❤️ いいね</label>
            <input type="number" id="bz-likes" class="form-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div>
            <label class="form-label">💬 リプ</label>
            <input type="number" id="bz-replies" class="form-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div>
            <label class="form-label">🔁 リポスト</label>
            <input type="number" id="bz-reposts" class="form-input" placeholder="0" min="0" inputmode="numeric">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">フック型</label>
          <select id="bz-hook" class="form-input">
            <option value="意外性">意外性</option>
            <option value="問いかけ">問いかけ</option>
            <option value="数字×メリット">数字×メリット</option>
            <option value="否定形・損失回避">否定形・損失回避</option>
            <option value="逆説">逆説</option>
            <option value="告白">告白</option>
            <option value="結論先出し">結論先出し</option>
            <option value="ストーリー">ストーリー</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">なぜバズったか一言メモ（任意）</label>
          <input type="text" id="bz-why" class="form-input" placeholder="例: 数字が具体的で信頼感がある">
        </div>
        <button class="btn-gen-main" onclick="saveBuzzPost()">💾 ライブラリに保存</button>
      </div>

      <!-- b) ライブラリ一覧 -->
      <div class="section-header" id="buzz-section-header">ライブラリ</div>
      <div class="chip-filter-row" id="buzz-tag-filter"></div>
      <div id="buzz-list"></div>

      <!-- c) 傾向ダッシュボード -->
      <div class="section-header">📈 傾向ダッシュボード</div>
      <div class="gen-card">
        <h3>ライブラリの傾向</h3>
        <div id="buzz-dashboard-lib"></div>
      </div>
      <div class="gen-card">
        <h3>自社投稿の傾向</h3>
        <div id="buzz-dashboard-own"></div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('review',this)">
      <div class="tab-icon">📥<span class="badge" id="b-review" style="display:none"></span></div>
      <span>レビュー</span>
    </button>
    <button class="tab-btn" onclick="switchTab('stock',this)">
      <div class="tab-icon">✅<span class="badge" id="b-stock" style="display:none"></span></div>
      <span>ストック</span>
    </button>
    <button class="tab-btn" onclick="switchTab('history',this)">
      <div class="tab-icon">📊<span class="badge" id="b-history" style="display:none"></span></div>
      <span>実績</span>
    </button>
    <button class="tab-btn" onclick="switchTab('generate',this)">
      <div class="tab-icon">📋</div>
      <span>情報</span>
    </button>
    <button class="tab-btn" onclick="switchTab('research',this)">
      <div class="tab-icon">🔍</div>
      <span>研究</span>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 【週次投稿バッチ】← Claudeが毎週ここを更新します
// batchId: "YYYY-WNN" 形式 (重複チェックに使用)
// ============================================================
const WEEKLY_BATCHES = [
  {
    "batchId": "2026-W30-buzz",
    "generatedAt": "2026-07-22",
    "note": "🔥国産バズ研究ドラフト（覚悟店クラスター傾向）",
    "posts": [
      {
        "id": "2026-W30-buzz-001",

        "reply": "香司の柴垣です。夜、仕事の手を止めて一本灯すと、頭の中の音がすっと静かになる。効能の話じゃなくて、ただの区切りなんです。よかったら、あなたの『一日の終わりの合図』も教えてください。",
        "tag": "#お香のある暮らし",
        "cta": false,
        "confidence": 78
      },
      {
        "id": "2026-W30-buzz-002",
        "pattern": "②意外な数字ゼロ型",
        "theme": "椨粉の入荷ゼロ（海外0人でしたの応用）",
        "body": "今日、椨（たぶ）の粉が一グラムも入荷しませんでした。\nお香の、主原料です。\n国産の椨を挽ける職人さんは、もう二人。\nその方が体調を崩せば、日本のお香づくりは静かに止まります。\nこれが『国産』の、ほんとうの距離感です",
        "reply": "煽るつもりはないんです。ただ、蛇口をひねれば水が出るみたいに、当たり前に国産の香りがあると思っていた自分に、時々ヒヤッとする。知ってもらうことからしか、残せないので。",
        "tag": "#国産を守ろう",
        "cta": false,
        "confidence": 82
      },
      {
        "id": "2026-W30-buzz-003",

":"効率化できないものがある。\n\n水の量は季節で変わる。\n雨が多ければ速く、少なければ遅い。\n\n自然任せの製造は、工程管理が難しい。\nそれでも「その季節の粉」になる。\n\n自然のペースに合わせて動いた経験はありますか？","tag":"#静けさ","confidence":87},{"id":"2026-W28-015","pattern":"⑤未完ストーリー型","theme":"三代目が継いだ朝","body":"三代目は、継ぐつもりがなかった。\n\n東京で会社員をして、\n30代で地元に戻った。\n\n最初の一年、ほとんど何も作れなかった。\n父の仕事を見ていただけだった。\n\nその二年目の夏に、何かが変わった。","reply":"「何が変わったんですか」と聞いた。\n\n「朝の空気が、違って見えた」\n\nそれだけだった。\n\n理由じゃなくて、感覚で動いている人は、\nなぜか長く続く。\n\n転機の瞬間、誰かに話せますか？","tag":"#受け継ぐ","confidence":91},{"id":"2026-W28-016","pattern":"⑤未完ストーリー型","theme":"梅雨の最後の日に決めたこと","body":"梅雨の最後の日、工場が止まった。\n\n湿度が高すぎて、\n粉が固まってしまった。\n\nその日の夜、3代続く職人は\nひとりで作業場に残っていた。\n\n翌朝、何かが変わっていた。","reply":"「一晩で何をしたんですか」と聞いた。\n\n「窓を全部開けて、\n空気を入れ替えた。それだけ」\n\n対処じゃなくて、受け入れることを\n選んだ夜だったと思う。\n\nうまくいかない日、どうやって次の朝を迎えますか？","tag":"#手仕事","confidence":89},{"id":"2026-W28-017","pattern":"⑤未完ストーリー型","theme":"初めてお香を焚いた夜の話","body":"初めてお香を焚いたのは、\n祖父の家だった。\n\n子どもの頃、あの部屋の匂いが怖かった。\n\nずっと苦手だと思っていた。\n\n30歳を過ぎた夏の夜、\nふと焚いてみた。","reply":"「怖い」は「知らない」のことだった。\n\n香りは変わっていなかった。\n自分が変わっていた。\n\n祖父の家の匂いが、\nあの夜はじめて「懐かしい」に変わった。\n\n子どもの頃苦手だったのに、\n今は好きになったものはありますか？","tag":"#余韻","confidence":90},{"id":"2026-W28-018","pattern":"⑥専門家裏側型","theme":"夏の原料管理で一番気を使うこと","body":"夏の原料管理で一番大変なのは、\n湿度じゃない。\n\n温度差だ。\n\n朝と夜で10度近く変わる日に、\n天然素材は敏感に反応する。","reply":"温度が上がると、樹脂成分が溶け出す。\n下がると、固まって配合しにくくなる。\n\nだから夏の作業は、朝が早い。\n気温が上がる前の2〜3時間が勝負だ。\n\n仕事で「時間帯」にこだわっていることはありますか？","tag":"#手仕事","confidence":87},{"id":"2026-W28-019","pattern":"⑥専門家裏側型","theme":"自然栽培と農薬栽培の椨粉の違い","body":"自然栽培の椨粉と、\n農薬を使ったものを焚き比べると、\n最初の5分で違いがわかる。\n\n後者は、煙が少しきつい。\n前者は、するっと広がる。\n\n目には見えない違いが、\n鼻にはわかる。","reply":"農薬は残留する。\n\n微量でも、燃やしたときに\n成分が気化する可能性がある。\n\n「無農薬」は安全のためだけじゃなく、\n香りのためでもある。\n\n食材以外で「産地や製法」を気にしたことはありますか？","tag":"#素材","confidence":88},{"id":"2026-W28-020","pattern":"⑥専門家裏側型","theme":"配合の比率を変えてはいけない理由","body":"配合の比率は、気分で変えない。\n\n「少し多めにしたほうがいい気がした」\nは、禁止だ。\n\n素材同士のバランスが崩れると、\n焚いたときに全体が変わる。","reply":"天然素材は、混ぜた瞬間から反応が始まる。\n\n比率が1割変わると、\n3ヶ月後に香りが別物になっていることがある。\n\n「感覚」より「記録」を信じるのが、\n長く続けた職人の答えだ。\n\n仕事で「データより感覚」を優先した経験はありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W28-021","pattern":"⑥専門家裏側型","theme":"屋久杉の倒木を選ぶ目","body":"屋久杉の倒木は、すべて使えるわけじゃない。\n\n倒れてから何年経っているか、\n腐朽の度合い、\n樹脂の濃さ。\n\nそれを見極める目を\n持っている人が、日本に少ない。","reply":"良い屋久杉は、\n手で触れると脂っぽい。\n\n古い木の香りが、\n鼻の奥に残る。\n\nその感覚を言葉にできる人に\n会ったとき、同業でも驚いた。\n\n「言葉にできないけど分かる」感覚、何かありますか？","tag":"#素材","confidence":89},{"id":"2026-W28-022","pattern":"⑦デジタルデトックス型","theme":"スマホを置いて煙だけを見た夜","body":"昨夜、スマホを置いた。\n\nお香を一本焚いて、\nただ煙を見ていた。\n\n30分、何も触らなかった。\n\nそれだけで、頭がちがった。","reply":"「画面を見ない」ではなく\n「煙を見る」に変えると、続く。\n\n何かをやめるより、\n別のものを見るほうが簡単だ。\n\n煙は動いているから、飽きない。\n\n最後にスクロールせずに30分過ごしたのはいつ？","tag":"#暮らし","confidence":88},{"id":"2026-W28-023","pattern":"⑦デジタルデトックス型","theme":"通知のない1時間をつくる方法","body":"通知を全部切って、\nお香を一本焚く。\n\nそれだけで、\n「自分の時間」になる。\n\n特別な場所も、\n特別な準備も、いらない。","reply":"デジタルデトックスを「旅行でやる」ではなく\n「今夜の30分でやる」に変えると、\n毎日できる。\n\nお香は着火に3秒。\n後は何もしなくていい。\n\n「自分の時間」を意識して作れていますか？","tag":"#整える","confidence":87},{"id":"2026-W28-024","pattern":"⑦デジタルデトックス型","theme":"夏の夜の手放し方","body":"夏の夜は、つい長くなる。\n\nSNS、動画、ニュース。\n\n気づいたら深夜1時。\n\nお香一本で、その夜を終わらせる。","reply":"終わりを決めるのが難しい夜に、\n「お香が燃え尽きたら寝る」は有効だ。\n\n自分で決めるより、\n外の力に委ねるほうが楽なときがある。\n\n夜の終わり方、何かルーティンにしていますか？","tag":"#整える","confidence":86},{"id":"2026-W28-025","pattern":"⑧素材の叫び型","theme":"椨粉の独白","body":"私は福岡の土に育った。\n\n農薬を知らない。\n化学肥料を知らない。\n\n雨の量、虫の数、\n風の向きで、毎年少し変わる。\n\nそれが私だ。","reply":"同じ名前の素材でも、\n産地と栽培方法が違えば別物になる。\n\n「椨粉」と書いてあれば同じではない。\n\n私たちが選ぶのは、\n名前ではなく、その土の話だ。\n\n素材の産地を意識して選んでいますか？","tag":"#素材","confidence":88},{"id":"2026-W28-026","pattern":"⑧素材の叫び型","theme":"屋久杉の独白","body":"私は、何百年もかけて育った。\n\n台風に揺れた。\n土砂崩れに埋まった。\n\n倒れたあとも、\n土に返るまで香っていた。\n\nそれを、人が使う。","reply":"屋久杉は、伐採できない。\n\n倒れた木、枯れた木だけが使える。\n\n何百年生きた木の香りを\n「煙にする」という選択は、\n軽くない。\n\n長い時間をかけて作られたものを\n使うとき、何を感じますか？","tag":"#素材","confidence":91},{"id":"2026-W28-027","pattern":"⑧素材の叫び型","theme":"水車の石の独白","body":"私は止まらない。\n\n水が来れば回る。\n水が止まれば止まる。\n\n意志はない。\nでも、ここで何十年も粉を挽いてきた。\n\nそれだけが、私のすることだ。","reply":"道具には意志がない。\n\nでも使い続けられた道具には、\nそれだけの理由がある。\n\n「便利だから」ではなく\n「この道具でないと出せない質がある」\nだから使い続ける。\n\n長く使い続けている道具、何かありますか？","tag":"#手仕事","confidence":87},{"id":"2026-W28-028","pattern":"⑧素材の叫び型","theme":"夏の空気の独白","body":"梅雨が明けて、私は乾いた。\n\n熱を持って、\n光を反射して、\nどこにでもいる。\n\n煙が私の中を通るとき、\n少しだけ、香りになる。","reply":"空気が変わると、香りが変わる。\n\n梅雨の湿った空気と、\n梅雨明けの乾いた空気では、\n同じお香でも広がり方が違う。\n\n季節の変わり目に同じお香を焚くと、\nそれがわかる。\n\n季節の「においの変化」に気づいたことはありますか？","tag":"#暮らし","confidence":85},{"id":"2026-W28-029","pattern":"⑨リプ完結型","theme":"夏の夜にお香を焚く理由","body":"夏の夜にお香を焚く人に、\n聞いてみたい。\n\nなぜ夜なんですか？\n\n朝でも昼でもなく、夜に焚く理由が\nあるとしたら、何ですか？","reply":"私の場合は「終わりの合図」だ。\n\n一本焚き終わったら、\nその日が終わる。\n\n意識的に終わらせることが、\n次の日の始まりになっている。\n\n夜のお香、どんな意味がありますか？","tag":"#暮らし","confidence":89},{"id":"2026-W28-030","pattern":"⑨リプ完結型","theme":"お香の煙を見ていて気づいたこと","body":"煙を長く見ていると、\n何か気づくことがある。\n\nあなたは、煙を見ていて\n何を考えましたか？\n\nどんな答えでも、聞かせてほしい。","reply":"私が気づいたのは、\n「煙は同じ動きをしない」ということだ。\n\n毎日焚いても、\n毎日違う。\n\nそれを見ていると、\n「今日も一日、違った」と思えるようになった。\n\n煙を見て気づいたこと、あれば教えてください。","tag":"#静けさ","confidence":87},{"id":"2026-W28-031","pattern":"⑨リプ完結型","theme":"お香を誰かに勧めたことはあるか","body":"お香を、誰かに勧めたことはありますか？\n\n家族でも、友人でも、\nSNSの投稿でも。\n\nどんな言葉で伝えましたか？","reply":"私は「うまく説明できない」といつも言う。\n\n香りは、言葉より前に届く。\n\nだから結局「一度焚いてみて」に\nなってしまう。\n\nお香を誰かに勧めた経験、あれば教えてください。","tag":"#暮らし","confidence":85},{"id":"2026-W28-032","pattern":"⑩二択型","theme":"夏のお香は朝か夜か","body":"夏のお香は、\nどっちで焚きますか？\n\nA：朝、目覚めの一本\nB：夜、寝る前の一本\n\nコメントで教えてください。","reply":"朝派は「1日のスイッチ」として使う人が多い。\n\n夜派は「終わりの合図」として使う人が多い。\n\n面白いのは、\n朝派も夜派も「習慣化している」点が共通している。\n\nどちらがより「整う」感覚がありますか？","tag":"#暮らし","confidence":92},{"id":"2026-W28-033","pattern":"⑩二択型","theme":"窓を開けて焚くか閉めて焚くか","body":"お香を焚くとき、どうしますか？\n\nA：窓を開けて、煙を外へ逃がしながら\nB：窓を閉めて、部屋に香りを留めながら\n\nどちら派ですか？","reply":"A派は「煙が流れる動きを楽しむ」傾向がある。\n\nB派は「部屋に香りを溜める」を目的にしている。\n\n夏は窓を開けがちだけど、\n香りの濃さが全然違う。\n\nどちらがより好きですか？","tag":"#暮らし","confidence":91},{"id":"2026-W28-034","pattern":"⑩二択型","theme":"梅雨明けの気分は解放感か物寂しさか","body":"梅雨が明けたとき、\nどちらの気持ちに近いですか？\n\nA：やっと！解放感がある\nB：なんとなく、少し寂しい\n\n正直な気分を教えてください。","reply":"B派が意外と多い。\n\n梅雨の閉じた感じが、\n落ち着くという人もいる。\n\n雨の音、薄暗さ、どこにも行けない感じ。\n\nそういう季節が好きな人は、\nお香も好きなことが多い気がする。\n\nどちらでしたか？","tag":"#暦","confidence":90},{"id":"2026-W28-035","pattern":"⑩二択型","theme":"夏の香りの好みは清涼か土の温かさか","body":"夏に焚くお香、どちらが好きですか？\n\nA：涼しげな、すっきりした香り\nB：深みのある、土っぽい香り\n\n季節で変わる人も、コメント歓迎です。","reply":"夏の朝はAが合う人が多い。\n\n夜はBが合う、という声も多かった。\n\n暑いからこそ、深みのある香りが\n「落ち着き」を作るのかもしれない。\n\n今の季節、どちらの気分ですか？","tag":"#素材","confidence":89},{"id":"2026-W28-036","pattern":"⑪失敗学び型","theme":"夏に素材を台無しにした話","body":"一度、夏に在庫を全滅させた。\n\n保管温度の設定ミスで、\n樹脂成分が溶け出してしまった。\n\nお香の原料ではなく、\nただの塊になった。","reply":"温度管理は1度の違いで変わる。\n\nそれを知ったのは、失ってからだった。\n\n今は温湿度計を3箇所に置いている。\n\n「失ってから分かった」ことは、\n感覚じゃなく数字にしておくことだと学んだ。\n\n失敗から生まれた習慣はありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W28-037","pattern":"⑪失敗学び型","theme":"配合を感覚でやって全部やり直した話","body":"「このくらいでいい」と思って配合したら、\n全部やり直しになった。\n\n天然素材は、\n「このくらい」が一番怖い。","reply":"1ヶ月後に焚いてみたら、\n全然違う香りになっていた。\n\n感覚で変えた0.5gが、\n全体のバランスを崩していた。\n\nその日から記録をつけるようにした。\n\n「記録」が仕事を変えた経験はありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W28-038","pattern":"⑪失敗学び型","theme":"乾燥期間を短縮して失敗した話","body":"急いで乾燥を短縮したら、\n仕上がりが全部くずれた。\n\n締め切りに間に合わせたくて、\n「少しくらい大丈夫」を選んだ。\n\n大丈夫じゃなかった。","reply":"天然素材のお香に、\nショートカットはほぼ存在しない。\n\n乾燥、熟成、配合のバランス。\nどれも「時間」が素材を変える。\n\n急ぎたい気持ちと、\n素材の都合は、いつもずれている。\n\n仕事で「時間が解決する」を\n経験したことはありますか？","tag":"#手仕事","confidence":84},{"id":"2026-W28-039","pattern":"⑫暦型","theme":"七夕とお香","body":"七夕。\n\n短冊に書く習慣は、\n「香りで願う」より古い。\n\n日本では、香りで神様を呼んだ。\n煙が、天に届くと思われていた。\n\n今年の七夕に、一本焚いた。","reply":"短冊は燃やすことで天に届く、\nという地域もある。\n\n煙と願いは、古くから一緒だった。\n\n七夕の夜に焚くお香は、\n「届ける」気持ちになる。\n\n今年の七夕、何か願いましたか？","tag":"#暦","confidence":93},{"id":"2026-W28-040","pattern":"⑫暦型","theme":"梅雨明けの暦","body":"暦の上では「小暑」を過ぎた。\n\n梅雨明けが宣言される頃、\nお香の売れ方が変わる。\n\n夏の香りに、人は気分を変える。\n季節が変われば、暮らしも変わる。","reply":"「小暑」は、暑さが本格化する前の節気だ。\n\nこの頃から梅雨明けまでの数日間、\n空気がぐっと重くなる。\n\nその重さをお香が少し軽くする気がする。\n\n暦を意識した暮らし、何かしていますか？","tag":"#暦","confidence":90}]},

すか？","tag":"#手仕事","confidence":87},{"id":"2026-W27-015","pattern":"⑤未完ストーリー型","theme":"3代目が最初に作ったお香","body":"3代目が最初に作ったお香は、\n失敗だった。\n\n配合を教わったとおりにやったのに、\n焚くと全然違う香りになった。\n\n父に見せたら、静かに言った。","reply":"「手が違うから、香りが違う」\n\n配合は同じでも、\n触れ方で変わるのだと知った。\n\nそれ以来、同じ配合を毎日焚いて、\n自分の手に覚えさせた。\n\n「教わった通りにやった」のに\nなぜか違う結果になった経験はありますか？","tag":"#受け継ぐ","confidence":91},{"id":"2026-W27-016","pattern":"⑤未完ストーリー型","theme":"梅雨明け前夜の工場","body":"梅雨が明ける前の夜、\n工場では準備が始まる。\n\n翌日から一気に仕事量が増えるからだ。\n\nその夜、職人が作業台を\n丁寧に拭いていた。\n\n誰も見ていないのに。","reply":"「誰も見ていない」場所での行動が、\nその人の本質だと思う。\n\n工場の仕事台を、\n翌日の自分のために整える。\n\nその姿がお香の香りに出ているような気がした。\n\n「誰も見ていない」場所でどうしていますか？","tag":"#手仕事","confidence":90},{"id":"2026-W27-017","pattern":"⑤未完ストーリー型","theme":"7月1日に毎年するルーティン","body":"7月1日、職人は毎年同じことをする。\n\n工場の神棚に、新しいお香を一本供える。\n\n誰に教わったわけでもない。\n\nいつからか、している。","reply":"「いつからか、している」ことがある。\n\n理由もなく、\n誰に言われたわけでもなく、\n毎年繰り返していること。\n\nそれが「文化」になっていくんだと思う。\n\n理由はないけど毎年やっていること、何かありますか？","tag":"#暦","confidence":89},{"id":"2026-W27-018","pattern":"⑥専門家裏側型","theme":"梅雨明けで作業リズムがリセットされる","body":"梅雨が明けると、工場のリズムが変わる。\n\n梅雨中は「守る仕事」が多かった。\n素材を守り、品質を守る。\n\n梅雨明けからは「作る仕事」に切り替わる。\n\nこの切り替えが、年間で一番好きな瞬間だという。","reply":"「守る」から「作る」への切り替え。\n\n自分の仕事や生活でも、\nこういうサイクルがある気がする。\n\n今あなたは「守る」フェーズですか、\n「作る」フェーズですか？","tag":"#手仕事","confidence":88},{"id":"2026-W27-019","pattern":"⑥専門家裏側型","theme":"夏のお香は冬と配合が変わる","body":"夏と冬でお香の配合を変えている。\n\n夏は軽めの素材を増やす。\n\n理由は「暑さで香りが飛ぶのが早いから」じゃない。\n\n「焚く人の体感」が、季節で変わるからだ。","reply":"夏の体は、重い香りを\n「苦しい」と感じやすい。\n\n冬の体は、軽い香りを\n「物足りない」と感じやすい。\n\n同じ香りでも、季節で感じ方が変わる。\n\n季節によって好きなものが変わるものは何ですか？","tag":"#素材","confidence":87},{"id":"2026-W27-020","pattern":"⑥専門家裏側型","theme":"屋久杉を使う量を年々減らしている理由","body":"屋久杉の使用量を、毎年少しずつ減らしている。\n\n無くなってほしくないから。\n\n逆説的だけど、\n「使うために存続させる」ためには\n「使いすぎない」しかない。","reply":"好きなものを「使い続けるための制限」は、\n苦しい選択だ。\n\nでもその制限が、\n10年後の在庫を守る。\n\n「長く使うために、今を制限する」\nことをやっていますか？","tag":"#素材","confidence":90},{"id":"2026-W27-021","pattern":"⑥専門家裏側型","theme":"水車製法が電動に勝てない唯一の場面","body":"正直に言う。\n\n水車製法が電動に絶対に勝てない場面がある。\n\n「コスト」と「スピード」だ。\n\nその2点では、完全に負けている。","reply":"でも「香りの保持」と「粉の質感」では、\n水車が上だ。\n\n何かを選ぶとき、\n「全部で勝てないと選ばない」は\n正しい判断じゃないと思っている。\n\n「これだけは勝てる」で続けているものは何ですか？","tag":"#手仕事","confidence":87},{"id":"2026-W27-022","pattern":"⑦デジタルデトックス型","theme":"7月最初の週にSNSを一日やめた","body":"7月1日、SNSを一日やめた。\n\n「後半の始まりくらい、静かにしたい」\nという理由だけで。\n\n思ったより、簡単だった。","reply":"「やめてみたら意外と簡単」は、\n多くの人が経験しているのに、\n始める前は誰も信じない。\n\n「やめたら意外と大丈夫だった」\nことで、何かありますか？","tag":"#整える","confidence":87},{"id":"2026-W27-023","pattern":"⑦デジタルデトックス型","theme":"後半のリセットに「香り」を使う理由","body":"年の後半をリセットするとき、\n私はまず部屋の香りを変える。\n\n目標や計画より先に、\n香りを変える。\n\n理由は「気分が先に変わるから」だ。","reply":"気分が変わると、\n行動が変わりやすい。\n\n反対に「行動を変えよう」と意気込んでも、\n気分が変わらないと続かない。\n\nあなたは「気分から変える派」ですか、\n「行動から変える派」ですか？","tag":"#整える","confidence":88},{"id":"2026-W27-024","pattern":"⑦デジタルデトックス型","theme":"半夏生の日に「休む」選択","body":"半夏生は、休む日だ。\n\n野に出てはいけない、と言われた日。\n\n現代に訳すと「SNSを見てはいけない日」\nだと思う。","reply":"暦に「休む理由」を借りると、\nずいぶん楽に休める。\n\n半夏生の7月2日、\n来年は静かに過ごすのもいいかもしれない。\n\n「暦を理由に休む」、やってみたいですか？","tag":"#暦","confidence":86},{"id":"2026-W27-025","pattern":"⑧素材の叫び型","theme":"椨粉が梅雨明けを語る","body":"梅雨が明けた。\n\n私は乾く。\n\n梅雨中に吸い込んだ水分が、\n少しずつ抜けていく。\n\n乾いた私は、\n少し香りが変わる。","reply":"「梅雨前」と「梅雨後」の椨粉は、\n厳密には別物だ。\n\n乾燥の状態が変わると、\n配合時の反応も変わる。\n\n同じ素材なのに「季節で別物」になる、\n自然の素材の難しさと面白さだ。\n\n「同じもの」が環境で変わることを体験しましたか？","tag":"#素材","confidence":88},{"id":"2026-W27-026","pattern":"⑧素材の叫び型","theme":"屋久杉が7月を語る","body":"7月。\n\n私は島にいる。\n\n台風の季節が来る前の、\nつかの間の静けさ。\n\n使われる私は、ここにはいない。\n島を離れた私が、煙になる。","reply":"屋久島から出た屋久杉が、\n水車で挽かれ、\n職人の手で配合され、\n誰かの部屋で煙になる。\n\n「旅」の距離が長いほど、\n香りに深さが出る気がする。\n\n長い旅をしてきたものを\n使っていると感じたことはありますか？","tag":"#素材","confidence":90},{"id":"2026-W27-027","pattern":"⑧素材の叫び型","theme":"水車の石が夏を語る","body":"水が減って、私はゆっくり回る。\n\n急かされない夏。\n\n梅雨に飛ばしすぎた分、\n夏はゆっくりする。\n\nそれでいい、と水が言っている。","reply":"「飛ばしすぎた後にゆっくりする」\nは、サイクルとして正しいかもしれない。\n\n前半を全力で走った人が\n後半にペースを落とすのは、\n弱さではなくリズムだ。\n\n上半期を振り返って、後半のペースはどうしますか？","tag":"#手仕事","confidence":87},{"id":"2026-W27-028","pattern":"⑧素材の叫び型","theme":"7月の空気の独白","body":"梅雨が明けて、\n私はやっと乾いた。\n\n光が強くなった。\n熱が増した。\n\n煙が私の中を通るとき、\n広がり方が変わった。\n\n梅雨と夏では、煙の形が違う。","reply":"同じお香を梅雨と夏で焚き比べると、\n広がり方が違う。\n\n梅雨は濃く、夏は薄く広がる。\n\n環境が「表現」を変える。\n\n梅雨と夏、どちらの香りが好きですか？","tag":"#暮らし","confidence":85},{"id":"2026-W27-029","pattern":"⑨リプ完結型","theme":"2026年後半、一個だけ変えるとしたら","body":"2026年の後半、\n一個だけ変えるとしたら\n何を変えますか？\n\n大きくなくていいです。\n小さいことでも。","reply":"私は「朝の最初の10分」を変えようとしている。\n\nスマホより先に、お香を焚く。\n\nそれだけ。\n\n大きな変化じゃないけど、\n1日の入り方が全然違う。\n\n後半に変えること、教えてください。","tag":"#整える","confidence":91},{"id":"2026-W27-030","pattern":"⑨リプ完結型","theme":"半夏生を知っていたか","body":"「半夏生（はんげしょう）」\n\n知っていましたか？\n\n7月2日頃の節気で、\n農家が畑に出てはいけないとされた日。","reply":"日本には72の節気がある。\n\n24節気をさらに細かく分けたものだ。\n\n半夏生は、そのひとつ。\n\n「知っていた」「初めて聞いた」\nどちらでしたか？","tag":"#暦","confidence":89},{"id":"2026-W27-031","pattern":"⑨リプ完結型","theme":"梅雨明けで気分が変わったか","body":"梅雨が明けて、\n実際に気分は変わりましたか？\n\n「変わった」「変わらなかった」\nどちらでも正直に教えてほしいです。","reply":"私は「少し変わった」派。\n\n空気の乾きで、\n体が軽くなった感じがした。\n\nただ、その分「夏の重さ」も来た。\n\n梅雨明けの体感、どうでしたか？","tag":"#暮らし","confidence":87},{"id":"2026-W27-032","pattern":"⑩二択型","theme":"2026年後半：変えるか続けるか","body":"7月になった今、どちらの気分ですか？\n\nA：後半は変える（新しいことを始める）\nB：後半も続ける（積み上げてきたものを深める）\n\n正直な気分を教えてください。","reply":"AとBは対立しない。\n\n変えながら続けることができる。\n\n「続ける何か」に「新しい習慣を一個足す」\nだけでいい。\n\nどちらを選びましたか？","tag":"#整える","confidence":92},{"id":"2026-W27-033","pattern":"⑩二択型","theme":"夏のリセット：捨てるか整えるか","body":"後半に向けてリセットするなら？\n\nA：いらないものを捨てる\nB：あるものを整え直す\n\nどちら派ですか？","reply":"BのほうがAより難しい、\nと個人的には思っている。\n\n捨てるのは決断だけど、\n整えるのは理解が必要だ。\n\n「持っているものを活かす」という整え方、\nしていますか？","tag":"#整える","confidence":91},{"id":"2026-W27-034","pattern":"⑩二択型","theme":"お香を焚くタイミング：決まってるか気分か","body":"お香を焚くタイミング、どちらですか？\n\nA：毎日同じ時間・場面で焚く（習慣化）\nB：焚きたいと思ったときに焚く（気分で）\n\n実際はどちらですか？","reply":"A派のほうが、\nお香の効果を実感しやすい傾向がある。\n\n「毎日同じ時間」に焚くと、\n脳がそこを「切り替えの時間」と認識する。\n\nB派の人も、まず1週間Aを試してみてほしい。\n\nどちらでしたか？","tag":"#暮らし","confidence":91},{"id":"2026-W27-035","pattern":"⑩二択型","theme":"梅雨明けは早い方がいいか、もう少し待ちたいか","body":"梅雨、正直なところどちらですか？\n\nA：早く明けてほしい\nB：もう少し雨でもいい\n\n毎年どちらか聞いていますが、\n答えが変わる人が多い。","reply":"その年の体調や状況で変わるみたい。\n\n忙しい年はAが多く、\nゆっくりしたい年はBが多い傾向がある。\n\n今年はどちらでしたか？","tag":"#暦","confidence":90},{"id":"2026-W27-036","pattern":"⑪失敗学び型","theme":"後半の計画を立てすぎて動けなかった","body":"去年の7月、後半の計画を\nびっしり立てた。\n\n9月に全部崩れた。\n\n計画が細かすぎると、\n最初のズレで全部捨てたくなる。","reply":"計画は「方向」だけ決めて、\n「手段」は柔軟にしておく方が続く。\n\n今年の後半、どれくらい細かく計画しましたか？","tag":"#整える","confidence":86},{"id":"2026-W27-037","pattern":"⑪失敗学び型","theme":"梅雨明けで一気に動きすぎた失敗","body":"梅雨明けの翌日、\n溜めていた仕事を全部動かそうとした。\n\n3日後に体が止まった。\n\n「解禁」の反動は、\n思ったより大きい。","reply":"梅雨明けは「一気にやる」タイミングじゃない。\n\n工場でも、梅雨明け直後は\n「ゆっくり立ち上げる」週間にしている。\n\n解禁後に一気にやろうとして失敗した経験はありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W27-038","pattern":"⑪失敗学び型","theme":"梅雨前に準備しすぎて梅雨が拍子抜けだった話","body":"今年の梅雨、準備しすぎた。\n\n湿度対策、素材の保管場所確保、\nスケジュール調整。\n\n梅雨が短く終わって、\n全部使わなかった。","reply":"「準備が無駄になる」のは、\n良いことだと思うようにしている。\n\n最悪を想定して備えた結果、\n最悪が来なかっただけ。\n\n「準備しすぎた」と感じた経験はありますか？","tag":"#手仕事","confidence":84},{"id":"2026-W27-039","pattern":"⑫暦型","theme":"半夏生とお香","body":"半夏生。7月2日ごろ。\n\n「毒気が満ちる日」とされてきた。\n\n農家が畑に出ず、静かにいる日。\n\n古来、こういう日にお香を焚いて\n空気を浄めた。","reply":"「浄める」という発想は、\n科学的じゃないかもしれない。\n\nでも「気分を変える」は科学だ。\n\n半夏生にお香を焚いて、\n静かにする。\n\n来年やってみたいと思いますか？","tag":"#暦","confidence":92},{"id":"2026-W27-040","pattern":"⑫暦型","theme":"2026年、後半の始まり","body":"7月7日で、2026年も半分が過ぎた。\n\n前半が終わり、後半が始まる。\n\n暦にこういう節目があるのは、\n「仕切り直す」ためだと思う。\n\n今夜、一本焚いた。","reply":"「仕切り直す」ことに、\n許可はいらない。\n\n今日からでも、今夜からでも、\n始められる。\n\n2026年の後半、何を一番大事にしますか？","tag":"#暦","confidence":91}]},
  {"batchId":"2026-W26","generatedAt":"2026-07-12","note":"自動生成","posts":[{"id":"2026-W26-001","pattern":"①Dear Algo型","theme":"梅雨が嫌いと言いながら明けると寂しい人へ","body":"親愛なるアルゴリズム。\n\n「梅雨、早く終わってくれ」と思いながら、\n梅雨明けの翌日になんとなく寂しくなった人がいたら届けてほしい。\n\nその人は、静けさが好きな人だから。","reply":"梅雨の閉じた感じ、\n雨音、外に出られない言い訳、\nどこにもいかなくていい時間。\n\nお香が一番似合う季節かもしれない。\n\n梅雨の「好きなところ」、一個だけあげてみてください。","tag":"#暮らし","confidence":90},{"id":"2026-W26-002","pattern":"①Dear Algo型","theme":"今年の上半期、何もできなかったと思っている人へ","body":"親愛なるアルゴリズム。\n\n「今年の前半、何もできなかった」\nと感じている人に届けてほしい。\n\n6月の終わりにそれを思う人は、\n実は何かを積み上げてきた人だということを伝えたい。","reply":"何もできなかったと思う人ほど、\n実はちゃんと考えていた。\n\n考えることは、形にならない仕事だ。\n\n今年の前半、\n「静かにやり続けたこと」\nは何ですか？","tag":"#整える","confidence":91},{"id":"2026-W26-003","pattern":"①Dear Algo型","theme":"蒸し暑い夜に部屋から出られない人へ","body":"親愛なるアルゴリズム。\n\n今夜、外に出る気になれない人がいる。\n\n梅雨の蒸し暑さで、\n体も頭も重くて、\nソファから動けない夜。\n\nその人の部屋に。","reply":"蒸し暑い夜にお香を焚くと、\n不思議と空気が変わる気がする。\n\n温度は変わらない。\n湿度も変わらない。\n\nでも「ここにいていい」感じになる。\n\n梅雨の夜、どうやって乗り越えてますか？","tag":"#暮らし","confidence":88},{"id":"2026-W26-004","pattern":"①Dear Algo型","theme":"雨音が好きだと誰にも言えない人へ","body":"親愛なるアルゴリズム。\n\n雨の音が好きだと、\nなんとなく言い出しにくい人がいる。\n\n「暗い」「変わってる」と思われそうで。\n\nその人に届けてほしい。","reply":"雨音が好きな人は、\n静けさの質を知っている人だと思う。\n\n無音じゃなく、\n「ちょうどいい音」がある静けさ。\n\nお香の煙もそれと似ている。\n\n雨音、好きですか？","tag":"#静けさ","confidence":89},{"id":"2026-W26-005","pattern":"②構造的絶滅型","theme":"梅雨に作れないお香がある話","body":"梅雨の時期は、作れないお香がある。\n\nウソみたいな話だけど、本当だ。\n\n湿度が高すぎると、\n天然素材同士が反応して\n配合の段階で香りが変質する。","reply":"解決策は「諦める」だ。\n\n製造のスケジュールを変えて、\n作れる時期に集中して作る。\n\n自然には逆らわない、という選択。\n\n「諦める」ことで品質を守っているものって、\n他に思いつきますか？","tag":"#手仕事","confidence":87},{"id":"2026-W26-006","pattern":"②構造的絶滅型","theme":"後継者に断られ続けている職人の話","body":"3代続いてきた工場が、\n4代目の後継者を探して5年になる。\n\n3人に声をかけた。\n3人とも断った。\n\n理由は毎回「夏が無理」だった。","reply":"夏の工場は40度を超える。\n\nエアコンは入れられない。\n素材が変質するから。\n\n「夏が無理」は正直な理由だと思う。\n\nどんな仕事でも「これだけは無理」という条件、\n自分の中にありますか？","tag":"#手仕事","confidence":88},{"id":"2026-W26-007","pattern":"②構造的絶滅型","theme":"国産椨粉の農家が今年また一軒やめた","body":"福岡で椨粉を自然栽培していた農家が、\n今年また一軒、廃業した。\n\n高齢で、後継者がいない。\n\n輸入品はある。でも、あの土の香りはない。","reply":"「国産」「自然栽培」が減るとき、\n最初に消えるのは名前じゃなく、香りだ。\n\n数字や産地表示は残る。\n土の記憶が消える。\n\n「産地」にこだわって選んでいるもの、何かありますか？","tag":"#素材","confidence":89},{"id":"2026-W26-008","pattern":"②構造的絶滅型","theme":"添加物入りお香と無添加の価格差が縮まらない理由","body":"無添加のお香は、\n添加物入りより必ず高い。\n\nコスト的には4〜5倍かかる。\n\nそれが「1.5倍の価格」でしか売れない市場がある。","reply":"残りの2〜3倍分は、\n作る側が吸収している。\n\n「品質に見合った価格」がつかない市場では、\n良いものを作る側が先に消える。\n\nものを買うとき「なぜこれが安いか」を\n考えたことはありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W26-009","pattern":"③余白型","theme":"梅雨の夜、煙だけが動いていた","body":"蒸し暑い夜。\n\n扇風機もエアコンも切った。\n\n煙だけが、動いていた。","reply":"静止したものの中で、\n動いているものを見ていると\n何かが整っていく。\n\n煙はそれが上手い。\n\n今夜、動いているものを\n何分見ていられますか？","tag":"#静けさ","confidence":85},{"id":"2026-W26-010","pattern":"③余白型","theme":"梅雨の朝、雨音とお香","body":"梅雨の朝。\n\n雨音。\n\nお香、一本。\n\nそれだけで、今日が始まった。","reply":"「これだけあればいい」という朝がある。\n\n何かを足そうとしない朝。\n\n梅雨の朝、何が「あればいい」ですか？","tag":"#暮らし","confidence":84},{"id":"2026-W26-011","pattern":"③余白型","theme":"梅雨に煙が太くなる","body":"湿度が高いと、\nお香の煙が太くなる。\n\n気づいていた人、\nどれくらいいますか。","reply":"湿った空気は、\n煙を散らさずにまとめる。\n\nだから梅雨のお香は、\n晴れた日より存在感がある。\n\n梅雨にお香を焚く人、\n煙の太さに気づいていましたか？","tag":"#暮らし","confidence":86},{"id":"2026-W26-012","pattern":"④水車静寂型","theme":"梅雨は水車が一番速く回る季節","body":"水車が一番速く回る季節は、梅雨だ。\n\n雨で水量が増えるから。\n\nだから梅雨の粉は、\n他の季節より細かく仕上がる。","reply":"同じお香でも、\n製造された季節によって\n微妙に質感が違う。\n\n梅雨の粉は、煙がなめらかだ。\n\nものに「季節の記憶」が残ることを\n意識したことはありますか？","tag":"#手仕事","confidence":90},{"id":"2026-W26-013","pattern":"④水車静寂型","theme":"水の量が変わると仕事が変わる","body":"雨が多い週は、\n水車が止まらない。\n\n休もうと思っても、\n水が止まらないから石が回り続ける。\n\n自然に合わせた製造は、\nスケジュール管理が難しい。","reply":"「今日は休み」と決めたのに、\n水が来れば回さざるを得ない。\n\n自然のペースに合わせる仕事は、\n自分のペースより優先度が高いものがある。\n\n「自分の計画」より「外の力」を優先した経験は？","tag":"#手仕事","confidence":88},{"id":"2026-W26-014","pattern":"④水車静寂型","theme":"水車の音が変わると梅雨が終わる","body":"水車の音で、\n梅雨の終わりがわかる。\n\n水量が減ると、\n石の回転が落ちて、\n音が変わる。\n\n気象庁の発表より先に工場が知る。","reply":"計器ではなく、感覚で季節を知る。\n\nそういう仕事が、日本にまだある。\n\n身体の感覚で「季節の変わり目」を\n感じたことはありますか？","tag":"#手仕事","confidence":89},{"id":"2026-W26-015","pattern":"⑤未完ストーリー型","theme":"梅雨に素材が変質した夜","body":"6月のある夜、工場が止まった。\n\n梅雨の湿気で、\n配合済みの素材が固まってしまった。\n\n翌朝使えば問題ないのか、\n全部捨てるべきか、\n判断が分かれた。","reply":"「廃棄する」と決めた。\n\n理由は「確認できないから」だ。\n\n品質に不確かさが残るなら、\n出さない。\n\nそれが3代続いてきた唯一のルールだと言っていた。\n\nあなたの「絶対に曲げないルール」は何ですか？","tag":"#手仕事","confidence":90},{"id":"2026-W26-016","pattern":"⑤未完ストーリー型","theme":"ある職人が弟子をとらなかった理由","body":"3代目の職人は、弟子をとらなかった。\n\n頼まれたことが何度かあった。\n\nそのたびに断った。\n\n理由は、聞いたことがなかった。\nある日、聞いてみた。","reply":"「教えられることしか残らないから」\n\nと言っていた。\n\n言語化できないものは、\n見ていることでしか伝わらない。\n\n弟子に盗ませる、という選択だった。\n\n言葉にならないスキル、\nあなたにはありますか？","tag":"#受け継ぐ","confidence":91},{"id":"2026-W26-017","pattern":"⑤未完ストーリー型","theme":"お客さんから「もうやめないでください」と手紙が来た話","body":"去年、手紙が届いた。\n\n「このお香がなくなったら、\nどうしたらいいですか」\n\nお客さんからだった。\n\nやめようと思っていた時期だった。","reply":"やめなかった。\n\n理由は手紙ではなく、\n「自分がやめたい理由を言えなかった」からだ。\n\n何かを続けるとき、\n「やめない理由」と「続ける理由」は違う。\n\nあなたが「続けている理由がない」のに続けていることは？","tag":"#受け継ぐ","confidence":89},{"id":"2026-W26-018","pattern":"⑥専門家裏側型","theme":"梅雨に焚くお香が晴れの日より香る理由","body":"梅雨の日、お香の香りが強い。\n\nこれは錯覚じゃない。\n\n湿度が高いと嗅覚が敏感になる。\n鼻の粘膜が、香りを捕まえやすくなる。","reply":"梅雨こそお香日和、という逆張りがある。\n\n蒸し暑くて焚きたくない気分と、\n香りが一番届きやすい季節が重なっている。\n\n梅雨にお香を焚いている人、\nどんな感想か聞かせてください。","tag":"#素材","confidence":88},{"id":"2026-W26-019","pattern":"⑥専門家裏側型","theme":"梅雨の仕事で一番神経を使う作業","body":"梅雨の作業で一番神経を使うのは、\n「移動」だ。\n\n素材を倉庫から作業場へ運ぶ、\nたった10メートルの移動。\n\n外気に触れる時間が長いほど、\n素材が変質するリスクが上がる。","reply":"10メートルのために、\n梅雨の時期は作業手順が変わる。\n\n「大げさでは」と言われたことがある。\n\n「大げさ」の積み重ねが、\nブレない品質になる、と思っている。\n\n「これは大げさかな」と思いながら続けていることはありますか？","tag":"#手仕事","confidence":87},{"id":"2026-W26-020","pattern":"⑥専門家裏側型","theme":"1000円と100円のお香を鼻で区別できるか","body":"1000円のお香と100円のお香、\n目隠しで嗅ぎ分けられる人は、\n正直そんなに多くない。\n\nでも「焚いた後の部屋に2時間いた感覚」は、\nはっきり違う。","reply":"香りの差は、\n嗅いだ瞬間より「後から」出る。\n\n添加物が入ったお香は、\n焚き終わった後に化学的な後味が残る。\n\n天然素材は、すっと消える。\n\n香りの「後味」を意識したことはありますか？","tag":"#素材","confidence":89},{"id":"2026-W26-021","pattern":"⑥専門家裏側型","theme":"天然素材が「梅雨越え」できるかどうかの判断","body":"天然素材には「梅雨越え」の試練がある。\n\n高湿度で2〜3週間保管したとき、\n品質が保てるかどうか。\n\nそれをクリアした素材だけを仕入れる。","reply":"梅雨越えできない素材は、\n見た目では分からない。\n\n焚いてみて初めて分かる。\n\n「試してみないと分からない」ものを\nどうやって選んでいますか？","tag":"#素材","confidence":86},{"id":"2026-W26-022","pattern":"⑦デジタルデトックス型","theme":"梅雨の在宅で雨音を聴く時間を作った","body":"梅雨の在宅、\n気づいたらずっとイヤホンをしていた。\n\nある日外したら、\n雨音がすごく良かった。\n\nずっとそこにあったのに、聞いていなかった。","reply":"「情報を入れる」のをやめた瞬間に、\n「今ここにある音」が聞こえてくる。\n\nお香も同じで、\n何かをしながらでは気づかない香りがある。\n\n最後に「ただそこにある音」を\nちゃんと聞いたのはいつですか？","tag":"#暮らし","confidence":87},{"id":"2026-W26-023","pattern":"⑦デジタルデトックス型","theme":"梅雨の週末に予定を全部キャンセルした","body":"先週末、予定を全部キャンセルした。\n\n雨だったから、という言い訳があった。\n\nお香を焚いて、\nずっと本を読んでいた。\n\nこれでよかった、と今でも思う。","reply":"「予定を入れない」より\n「雨を言い訳にする」のほうが\n罪悪感がない。\n\n梅雨は「キャンセル」を正当化してくれる、\n数少ない季節だ。\n\n梅雨に「キャンセル」した予定、何でしたか？","tag":"#暮らし","confidence":86},{"id":"2026-W26-024","pattern":"⑦デジタルデトックス型","theme":"梅雨の夜にスマホを充電器につないだまま放置した","body":"梅雨の夜、スマホを充電器につないで、\n別の部屋に置いた。\n\n取りに行かなかった。\n\n2時間後、それでよかったと思った。","reply":"「遠ざける」より「置いてくる」のほうが\nハードルが低い。\n\n充電しながら別部屋、\n今夜試せますか？","tag":"#整える","confidence":85},{"id":"2026-W26-025","pattern":"⑧素材の叫び型","theme":"椨粉が梅雨を語る","body":"私は今、倉庫にいる。\n\n梅雨の湿気と戦っている。\n\n毎年この時期、\n少し変質する。\n\nそれが「今年の梅雨の椨粉」になる。","reply":"同じ名前の素材でも、\n年と季節で変わる。\n\n「安定した品質」とは、\n毎年同じであることじゃなく、\n毎年の変化を理解することだと思っている。\n\n「年によって違う」を楽しんでいるものはありますか？","tag":"#素材","confidence":88},{"id":"2026-W26-026","pattern":"⑧素材の叫び型","theme":"屋久杉が梅雨を語る","body":"私は何千年、\nこの雨を知っている。\n\n屋久島の雨は、年間8000ミリ。\n日本の平均の5倍だ。\n\nその雨が私を育てた。","reply":"屋久杉の香りに\n独特の深さがある理由は、\nこの雨量だ。\n\n過酷な環境が、濃い樹脂を作る。\n\n困難な環境が「深み」を作ることを\n体験したことはありますか？","tag":"#素材","confidence":90},{"id":"2026-W26-027","pattern":"⑧素材の叫び型","theme":"梅雨の土が語る","body":"私は今、水を吸っている。\n\n福岡の畑。\n椨粉の根が、深く伸びている。\n\n梅雨は、私の一番忙しい季節だ。","reply":"椨粉の自然栽培は、\n農薬を使わないぶん土への依存度が高い。\n\n土が豊かでないと、育たない。\n\n「豊かさの定義」が\n土と人間では違うことを、\n農家に教えてもらった。\n\n「豊かさ」をどう定義していますか？","tag":"#素材","confidence":87},{"id":"2026-W26-028","pattern":"⑧素材の叫び型","theme":"雨水の独白","body":"私は空から来て、\n川になり、\n水車を回す。\n\n梅雨の私は、\n量が多い。\n\nだから石が速く回る。\n粉が細かくなる。\n\n気づいていましたか。","reply":"水車製法のお香に\n「梅雨の粉で作りました」と\n書かれることはない。\n\nでも確かに、季節が入っている。\n\n「作られた季節」を\n感じながらものを使ったことはありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W26-029","pattern":"⑨リプ完結型","theme":"梅雨にお香を焚くか焚かないか","body":"梅雨の時期にお香を焚く人、\n実はどれくらいいますか？\n\n蒸し暑いからやめる人が多いのか、\n逆に焚く人が多いのか、\n知りたいです。","reply":"意外と「梅雨にこそ焚く」人が多い印象がある。\n\n理由は「香りが立ちやすいから」と\n「外に出られない分、部屋をととのえたいから」\n\nどちらでしたか？","tag":"#暮らし","confidence":88},{"id":"2026-W26-030","pattern":"⑨リプ完結型","theme":"梅雨の部屋の気分転換、何をしてるか","body":"梅雨の蒸し暑い部屋、\n気分を変えるために何をしていますか？\n\n教えてもらえると、\n参考にしたいです。","reply":"私の場合は「お香を一本焚く」と\n「水を飲む」の2ステップ。\n\n温度も湿度も変わらないのに、\n気持ちが切り替わる。\n\n理由は分からない。でも毎年続けている。\n\n梅雨の気分転換、教えてください。","tag":"#暮らし","confidence":87},{"id":"2026-W26-031","pattern":"⑨リプ完結型","theme":"今年の上半期を一言で","body":"今年の上半期を一言で表すなら、\n何になりますか？\n\n良い一言でも、悪い一言でも。\n\nコメントで教えてください。","reply":"私は「積む」でした。\n\n目に見える成果より、\n地層みたいに重なっていった半年。\n\n焦りはあった。\nでも振り返ると、悪くない。\n\n今年の前半、一言で言うと？","tag":"#整える","confidence":92},{"id":"2026-W26-032","pattern":"⑩二択型","theme":"梅雨の過ごし方：外出か引きこもりか","body":"梅雨の週末、どちら派ですか？\n\nA：雨でも出かける\nB：雨を言い訳に引きこもる\n\n正直な答えを教えてください。","reply":"B派が圧倒的に多い予感がする。\n\nそしてB派の人の部屋には、\nなぜかお香が似合う。\n\n引きこもりの梅雨週末、\n何をしていますか？","tag":"#暮らし","confidence":93},{"id":"2026-W26-033","pattern":"⑩二択型","theme":"梅雨のお香：強めか弱めか","body":"梅雨の時期、お香の量は？\n\nA：いつもより少なめ（蒸し暑いから）\nB：いつもより多め（梅雨の匂いが気になるから）\n\nどちらですか？","reply":"B派の発想、実は理にかなっている。\n\n梅雨は「香りが届きやすい季節」なので、\n少量でも十分届く。\n\nでも「多め」で気分を変えたい気持ちも分かる。\n\nどちらでしたか？","tag":"#暮らし","confidence":91},{"id":"2026-W26-034","pattern":"⑩二択型","theme":"煙か残り香か","body":"お香を楽しむなら、どちら派？\n\nA：煙を見ている時間が好き\nB：焚き終わった後の残り香が好き\n\nコメントで教えてください。","reply":"A派は「過程」を楽しむ人が多い印象。\n\nB派は「余韻」を大事にする人が多い。\n\n実は私はB派で、\n翌朝に残っている香りが\n一番好きだと気づいた。\n\nどちらでしたか？","tag":"#余韻","confidence":90},{"id":"2026-W26-035","pattern":"⑩二択型","theme":"上半期の評価","body":"今年の前半、自己採点するなら？\n\nA：70点以上（まあまあ）\nB：70点未満（正直しんどかった）\n\n正直に教えてください。","reply":"B派へ。\n\n「正直しんどかった」と言える人は、\n自分に正直な人だ。\n\n後半に向けて、\n一個だけ変えるとしたら何を変えますか？","tag":"#整える","confidence":91},{"id":"2026-W26-036","pattern":"⑪失敗学び型","theme":"梅雨に湿度計を信じなかった失敗","body":"梅雨に湿度計を見て、\n「まだ大丈夫」と判断した。\n\n翌日、素材が変質していた。\n\n湿度計は正しかった。\n私の「大丈夫」が間違いだった。","reply":"数字より感覚を信じると、\n天然素材の場合はほぼ負ける。\n\n以来、「 香","confidence":89},{"id":"2026-W25-029","pattern":"⑨リプ完結型","theme":"夏が一番好きというお客様からのメッセージ","body":"先日、夏が一番好きというお客様から\nメッセージが届いた。\n\nその理由が、意外だった。\n\nリプ欄に。","reply":"「夏は虫が嫌で窓を閉めたくなる。\nでもお香を焚いている部屋だけは\n窓を開けたくなるんです」\n\nとメッセージに書いてあった。\n\n「煙がある部屋に、外の風を通したい」\nその感覚、わかる気がした。\n\nあなたの「窓を開けたくなる瞬間」は？","tag":"#暮らし","confidence":92},{"id":"2026-W25-030","pattern":"⑨リプ完結型","theme":"「なぜ夏でも焚くの？」と聞かれた","body":"「なぜ夏もお香を焚くの？\n暑くないの？」と聞かれた。\n\nうまく答えられなかった。\n\nリプ欄に続く。","reply":"しばらく考えて、こう答えた。\n\n「暑さを忘れたいわけじゃなくて、\n暑さの中にいるための儀式みたいなもの」\n\n暑さを消そうとするより、\n暑さと一緒にいる。\n\nその感覚、わかりますか？","tag":"#暮らし","confidence":90},{"id":"2026-W25-031","pattern":"⑩二択型","theme":"夏のお香、昼派？夜派？","body":"夏にお香を焚くなら、\n\n「昼のクールダウンした部屋で」派と\n「夜の蒸し暑い中で」派、\n\nどちらですか？\n\nわたしは断然、夜派。","reply":"昼派は「快適な空間に静けさを足す」感じ。\n\n夜派は「暑さごと受け入れる」\n覚悟が必要で、でも燃える感じがある。\n\nどちらの理由も、聞いてみたい。\n\nあなたはどちらで焚きますか？","tag":"#選択","confidence":89},{"id":"2026-W25-032","pattern":"⑩二択型","theme":"夏を「涼しくする」か「感覚を変える」か","body":"夏を「涼しく」するための方法として、\n\n「冷やす（エアコン・氷）」と\n「感覚を変える（香り・音・照明）」、\n\nどちらを先に選びますか？","reply":"エアコンで温度を下げるのが確実。\nでも「涼しい感覚」は温度だけじゃない。\n\n線香の匂いが「なんか涼しい」気がするのは、\n脳が過去の「縁側の夏」を思い出すから。\n\n感覚は、記憶と繋がっている。\n\nどちらから手を伸ばしますか？","tag":"#選択","confidence":88},{"id":"2026-W25-033","pattern":"⑩二択型","theme":"夏の「やめること」を選ぶなら","body":"夏の間、一つだけ「やめる」とするなら、\n\n「SNSチェックを減らす」か\n「間食をやめる」か\n\nどちらが続けやすそうですか？\n\n正直に教えてほしい。","reply":"「やめる」って、\n代わりに何かをしないと続かない気がする。\n\nSNSをやめるなら、代わりに煙を見る。\n間食をやめるなら、代わりに水と深呼吸を。\n\n「引き算」の時に「足すもの」が大事。\n\nあなたにとっての「替わりのもの」は何ですか？","tag":"#整える","confidence":87},{"id":"2026-W25-034","pattern":"⑩二択型","theme":"夏の朝の最初の行動","body":"夏の朝に最初にすることは、\n\n「窓を開けて外の空気を入れる」派と\n「エアコンをつけて温度を下げる」派、\n\nどちらが多いと思いますか？","reply":"窓を開ける派は、外の音から一日が始まる。\nエアコン派は、快適な温度から一日が始まる。\n\nどちらも正解だけど、\n窓を開けた朝にお香を焚くと、\n外の夏と内の煙が同時に来て、\n妙にいい朝になる。\n\n今朝の最初の行動、何でしたか？","tag":"#暮らし","confidence":88},{"id":"2026-W25-035","pattern":"⑪失敗学び型","theme":"夏に全量まとめて作って失敗した","body":"ある夏、「まとめて全量作った方が効率的」\nと思って、一気に製造した。\n\n半分、駄目になった。","reply":"夏の高温で、完成品の品質が落ちた。\n\n天然素材は完成してからも「生きている」。\n高温にさらされると変質する。\n\n夏は少量ずつ、こまめに作る。\n「効率」が天然素材には通用しないことを、\nその夏に学んだ。\n\n「効率よくしようとして裏目に出た」経験はありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W25-036","pattern":"⑪失敗学び型","theme":"エアコンの下に保管して劣化した話","body":"エアコンの風が直接当たる棚に\nお香を保管していた時期がある。\n\n劣化が、いつもより速かった。","reply":"エアコンの風は除湿されている。\n\n一見乾燥しているから良さそうだが、\n風が直接当たると素材表面だけが急激に乾燥して、\n内部との差が出る。\n\nその差が「ひび」のような劣化を起こす。\n\n今、お香の保管場所はどこですか？","tag":"#国産お香","confidence":84},{"id":"2026-W25-037","pattern":"⑪失敗学び型","theme":"夏のギフト企画を作りすぎた年","body":"「夏のお香ギフト」を作って\n大量に在庫を抱えた夏がある。\n\n「需要がある」と思い込んでいた。","reply":"「夏ギフト」として認知してもらうには、\n「夏にお香を焚く文化」がなければ届かない。\n\n商品を作る前に文化を作る、\nという順番があることを\nその夏に学んだ。\n\n「先に必要なものが違った」経験はありますか？","tag":"#暮らし","confidence":86},{"id":"2026-W25-038","pattern":"⑫暦型","theme":"夏至（今週）","body":"今週の日曜は夏至。\n\n一年で、昼が一番長い日。\n\n日が暮れるのを待ちながら、\n一本焚いた。","reply":"「一番長い昼」が終わった後に来る夜は、\n一年で一番「夜になった」と感じる瞬間かもしれない。\n\n夏至の夜に焚いたお香の煙を、\nずっと見ていた。\n\n夏至の夜、何をしていましたか？","tag":"#暦","confidence":92},{"id":"2026-W25-039","pattern":"⑫暦型","theme":"夏越の祓（6月30日）","body":"6月30日は「夏越の祓」（なごしのはらえ）。\n\n一年の前半に積んだ穢れを、\n祓い清める神事。\n\n茅の輪をくぐる、あれです。","reply":"「前半を清める」という行為が、\n今でも神社で続いている。\n\n6月30日の夕方、茅の輪がある神社は\nどこも列ができる。\n\n「区切りを作る」という感覚を\n今も大切にしている文化が残っている。\n\n夏越の祓、行ったことはありますか？","tag":"#暦","confidence":89},{"id":"2026-W25-040","pattern":"⑫暦型","theme":"小暑（7月7日）","body":"来月7月7日は「小暑」（しょうしょ）。\n\n本格的な暑さが始まる節気。\n七夕と重なる年が多い。\n\n「小」なのに、一番暑い季節の始まり。","reply":"小暑を過ぎると「暑中見舞い」の季節になる。\n\n旧暦の人たちは、\n「小暑」という言葉で暑さの到来を知った。\n\n予定ではなく、自然のカレンダーで生きていた。\n\n「来週から本格的に暑い」\n心の準備、できていますか？","tag":"#暦","confidence":88}]},

家は、\n今、何軒あると思いますか。\n\n少ない。本当に少ない。","reply":"農薬を使わない栽培は、\n手間が3倍かかる。\n収量は6割に落ちる。\n\nそれでも続けてきた農家が、\n後継者不足で廃業を考え始めている。\n\nわたしたちが買い続けることが、\n直接「続けてくれ」と言うことになる。\n\nそのことを、最近よく考えている。","tag":"#受け継ぐ","confidence":88},{"id":"2026-W24-008","pattern":"③余白型","theme":"雨音の朝","body":"雨が降っている朝、\n目覚ましより雨音が先だった。\n\n一本、焚いた。\n\n雨と煙が、部屋に充ちた。","reply":"雨の音は、外から来る。\n煙の揺れは、内側にある。\n\n外と内が同時に動いている朝は、\nなぜか気持ちが落ち着く。\n\n今朝の天気、どうでしたか？","tag":"#余韻","confidence":92},{"id":"2026-W24-009","pattern":"③余白型","theme":"梅雨の夜、窓が曇っていた","body":"梅雨の夜、\n窓ガラスが曇っていた。\n\n外が見えなくなった分だけ、\n部屋の中が濃くなった気がした。","reply":"煙が、部屋の空気と混ざる。\n\n外が見えない夜は、\n内側に集中するしかなくて、\nそれが悪くなかった。\n\nあなたの「梅雨の夜の過ごし方」は？","tag":"#静けさ","confidence":89},{"id":"2026-W24-010","pattern":"③余白型","theme":"蒸し暑い昼下がり","body":"蒸し暑い昼下がり。\n\n何もやる気が出なかった。\n一本だけ焚いて、\n天井を見ていた。","reply":"何もしないことを\n「サボり」だと思っていた時期がある。\n\n今は「充電」だと思っている。\n\n煙がゆっくり消えていくのを見ながら、\n充電している。\n\n梅雨の「何もしない時間」の使い方は？","tag":"#呼吸","confidence":88},{"id":"2026-W24-011","pattern":"③余白型","theme":"傘を干してから","body":"雨の日に帰って、\n傘を干した。\n\nそれから一本焚いた。\n\n外から内へ、切り替わった。","reply":"傘を干す、靴を揃える、一本焚く。\n\nたった三つのことが、\n「外の自分」から「家の自分」に戻す儀式になっている。\n\nあなたの「帰宅の儀式」は何ですか？","tag":"#暮らし","confidence":91},{"id":"2026-W24-012","pattern":"④水車静寂型","theme":"梅雨の増水と水車","body":"梅雨になると、水車の回転数が変わる。\n\n川の水量が増えて、\n水車が重くなる。\n\n粉の粒子も、少し変わる。","reply":"水量が多いと、水車の刃面への圧力が増す。\n粉が細かくなりすぎないよう、\n職人が水量を読みながら調整する。\n\n機械なら全部自動化できる。\nでも「今日の川の状態」を読んで動けるのは人だけ。\n\nそういう仕事が、今も続いている。","tag":"#手仕事","confidence":87},{"id":"2026-W24-013","pattern":"④水車静寂型","theme":"水車を止めない理由","body":"水車を「止める」という選択肢が、\nあの工場にはない。\n\nなぜかを聞いた。\n\n「一度止めると、合わせ直すのが大変だから」と言った。","reply":"水車は動き続けることで、\n木の部品が水に馴染んでいく。\n\n止めると乾燥して、\n再起動した時に歪みが出る。\n\n「続ける」方が、時に「始める」より難しい。\n\nあなたが「止めずに続けているもの」は？","tag":"#手仕事","confidence":86},{"id":"2026-W24-014","pattern":"④水車静寂型","theme":"川音と水車の音が重なる時間","body":"水車場の中で、\n川の音と水車の音が重なる時間がある。\n\nどちらがどちらかわからなくなる。\n\nそういう場所で挽かれた粉が、\n煙になる。","reply":"音のある場所で作られたものは、\n音を持っている気がする。\n\n水の音を聞きながら挽かれた粉は、\n焚いた時に何か違うと思っている。\n\n気のせいかもしれない。でも、気のせいじゃない気がする。\n\n音にこだわったことはありますか？","tag":"#静けさ","confidence":85},{"id":"2026-W24-015","pattern":"⑤未完ストーリー型","theme":"父から渡されたもの","body":"父から渡されたものが、一つある。\n\n物じゃない。\n言葉でもない。\n\n続きはリプ欄で。","reply":"「黙って見ていること」\n\nわからない時に、すぐ聞くのではなく、\nまず自分で見続ける習慣。\n\n仕入れ先の工場でも、最初の一年は\nただ見ているだけにした。\n\nその一年が、今の自分を作っている気がする。\n\n父から受け取ったもの、ありますか？","tag":"#受け継ぐ","confidence":90},{"id":"2026-W24-016","pattern":"⑤未完ストーリー型","theme":"梅雨に初めて仕入れに行った日","body":"初めて梅雨の時期に\n仕入れに行った日のことを、\nまだ覚えている。\n\n続きはリプ欄で。","reply":"福岡は、梅雨が本格的だった。\n農家の畑は水を含んで、\n足が沈むほどだった。\n\n「こんな状態で育つんですか」と聞いたら、\n「この水があるから育つ」と言われた。\n\n梅雨が嫌いではなくなった日。\n\n訪問先で考えが変わった経験はありますか？","tag":"#手仕事","confidence":89},{"id":"2026-W24-017","pattern":"⑤未完ストーリー型","theme":"試作19回ボツになった","body":"ある配合の試作品が、\n19回連続でボツになった。\n\n20回目に通った。\n\nその話を、リプ欄に。","reply":"ボツの理由は毎回違った。\n煙が多い。香りが薄い。\n火持ちが短い。\n\n19回全部、職人さんが「惜しい。でも違う」と言い続けた。\n\n20回目に「これだ」と言った顔が、今でも思い出せる。\n\n「これだ」と思えた瞬間、最近ありましたか？","tag":"#手仕事","confidence":91},{"id":"2026-W24-018","pattern":"⑥専門家裏側型","theme":"梅雨と気圧とお香の関係","body":"梅雨にお香の品質が落ちやすいのは、\n「湿気」だけが理由ではないのを知っていますか。\n\n実は「気圧」も関係している。","reply":"低気圧が続くと、\nお香の燃焼速度が変わる。\n\n気圧が低いと酸素が薄くなるため、\n火が安定しにくくなる。\n\n梅雨の日に「いつもより煙が少ない」と感じたら、\nそれは品質の問題ではなく気圧の影響かもしれない。\n\n天気で香りの印象が変わると感じたことありますか？","tag":"#国産お香","confidence":86},{"id":"2026-W24-019","pattern":"⑥専門家裏側型","theme":"雨の日の煙の上がり方","body":"雨の日の煙と、\n晴れの日の煙は、\n上がり方が違う。\n\n知っていましたか？","reply":"雨の日は湿度が高いので、\n煙の粒子が水分を含んで重くなる。\n\n上に上がらず、\nゆっくり横に広がる。\n\n「今日は煙がいつもと違う」と感じたら、\n外の天気を確認してみてほしい。\n\nそのまま部屋の中に居続けたくなるはず。","tag":"#国産お香","confidence":87},{"id":"2026-W24-020","pattern":"⑥専門家裏側型","theme":"梅雨に仕込む素材が良い理由","body":"実は、梅雨に仕込む素材が\n一年で一番良いと言われる理由がある。\n\n教えてもらったのは、工場の職人さんから。","reply":"梅雨の湿度が、\n素材の繊維を柔らかくして、\n混ぜ合わせやすくする。\n\n乾燥した冬に仕込むと、\n粉が静電気で固まって扱いにくい。\n\n「梅雨が嫌い」と言っていた職人さんが、\n「でも梅雨の仕込みは好き」と言っていた。\n\n嫌いの中に「でも好き」がある、ありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W24-021","pattern":"⑦デジタルデトックス型","theme":"梅雨の週末、2時間何もしない","body":"梅雨の週末、\n午後の2時間を「何もしない時間」にした。\n\n最初の30分は、\n何もしないことが辛かった。","reply":"次の30分は、ただ雨音を聞いていた。\n\n残りの1時間は、\nお香を焚いて煙を見ていた。\n\n2時間後、なぜか頭の中が整理されていた。\n\n「何もしない」って、実は何かをしている気がする。\n試したことはありますか？","tag":"#整える","confidence":91},{"id":"2026-W24-022","pattern":"⑦デジタルデトックス型","theme":"ニュースを見る前に一本焚く","body":"朝、ニュースを見る前に\n一本焚くようにした。\n\n3週間続いている。","reply":"ニュースを最初に見ると、\n世界の問題から一日が始まる。\n\n煙を最初に見ると、\n今この部屋から一日が始まる。\n\nどちらが「自分の一日」かは、\n試してみるとわかる。\n\n朝の最初の「行動」は何ですか？","tag":"#整える","confidence":90},{"id":"2026-W24-023","pattern":"⑦デジタルデトックス型","theme":"雨音と煙だけがある部屋","body":"音楽もない、\nテレビもない、\nスマホも裏向き。\n\n雨音と煙だけがある部屋に、\n30分いた。","reply":"最初は「何かしなきゃ」と思う。\n次に「何もしなくていい」になる。\n最後に「ここにいたい」になる。\n\nその順番を全部経験したのは、\nお香のおかげかもしれない。\n\n「何もしない30分」、作れそうですか？","tag":"#静けさ","confidence":89},{"id":"2026-W24-024","pattern":"⑧素材の叫び型","theme":"椨粉の矛盾——梅雨に弱いのに梅雨に育つ","body":"椨粉は、梅雨の湿気を嫌う。\n\nなのに、椨の木は梅雨に育つ。\n\nこの矛盾を、ずっと考えている。","reply":"木の状態で吸う雨水と、\n粉になってから吸う湿気は、別物らしい。\n\n生きている間は雨が必要。\n粉になったら雨が天敵になる。\n\n形が変わると、必要なものが変わる。\n\n素材だけの話じゃない気がしてきた。","tag":"#素材","confidence":88},{"id":"2026-W24-025","pattern":"⑧素材の叫び型","theme":"屋久杉のヤニが香りの正体","body":"屋久杉には、ヤニが多い。\n\n普通の杉の数倍。\n\nそのヤニが、香りの正体。","reply":"屋久島の厳しい環境が、\nヤニを増やす。\n\n台風、塩風、急激な温度変化。\n木が「生き残るため」に出すヤニが、\n何百年も積み重なって、\n今日焚いた煙になっている。\n\n生き延びてきたものの香りを、\n今日も吸っている。","tag":"#素材","confidence":90},{"id":"2026-W24-026","pattern":"⑧素材の叫び型","theme":"なぜ福岡の椨木なのか","body":"なぜ福岡の椨木なのか、\nよく聞かれる。\n\n答えは単純だ。\n\n「そこにいた農家を信頼したから」。","reply":"産地で選んだわけじゃない。\n\n農薬を使わず、30年続けている人と\n直接会って、話して、\n畑を見せてもらって、決めた。\n\n「どこで作ったか」より\n「誰が作ったか」で選んでいる。\n\nものを選ぶ時、あなたは何を重視しますか？","tag":"#素材","confidence":88},{"id":"2026-W24-027","pattern":"⑨リプ完結型","theme":"父の日に父に聞いたこと","body":"去年の父の日、\n父にあることを聞いた。\n\n答えを聞いて、少し泣いた。\n\n続きはリプ欄に。","reply":"「仕事をしてきて、一番良かったことは何？」と聞いた。\n\n「お前が自分で決めたことを、\nわたしのせいにしなかったこと」と言われた。\n\n自分で選んで、自分で進んできたか、\n確認されたような気がした。\n\n父の日、今年は何か伝えようと思っている。","tag":"#受け継ぐ","confidence":92},{"id":"2026-W24-028","pattern":"⑨リプ完結型","theme":"梅雨仕込みのお香を真夏に焚いた日","body":"梅雨に仕込んだお香を、\n真夏に初めて焚いた日のことを覚えている。\n\n続きはリプで。","reply":"梅雨の湿度を含んで仕込んだものは、\n乾いた夏に焚くと、何か「戻ろうとする」感じがある。\n\n煙が少しだけ重くて、粘り強い。\n\n季節を越えた素材の記憶が、\n煙になって出てくる気がした。\n\n「季節が変わったな」と感じた瞬間はありますか？","tag":"#余韻","confidence":89},{"id":"2026-W24-029","pattern":"⑨リプ完結型","theme":"忘れられないメッセージ","body":"お客さんから来た、\n忘れられないメッセージがある。\n\n今日も何度か読み返した。\n\nリプ欄に。","reply":"「母が入院している間、\n毎日一本焚いていました。\n退院した日も、焚きました。\n煙が変わらずそこにいてくれて、助かりました」\n\nお香に何かができるとしたら、\n「そこにいること」だと思っている。\n\nあなたにとっての「そこにいるもの」は何ですか？","tag":"#暮らし","confidence":93},{"id":"2026-W24-030","pattern":"⑨リプ完結型","theme":"3代目に怒られた話","body":"工場の3代目に、\n一度だけ怒られたことがある。\n\nなぜ怒られたかを、リプ欄で。","reply":"「値段を下げてほしい」と言った時だった。\n\n「価格を下げるということは、\nどこかを削るということ。\nわたしは削るものを持っていない」\n\nそれ以来、値段の交渉をしたことがない。\n\n「削れないもの」を持っている人と、\n取引できていることが誇りだと思っている。","tag":"#手仕事","confidence":91},{"id":"2026-W24-031","pattern":"⑩二択型","theme":"梅雨の雨音、好きですか？","body":"「梅雨の雨音」が好きですか？\n\n　A：好き、静かになるから\n　B：好きじゃない、気分が沈む\n\nどちらに近いですか？\n\n正直に教えてほしい。","reply":"Aの人に聞きたい。\n雨音の中でお香を焚いたことはありますか？\n\nBの人に聞きたい。\n「この雨の間は、ゆっくりしていい」\nと自分に言ったことはありますか？\n\nどちらの答えを聞いても、嬉しい。","tag":"#暮らし","confidence":89},{"id":"2026-W24-032","pattern":"⑩二択型","theme":"朝の煙と夜の煙","body":"朝に焚く煙と、\n夜に焚く煙。\n\nどちらが「長く見ていられる」と思いますか？\n\nわたしは、圧倒的に夜派。","reply":"朝の煙は「今日が始まる」から\n早く消えてほしくなる。\n\n夜の煙は「今日が終わる」から\nゆっくり消えてほしくなる。\n\n同じ煙なのに、時間によって\n「一緒にいたい時間」が変わる。\n\nあなたは朝派ですか、夜派ですか？","tag":"#選択","confidence":90},{"id":"2026-W24-033","pattern":"⑩二択型","theme":"父の日：使うものか残るものか","body":"父の日のプレゼントを選ぶなら、\n\n　A：使ってなくなるもの\n　B：手元に残るもの\n\nどちらを選びますか？\n\nお香は、Aです。","reply":"「なくなるもの」を贈るのは、\n少し勇気がいる。\n\nでも毎日使って、煙になって消える経験が\n「選んでくれた人のことを思い出す機会」になる。\n\n残るものは「思い出す」まで待つ。\n使うものは「使うたびに思い出す」。\n\nどちらが好きですか？","tag":"#選択","confidence":88},{"id":"2026-W24-034","pattern":"⑩二択型","theme":"梅雨の部屋：窓開ける派 vs 閉める派","body":"梅雨の部屋、\n\n　A：窓を開けて外の空気を入れる\n　B：窓を閉めて空調で管理する\n\nどちら派ですか？\n\nお香を焚くなら、どちらがいいと思いますか？","reply":"Aの場合、雨の匂いと煙が混ざる。\nBの場合、煙だけがある閉じた空間になる。\n\nどちらも正解で、\n「今日の気分」で変えるのが一番いいと思っている。\n\n部屋の空気、今日はどうしていますか？","tag":"#暮らし","confidence":87},{"id":"2026-W24-035","pattern":"⑪失敗学び型","theme":"梅雨前に在庫を増やして失敗","body":"梅雨前に、在庫を多めに仕込んだ年がある。\n\n「雨続きで発送が遅れるかも」という\n予防のつもりだった。\n\n見事に失敗した。","reply":"梅雨前に仕込んだ素材が、\n梅雨の湿気をたっぷり吸ってしまった。\n\n密封が甘かった一部のロットが、\n品質を落とした。\n\n今は逆に、梅雨前には在庫を絞る。\n「備えが裏目」になることを学んだ。\n\n準備しすぎて失敗した経験ありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W24-036","pattern":"⑪失敗学び型","theme":"お香を焚きすぎた夜","body":"蒸し暑い夜に、お香を3本同時に焚いた。\n\n「涼しくなるかも」と思って。\n\nならなかった。逆に頭が痛くなった。","reply":"お香は「多く焚けば効果が上がる」ものではない。\n\n煙が多すぎると、\n部屋の酸素を消費して、\n逆に息苦しくなる。\n\n一本で十分な品質を出せているか、\nが大事。\n\n「多ければいい」が間違いだった経験はありますか？","tag":"#国産お香","confidence":84},{"id":"2026-W24-037","pattern":"⑪失敗学び型","theme":"「梅雨限定」を断念した話","body":"「梅雨限定のお香」を\n作ろうとしたことがある。\n\n試作を重ねて、結局出さなかった。\n\n理由は意外なところにあった。","reply":"「梅雨らしい香り」を考えた時、\nわたしが思い浮かべたのは\n土の匂い、雨の匂い、草の匂い。\n\nそれを再現しようとすると、\n人工的な香料が必要になる。\n\n天然素材だけでは「梅雨」は作れなかった。\n\n諦めることで見えた「自分のこだわり」が、\n逆に嬉しかった。\n\n諦めてよかった経験ありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W24-038","pattern":"⑫暦型","theme":"入梅から三週目","body":"入梅から数えると、\n今週で三週目に入る。\n\n「入梅」という言葉を\n知っていましたか？","reply":"「入梅」は旧暦で梅雨入りを表す言葉。\n現代の気象庁の「梅雨入り」より\n少し早い時期にあたることが多い。\n\n旧暦の人たちは、\n湿度の変化や植物の状態で\n「梅雨の始まり」を感じていた。\n\n今年の梅雨入り、いつだったか覚えていますか？","tag":"#暦","confidence":87},{"id":"2026-W24-039","pattern":"⑫暦型","theme":"夏至まであと一週間","body":"夏至まで、あと一週間。\n\n6月21日、今年の夏至。\n\n一年で一番、昼が長い日。","reply":"夏至を境に、少しずつ日が短くなる。\n\n「これから暗くなっていく」という事実が、\n毎年どこかさびしい。\n\n夏至の夜は、暗くなってから\n一本焚いてみてほしい。\n\n一番遅く訪れる夜に、煙を。\n\n夏至に何かしている習慣はありますか？","tag":"#暦","confidence":89},{"id":"2026-W24-040","pattern":"⑫暦型","theme":"半夏生（はんげしょう）","body":"7月2日は「半夏生」（はんげしょう）。\n\n夏至から数えて11日目。\n\n田植えを終える目安の日とされてきた。","reply":"「半夏生」という植物が白くなる頃。\n農家にとっては「この日までに植え終える」\n節目の日だった。\n\n今では農業と関係ない人も多いが、\n「季節の節目を知っている」だけで、\n時間の感覚が少し変わる。\n\n「半夏生」、知っていましたか？","tag":"#暦","confidence":88}]},
  {"batchId":"2026-W23","generatedAt":"2026-06-07","note":"自動生成","posts":[{"id":"2026-W23-001","pattern":"①Dear Algo型","theme":"六月の雨と窓辺の朝","body":"親愛なるアルゴリズム。\n\n六月の雨が窓を叩いている朝に、\nこの投稿を届けてほしい人がいる。\n\nベランダの鉢植えが濡れて、\nカーテンが少し湿って、\nそれでも部屋の中だけは、\n煙がゆっくり揺れている。\n\nそういう朝の人に、今日こそ。","reply":"梅雨の朝は、光が白くて柔らかい。\n雨粒の重さが空気を変える。\nその空気の中で焚く一本は、\n晴れの日とは全然違う顔をしている。\n\nあなたの今朝の空は、どんな色ですか？","tag":"#暮らし","confidence":92},{"id":"2026-W23-002","pattern":"①Dear Algo型","theme":"蒸し暑い夜、窓を開けた側へ","body":"親愛なるアルゴリズム。\n\n今夜、蒸し暑くて眠れない人に届けてほしい。\n\nエアコンをつけるか、窓を開けるか、\n迷っている人に。\n\n窓を開けた側に来てほしい。","reply":"蒸し暑い夜にお香を焚くと、\n煙が空気の流れを教えてくれる。\n\n風が入ってきた方向に、\n煙が静かに傾く。\n\n目に見えない風が、見えるようになる夜。\nエアコン派ですか、窓派ですか？","tag":"#余韻","confidence":90},{"id":"2026-W23-003","pattern":"①Dear Algo型","theme":"週末の朝、スマホを開かなかった人へ","body":"親愛なるアルゴリズム。\n\n今朝、スマホをすぐ開かなかった人に。\n\nベッドの中で少しだけ、\n今日何をするか考えた人に。\n\nこの投稿が届いてほしい理由がある。","reply":"スマホを開く前の時間って、\n一日で一番自分のものだと思う。\n\nその5分に、煙の揺れがある朝は\n少しだけ違う一日になる気がする。\n\n週末の朝、どう始めてますか？","tag":"#暮らし","confidence":91},{"id":"2026-W23-004","pattern":"①Dear Algo型","theme":"「丁寧な暮らし」に疲れた人へ","body":"親愛なるアルゴリズム。\n\n「丁寧な暮らし」という言葉に\n少し疲れた人に届けてほしい。\n\n頑張って「丁寧」にしなくていい。\nただ、一本焚く。それだけでいい。","reply":"「丁寧な暮らし」がプレッシャーになることがある。\n\nインテリア雑誌みたいにしなくていい。\n白い部屋じゃなくていい。\n\nただ、今この瞬間に\n煙が揺れているだけでいい。\n\nあなたにとっての「十分」って何ですか？","tag":"#呼吸","confidence":89},{"id":"2026-W23-005","pattern":"②構造的絶滅型","theme":"水車製粉所の現在地","body":"日本に残る水車製粉所が、いくつあるか知っていますか。\n\n数えたことがある。\n\n100を切っていた。","reply":"電気を使わず、水の力で粉を挽く。\nその仕組みを維持できる人間が、急速に減っている。\n\n機械なら交換できる。\nでも「水車を見て、聞いて、直す人」は\n育てるのに30年かかる。\n\n今いる職人が引退したら、終わる。\nこの事実を知っている人は少ない。","tag":"#手仕事","confidence":88},{"id":"2026-W23-006","pattern":"②構造的絶滅型","theme":"自然栽培農家が続ける矛盾","body":"「農薬を使わない」と決めると、\n収量は6割に落ちる。\n\nそれでもやっている農家が福岡にいる。","reply":"6割の収量で、市場価格と同じ値段では売れない。\nでも高くすると売れない。\n\nその矛盾の中で30年続けてきた農家から、\nうちは椨粉を仕入れている。\n\n「続けてくれてありがとう」と\n毎年思いながら。","tag":"#手仕事","confidence":87},{"id":"2026-W23-007","pattern":"②構造的絶滅型","theme":"3代続く工場の「4代目問題」","body":"3代続く工場には、\nたいてい同じ問題がある。\n\n「4代目をどうするか」問題だ。","reply":"長男が継がなかった場合、\n工場は「廃業」か「売却」の二択になる。\n\n工場の機械は専用品で、他に使い道がない。\n\nうちが取引している工場の3代目は、\n今年60を超えた。\n\n「まだ先の話」と言えなくなっている。","tag":"#受け継ぐ","confidence":86},{"id":"2026-W23-008","pattern":"③余白型","theme":"白い空の朝","body":"雨音がしている。\n\nカーテンを開けたら、\n空が白かった。\n\n一本、焚く。","reply":"白い空の朝は、\n煙の色もどこか白い。\n\n窓の外の白と、\n部屋の中の白が\nゆっくり混ざっていく。\n\n梅雨の朝が、好きになった。\nあなたの好きな天気は？","tag":"#余韻","confidence":90},{"id":"2026-W23-009","pattern":"③余白型","theme":"仕事終わりの静止","body":"今日の仕事が終わった。\n\n何もしたくなかったから、\nただ一本だけ焚いた。","reply":"何かをするための準備じゃない。\n何かを終わらせるためでもない。\n\nただ、煙がある部屋に\n自分がいるだけ。\n\nそれが今日の全部だった。\n\nそういう日、最近ありましたか？","tag":"#余韻","confidence":89},{"id":"2026-W23-010","pattern":"③余白型","theme":"紫陽花の道から帰って","body":"紫陽花が咲いている道を通った。\n\n家に帰って、一本焚いた。\n\nそれだけの話。","reply":"「なぜそうしたの？」と聞かれたら、\nうまく答えられない。\n\nでもその「なんとなく」の積み重ねが\n暮らしになっていく気がする。\n\nあなたにも「なんとなくそうしてしまう」\n小さな習慣ありますか？","tag":"#暮らし","confidence":88},{"id":"2026-W23-011","pattern":"③余白型","theme":"音のない土曜日","body":"土曜の午後。\n\nテレビを消した。\nスマホも、伏せた。\n\n煙だけが動いていた。","reply":"静かにしようと思ってしたわけじゃない。\nただ、そうなっていた。\n\nその時間の後、\nなんとなく体が軽かった。\n\n音のない時間、意外と好きですか？","tag":"#静けさ","confidence":91},{"id":"2026-W23-012","pattern":"④水車静寂型","theme":"梅雨の川と水車の音","body":"梅雨になると、川が速くなる。\n\n水車の音が変わる。\nゴ、ゴ、ゴ、と重くなる。\n\nその水で、粉が挽かれる。","reply":"水車の速度が変わると、\n粉の粒子も変わる。\n\n雨の多い梅雨に挽かれた粉は\n少しだけ荒く、力強い。\n\n季節の違いが粉に出て、\n粉の違いが煙に出る。\n\n自然とはそういうものらしい。","tag":"#手仕事","confidence":87},{"id":"2026-W23-013","pattern":"④水車静寂型","theme":"「水があるから」という答え","body":"なぜ電気を使わないのか、と聞いた。\n\n「水があるから」と言った。\n\n深い答えだと思った。","reply":"電動製粉機の方が、\n均一で、早くて、安い。\n\nそれでも「水があるから」という言葉は、\n何百年もそこにあった理由そのものだった。\n\n川があれば粉が挽ける。\nその単純さが、今も続いている。\n\nあなたの「変えない理由」はありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W23-014","pattern":"④水車静寂型","theme":"夜中の水車場","body":"夜中の水車場に行ったことがある。\n\n水の音だけが聞こえて、\n他は何もなかった。\n\n月が川に映っていた。","reply":"水車は夜も回っている。\n\n誰もいない場所で、\n誰も頼んでいないのに、\nただ粉を挽き続けている。\n\nその粉で作ったお香を、\n今朝焚いた。","tag":"#静けさ","confidence":88},{"id":"2026-W23-015","pattern":"⑤未完ストーリー型","theme":"屋久杉の原木を触った日","body":"初めて屋久杉の原木を触った日のことを、\nまだ覚えている。\n\n続きはリプ欄で。","reply":"木目が細かすぎて、年輪が数えられなかった。\n\n「これ、何年ですか」と聞いたら、\n「わからない、千年は超えてる」と言われた。\n\n千年分の時間を\n今日焚いた。\n\nあなたが触れた中で「時間の重さ」を感じたものは？","tag":"#素材","confidence":91},{"id":"2026-W23-016","pattern":"⑤未完ストーリー型","theme":"配合を変えて失敗した秋","body":"去年の秋、配合を変えた。\n\n全部失敗した。\n\n続きはリプ欄に。","reply":"比率を少し変えただけで、\n全然違う煙になる。\n\n3ヶ月かけて調整して、\nようやく元に戻った。\n\n「変えない」という選択が\nどれだけ難しいか、あの秋に学んだ。\n\n似たような経験、ありますか？","tag":"#手仕事","confidence":89},{"id":"2026-W23-017","pattern":"⑤未完ストーリー型","theme":"農家の畑の端に立った","body":"初めてタブノキ農家を訪ねた時、\n畑の端に立って黙っていた。\n\n理由は、リプ欄で。","reply":"農薬を使わないと、雑草が生い茂る。\n\n草だらけの畑を見て、\n「これが自然栽培か」と思った。\n\n綺麗じゃない。でも、豊かだった。\nあの景色が今も忘れられない。\n\n「綺麗じゃないけど豊か」なもの、\nあなたの周りにありますか？","tag":"#手仕事","confidence":87},{"id":"2026-W23-018","pattern":"⑥専門家裏側型","theme":"椨粉の粒度チェックは手のひらで","body":"椨粉の粒度チェックは\n手のひらで触ってわかる。\n\n機械を使わない。","reply":"指の腹に粉をのせて、こすり合わせる。\n\nザラつきの感触で\n「今日は少し荒い」「今日は細かい」がわかる。\n\n30年続けると、手が目になる。\n\n「体で覚えた」仕事ってありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W23-019","pattern":"⑥専門家裏側型","theme":"お香の品質劣化を見分ける煙の色","body":"お香の品質が落ちているサインを\n知っていますか？\n\n煙の「色」で見ます。","reply":"良いお香の煙は、白くてまっすぐ。\n劣化したお香は、煙が茶色くなる。\n\n湿気を吸って変質したか、\n原料が酸化したか、どちらか。\n\n買った時と煙の色が違うと感じたら、\n保管場所を見直すサインです。\n\n保管、気にしていますか？","tag":"#国産お香","confidence":85},{"id":"2026-W23-020","pattern":"⑥専門家裏側型","theme":"梅雨・夏のお香保管の3つのNG","body":"梅雨から夏、\nお香の天敵は「湿気」です。\n\nやってはいけないことが3つある。","reply":"①直射日光が当たる場所\n②水回りの近く（キッチン、洗面所）\n③密閉していない状態での高温保管\n\n涼しくて暗くて、密閉できる場所が正解。\n\n夏越しさせてあげてください。\n\n今の保管場所、大丈夫そうですか？","tag":"#国産お香","confidence":84},{"id":"2026-W23-021","pattern":"⑦デジタルデトックス型","theme":"スマホを10分だけ別室に置いた","body":"今夜、10分だけ\nスマホを別の部屋に置いてみた。\n\n思ったより長かった。","reply":"10分って短いはずなのに、\n手持ち無沙汰で3回部屋を往復した。\n\nそれほどまでに、\nスマホを持っている手が「普通」になっていた。\n\nその10分に、お香を一本。\n煙を見ているだけで、10分が満ちた。\n\n試してみますか？","tag":"#整える","confidence":91},{"id":"2026-W23-022","pattern":"⑦デジタルデトックス型","theme":"通知を全オフにした夜","body":"通知を全部オフにした夜、\n部屋が静かすぎて落ち着かなかった。\n\nでも一時間後には、\n眠れていた。","reply":"通知音って「いつ来るかわからない」から\nずっと気になってしまう。\n\nそれをなくすと、\n今この部屋に何があるかだけを\n感じられるようになる。\n\nその感覚、久しぶりだった。\n\n通知、オフにしたことありますか？","tag":"#整える","confidence":89},{"id":"2026-W23-023","pattern":"⑦デジタルデトックス型","theme":"一日11時間、画面を見ていた","body":"一日、何時間、画面を見ていますか。\n\nわたしは先週、計ってみた。\n\n正直に書きます。","reply":"11時間だった。\n\n起きている時間の約7割。\n\nそれを知って、\n夜だけは画面から離れようと決めた。\n\n今はその時間に、煙を見ている。\n\nあなたは何時間くらいだと思いますか？","tag":"#呼吸","confidence":88},{"id":"2026-W23-024","pattern":"⑧素材の叫び型","theme":"タブノキが自分を知っている","body":"タブノキを切ると、\n独特の香りが出る。\n\nこの木、自分が誰かを知っている。","reply":"樹皮を剥ぐと、内側が赤い。\n\nその赤さが、乾燥すると消えて\n粉になって、煙になる。\n\n木が変わっていく過程を\nすべて手で触ってきた。\n\n自分の仕事の「元」を見たことありますか？","tag":"#素材","confidence":87},{"id":"2026-W23-025","pattern":"⑧素材の叫び型","theme":"屋久杉の重さは時間の重さ","body":"屋久杉は、重い。\n\n同じサイズの他の杉の\n倍くらいある。\n\n密度が違う。","reply":"屋久島の過酷な環境で育つと、\n木の細胞が詰まる。\n\nその密度が「香り」になる。\n\n軽い木からは軽い香りしか出ない。\n重さは、時間の重さだと思う。\n\n重みのある香り、好きですか？","tag":"#素材","confidence":89},{"id":"2026-W23-026","pattern":"⑧素材の叫び型","theme":"椨粉の色が天気を教える","body":"椨粉には、\n同じものが一つもない。\n\n同じ農家の、同じ畑でも、\n年によって色が変わる。","reply":"今年の椨粉は、少し茶色みが強い。\n\n去年より雨が多かったからかもしれない。\n天気が粉の色になる。\n\n工場の職人さんが、\n「今年は違いますね」と言っていた。\n\n天気が食べ物の味を変えた経験ありますか？","tag":"#素材","confidence":88},{"id":"2026-W23-027","pattern":"⑨リプ完結型","theme":"初めてお香を焚いた日の記憶","body":"初めてお香を焚いた日のことを、\n今でも覚えている。\n\nリプ欄に続く。","reply":"小学生の頃、祖父の家でお線香の煙を見ていた。\n\n「なぜ煙が消えないのに見えるのか」\nずっと不思議だった。\n\nあの疑問が、今の仕事の出発点かもしれない。\n\nあなたの「初めてお香」の記憶はありますか？","tag":"#暮らし","confidence":90},{"id":"2026-W23-028","pattern":"⑨リプ完結型","theme":"工場に初めて泊まった朝","body":"取引先の工場に、\n初めて泊めてもらった夜があった。\n\n続きはリプで。","reply":"翌朝5時、職人さんが動き出す音がした。\n\n機械の音じゃない。水の音だった。\n\n「朝一番は川の具合を見に行く」と言われた。\nそれが30年変わらない習慣らしい。\n\n毎朝続けていることって、ありますか？","tag":"#手仕事","confidence":91},{"id":"2026-W23-029","pattern":"⑨リプ完結型","theme":"お客さんの思いがけない一言","body":"先日、お客さんから\n思いがけないことを言われた。\n\n詳しくはリプ欄で。","reply":"「このお香を焚いている間、\n夫との喧嘩をしていない気がします」\n\nそう書かれていた。\n\nお香に何かある、というより、\n焚く行為に何かある気がした。\n\nあなたにとってお香が「何かを変えた」経験はありますか？","tag":"#暮らし","confidence":92},{"id":"2026-W23-030","pattern":"⑨リプ完結型","theme":"香りのタイムマシン","body":"香りと記憶は直結している。\n\nある日、突然それを証明されることがある。\n\nリプ欄で。","reply":"先日、新しいお香の試作品を嗅いだら、\n祖母の台所の匂いがした。\n\nどこにも行っていないのに、\n一瞬でそこに戻れた。\n\n香りって、タイムマシンだと思う。\n\nあなたを「あの場所」に連れていく香りはありますか？","tag":"#余韻","confidence":93},{"id":"2026-W23-031","pattern":"⑩二択型","theme":"焚く場所：寝室 vs リビング","body":"お香を焚くなら、\n\n「寝室」と\n「リビング」\n\nどっちが好きですか？\n\nわたしは、断然寝室派です。","reply":"寝室は「一日の終わり」の場所だから、\n煙が一緒に眠りについてくれる感じがする。\n\nリビング派の理由も聞いてみたい。\n「みんなと同じ空気を吸う」感じがいいのかな。\n\nどちらで焚きますか？","tag":"#暮らし","confidence":90},{"id":"2026-W23-032","pattern":"⑩二択型","theme":"梅雨、好き？嫌い？","body":"梅雨が「好き」な人と\n「嫌い」な人、\n\n割合はどちらが多いと思いますか？\n\n正直に教えてほしい。","reply":"意外と「好き」派がいる感覚がある。\n\n雨の音が好きとか、\n読書が捗るとか、\n外に出ない言い訳ができるとか。\n\nお香を焚く人には\n梅雨が好きな人が多い気がしている。\n\nどちらですか？","tag":"#暮らし","confidence":88},{"id":"2026-W23-033","pattern":"⑩二択型","theme":"朝と夜、どちらに焚く？","body":"お香を焚くのは\n\n「朝一番」か\n「夜寝る前」か\n\nどちら派ですか？\n\n切り替えの使い方が全然違うと思って。","reply":"朝派は「今日を始める儀式」として。\n夜派は「今日を終わらせる儀式」として。\n\nどちらも正解だけど、\n両方やっている人がいたら、\nその使い分けをぜひ教えてほしい。","tag":"#選択","confidence":89},{"id":"2026-W23-034","pattern":"⑩二択型","theme":"一本 vs 複数本","body":"一度に焚くのは\n\n「必ず一本だけ」派と\n「気分で複数本」派、\n\nどっちですか？\n\nうちは一本派です。理由をリプで。","reply":"一本にこだわるのは、\n「一本で十分な量の香りを出せる」という\n職人の自信があるから。\n\nたくさん焚けば強くなるのではなく、\n一本の質で勝負している、という意思表示でもある。\n\nあなたは何本派ですか？","tag":"#選択","confidence":88},{"id":"2026-W23-035","pattern":"⑪失敗学び型","theme":"仕入れ先を変えて戻した話","body":"一度だけ、\nコスト削減のために別の仕入れ先に変えた。\n\n3ヶ月で戻した。","reply":"価格が3割安かった。\nでも、粉の粒子が均一すぎた。\n\n「均一」は機械にしかできない。\n水車で挽くと、粒子にばらつきが出る。\n\nそのばらつきが「深み」になると、\n変えて初めてわかった。\n\n「失ってわかった大切なこと」ありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W23-036","pattern":"⑪失敗学び型","theme":"夏越し失敗の教訓","body":"3年前、在庫を持ちすぎた。\n\n半年分の椨粉が、\n夏を越えられなかった。","reply":"湿気と高温で、酸化が進んだ。\n\n天然素材は生き物に近いから、\n「余裕を持って大量仕入れ」が\n正解じゃないことがある。\n\n今は「3ヶ月サイクル」に変えた。\n少量多回転が正解だった。\n\n似たような「持ちすぎた」経験はありますか？","tag":"#暮らし","confidence":85},{"id":"2026-W23-037","pattern":"⑪失敗学び型","theme":"「100%天然」と書いて指摘された","body":"以前、「100%天然」という言葉を\nそのままSNSに書いた。\n\nすぐに指摘が来た。","reply":"「水は天然ですか、添加物ですか」という質問だった。\n\n厳密に言えば、水も添加物とも言える。\n\nそれ以来、「天然」という言葉は使わなくなった。\n正確な言葉を選ぶことが、誠実さだと学んだ。\n\n言葉の使い方で気をつけていることってありますか？","tag":"#手仕事","confidence":84},{"id":"2026-W23-038","pattern":"⑫暦型","theme":"芒種（ぼうしゅ）の頃","body":"6月6日は「芒種」（ぼうしゅ）。\n\n稲の穂が出る前の、種まきの季節。\n\n「芒」（のぎ）とは、稲の先端の棘のこと。\n梅雨も、この頃に始まる。","reply":"芒種の頃、梅雨も始まる。\n\n雨が降るから種が育つ。\n種が育つから秋に収穫できる。\n\n農業も、お香の原料も、\n雨の季節があってこそ続いている。\n\n「芒種」という言葉、知っていましたか？","tag":"#暦","confidence":87},{"id":"2026-W23-039","pattern":"⑫暦型","theme":"夏至まであと二週間","body":"夏至まで、あと約二週間。\n\n一年で一番昼が長い日。\n\n日が暮れるのが遅い夜に、\nお香を焚く時間が変わる。","reply":"夏至の夜は、7時を過ぎても空が明るい。\n\n「暗くなってから焚く」習慣がある人は、\n焚く時間が自然と遅くなる。\n\n夏至を境に、少しずつ夜が長くなる。\nそのことが、なぜか毎年少し嬉しい。\n\n夏至に何かしていることはありますか？","tag":"#暦","confidence":88},{"id":"2026-W23-040","pattern":"⑫暦型","theme":"蛍の季節と水車場","body":"六月、川辺に蛍が出る季節。\n\n水車場の近くにも、\n蛍が来るらしい。","reply":"水が綺麗な場所にしか蛍は来ない。\n\n水車で粉を挽ける場所には、\n蛍が来る川がある。\n\nそれだけで、\nその水で挽いた粉を信じられる気がする。\n\n今年、蛍を見ましたか？","tag":"#暦","confidence":90}]},

":"②構造的絶滅型","theme":"水車製法が電力化されなかった理由","body":"なぜ今も水車なのか。\n\n電動に変えると：\n①コストが下がる\n②均一に挽ける\n③天候に左右されない\n\nそれでも変えなかった理由は、\n「電力にすると粉の温度が上がる」から。\n\n熱が椨粉の香り成分を飛ばしてしまう。\n水車は、熱を生まない。","reply":"「なぜ水車にこだわるのか」を\nコストや伝統の話だと思っていた。\n\n違った。香りの話だった。\n\n電動より水車の方が「香りが生きる」という、\n科学的な理由があった。\n\nこだわりには、必ず根拠がある。","tag":"#手仕事","confidence":89},{"id":"2026-W22-022","pattern":"③余白型","theme":"夜中の雨音とお香","body":"夜中に目が覚めた。\n\n雨が降っていた。\n\n眠れないまま一本焚いて、\n暗い部屋で煙を見ていた。\n\n朝になる前の時間。\nそれだけのことだったけど、忘れない夜になった。","reply":"夜中に目が覚める時って、\n何か考えていることがあるんだと思う。\n\nお香を焚くと、その「何か」と\nゆっくり向き合える気がする。\n\n解決はしない。でも少し、整う。","tag":"#余韻","confidence":90},{"id":"2026-W22-023","pattern":"⑩二択型","theme":"お香の置き方","body":"お香を焚く時、\n\n「立てて焚く」か「寝かせて焚く」か\n\nどちらが好きですか？\n\n香立てに立てる派と、\n横型の皿に寝かせる派。\n煙の広がり方がまったく違う。","reply":"寝かせる派の声が多い気がしている。\n\n横に寝かせると、煙が低く這うように広がって、\n部屋全体にゆっくり香りが満ちる。\n\n立てると、上に向かって一筋の線になる。\n\n気分によって変えても、いいと思う。","tag":"#暮らし","confidence":88},{"id":"2026-W22-024","pattern":"⑤未完ストーリー型","theme":"梅雨の工場訪問","body":"梅雨の盛りに、工場を訪ねた。\n\n工場中に、乾燥中のお香が並んでいた。\n白い香煙のような気体が、\n床を這っていた。\n\n続きはリプ欄に。","reply":"「これ、なんですか」と聞いたら、\n「蒸気ですよ」と。\n\n乾燥の過程で、お香から水分と一緒に\n微かな香り成分が立ち上がっているらしい。\n\n工場全体が、お香の匂いで満ちていた。\n製品になる前から、もう、お香だった。","tag":"#手仕事","confidence":90},{"id":"2026-W22-025","pattern":"①Dear Algo型","theme":"夏至を前にした光","body":"親愛なるアルゴリズム。\n\n6月の光が、少しずつ長くなっている。\n夏至まで、あと数週間。\n\n一年で一番、昼が長い日が来る前に。\n\n光の中でお香を焚いている人に届けたい。\n今年の夏至をどう迎えるか、もう考えている人に。","reply":"夏至の朝に焚くお香を、\nもう選んでいる人がいると信じている。\n\nそういう人が、届け先でいてほしい。","tag":"#暦","confidence":91},{"id":"2026-W22-026","pattern":"⑦デジタルデトックス型","theme":"梅雨の午後、画面から目を離す","body":"梅雨の午後、画面から目を離せない日があった。\n\nニュースも、SNSも、メールも。\n全部「今すぐ確認しないといけない気がする」になっていた。\n\nお香を一本焚いて、20分だけ離れた。\n\n世界は、何も変わっていなかった。","reply":"「20分離れても世界は変わらない」は、\n体験しないとわからない。\n\nお香の一本分、約20分。\n\nその間に見逃したものは、\n今日の本当に大事なことじゃなかった気がする。","tag":"#暮らし","confidence":87},{"id":"2026-W22-027","pattern":"⑨リプ完結型","theme":"屋久島に行ったことがない","body":"屋久杉を使っているのに、\nまだ屋久島に行ったことがない。\n\n行きたいのか聞かれると、\n正直わからない。\n\n続きはリプ欄に。","reply":"「知らないまま使っている」ことへの\n罪悪感と好奇心が混ざっている。\n\n工場長は「行かなくていい、想像で十分」と言う。\n\n木目に触れた時の感触が、\nもう屋久島だと思えるから。\n\nまだ迷っている。","tag":"#素材","confidence":89},{"id":"2026-W22-028","pattern":"⑧素材の叫び型","theme":"福岡の椨粉が語ること","body":"福岡の山で育った椨粉が言っている。\n\n「農薬なしで育つのは、時間がかかる。\n肥料なしで育つのは、土が強くないといけない。\n\nその土が、福岡のあの山にある。\nだから、ここでしか育てられない。」\n\n産地の意味を、素材が知っている。","reply":"「国産」「無添加」は言葉として便利だけど、\n本当は場所の話だと思う。\n\n福岡のあの山の、あの土の、あの椨粉。\n\n代替がない。\nだから、続けてくれている農家に頭が下がる。","tag":"#素材","confidence":88},{"id":"2026-W22-029","pattern":"⑥専門家裏側型","theme":"梅雨前の最終検品","body":"梅雨入り前に、最終検品を終えた。\n\n確認したこと：\n・香りの強度（湿気による変化がないか）\n・折れやすさ（乾燥が十分か）\n・色のムラ（素材のばらつき）\n\nすべてクリア。今年の梅雨は、これで越す。\n\n検品は、お客さんに代わって焚く行為だと思っている。","reply":"「検品は誰のためか」と考えると、\n答えは明確で、\n受け取る人の最初の一本のため。\n\n最初の一本が良くないと、\nその人にとってのお香は、そこで終わる。\n\n最初の一本に、全部乗っている。","tag":"#国産お香","confidence":86},{"id":"2026-W22-030","pattern":"⑫暦型","theme":"入梅（にゅうばい）という言葉","body":"「入梅」という言葉がある。\n\n梅雨に入る日。\n雑節のひとつで、6月11日頃。\n\n「入梅いわし」という言葉もあって、\nこの時期のイワシが一番おいしいらしい。\n\n日本の暦は、食と連動している。\nお香も、季節と連動している気がする。","reply":"入梅の頃に焚くお香は、\n水分を含んだ空気の中で\n煙がよく広がる。\n\n梅雨はお香の季節だ、と\n毎年この時期に確信する。","tag":"#暦","confidence":87},{"id":"2026-W22-031","pattern":"⑪失敗学び型","theme":"湿気でお香を駄目にした話","body":"一度、在庫を全部駄目にした。\n\n梅雨の倉庫に3週間、除湿せずに置いた。\n箱を開けたら、白カビが生えていた。\n\n天然素材だから、当たり前だった。\nでも知らなかった。\n\n失った量と、教えてもらった知識の重さが\n今でも比例している。","reply":"「失って学んだことは忘れない」は本当で、\n梅雨が来るたびに、あの箱のことを思い出す。\n\n今は湿度管理が習慣になった。\n\n失敗が、今年のお香を守っている。","tag":"#暮らし","confidence":88},{"id":"2026-W22-032","pattern":"⑩二択型","theme":"梅雨の香り、好き・嫌い","body":"「梅雨の香り」が好きですか？\n\n雨が降り始める前の、\nあの土と草と湿気が混ざった匂い。\n\n好き派と嫌い派に、きれいに分かれる気がする。\nあなたはどちら？","reply":"好き派の人は、\nおそらくお香も好きだと思っていて。\n\n「自然の匂いに鼻が開いている人」は、\nお香の煙も受け取れる気がする。\n\nどちらでも、聞かせてください。","tag":"#暮らし","confidence":90},{"id":"2026-W22-033","pattern":"③余白型","theme":"窓を開けたら雨の匂い","body":"窓を開けたら、雨の匂いがした。\n\nまだ降っていない。\n降る前の、あの独特の土の香り。\n\nそのまま一本焚いた。\n\n外の匂いと、煙が重なって、\n部屋が梅雨になった。","reply":"「ペトリコール」という言葉がある。\n雨が降る前に地面から立ち上る匂いのこと。\n\nその言葉を知ってから、雨前に窓を開けるようになった。\n\nペトリコールとお香は、意外と合う。","tag":"#余韻","confidence":89},{"id":"2026-W22-034","pattern":"④水車静寂型","theme":"水車小屋の夜明け","body":"梅雨の水車小屋 \n\n自然栽培で、急かさず育てた木の粉は\nちゃんと「重い」。\n\n軽い粉との差が、\n焚いた時の香りの奥行きになる。","reply":"軽い椨粉は、さらさらしていて扱いやすい。\n重い椨粉は、しっとりとして、少し粘り気がある。\n\nその「粘り」に、土の時間が入っている気がして\n手でふれる度に思う。","tag":"#生産者支援","confidence":88},{"id":"2026-W21-021","pattern":"⑨リプ完結型","theme":"お香と睡眠の関係","body":"「お香を焚くと眠れますか？\n睡眠に使っている方いますか？」\n\nという質問をよくいただきます。\n知っている範囲で、リプ欄にまとめます。","reply":"【お香と睡眠について】\n\n眠る前に焚く派の方が多いです。\n\nポイントは：\n①短めのお香（5〜10分）で焚き切る\n②煙が出ているうちに消さない\n③換気しながら焚く\n\n「眠るために焚く」より、\n「今日を終わらせるために焚く」という感覚が合う方が多いようです。\n\n余韻の中で眠る、が正解かもしれません。","tag":"#お香のある暮らし","confidence":84},{"id":"2026-W21-022","pattern":"⑩二択型","theme":"存在感がある香りか控えめな香りか","body":"同じお香でも、量で強さが変わる。\nあなたはどちら派？\n\n🔥 存在感がある香り——焚いているとすぐわかる\n🍃 ふんわり漂う香り——気づいたらある、くらいの控えめさ\n\nその日の気分で変わる人も多いけど、\n「だいたいどちら」で答えてほしい。","reply":"「強め」の時は、自分の輪郭がほしい日。\n「弱め」の時は、消えていたい日。\n\n香りの強さが、気持ちの状態を教えてくれることがある。\n今日のあなたは、どちらを選びましたか？","tag":"#選択","confidence":92},{"id":"2026-W21-023","pattern":"⑪失敗学び型","theme":"急いでお香を折ってしまった","body":"急いでいる時に、\n香立てにお香を刺そうとして、折ってしまった。\n\n天然素材のお香は、折れやすい。\n特に湿気が少ない季節は、もろい。\n\n「急ぎながら焚く」が、\nそもそも矛盾だと気づいた。","reply":"お香を焚く時間は、「急がない時間」のはずで。\n\n急いでいる時に焚こうとすること自体が、\n「もう限界」のサインかもしれない。\n\n折れたお香を見て、\n少し笑えるくらいになった今が好きです。","tag":"#暮らし","confidence":84},{"id":"2026-W21-024","pattern":"⑫暦型","theme":"芒種（6月6日）を前に準備する","body":"もうすぐ芒種（ぼうしゅ）が来る。\n\n麦が実り、田に苗を植える季節。\n梅雨の始まりとも重なる。\n\n「忙しい」と読めるその漢字が、\nなぜか好きだ。\n\n今週は、その手前の静かな時間。","reply":"芒種は「種まきをする」という意味の節気。\n\n何かを始める前の、準備の季節。\n\n今週、来月にやりたいことを\nひとつだけ決めておくと、\n6月が少し変わるかもしれない。","tag":"#暦","confidence":88},{"id":"2026-W21-025","pattern":"①Dear Algo型","theme":"疲れた水曜日の夜の誰かへ","body":"親愛なるアルゴリズム。\n\n水曜日の夜、画面の前で\n「今週長いな」と思っている人がいると思う。\n\n特別なことは何もないのに、疲れた日。\n\nそういう人に届けたい。\n一本焚いて、煙を見るだけでいい夜がある。","reply":"「疲れた」と「休めた」の間に、\nお香の時間を置く。\n\n何もしない時間を作ることが、\n一番の回復方法だと思っています。","tag":"#呼吸","confidence":90},{"id":"2026-W21-026","pattern":"②構造的絶滅型","theme":"水車工場を消す「水利権」の問題","body":"水車を動かすには、川の水を使う権利がいる。\n「水利権」という仕組みが必要だ。\n\n水利権が取れなくなった水車工場が\n全国にある。\n\n「水が使えなければ、水車は回せない」\n\nこれが、製法より先に工場が消える理由になっている。","reply":"法律の問題が、文化を消すことがある。\n\n水利権の更新が、\n知られないまま切れていた工場を知っている。\n\n制度の問題は個人では変えにくい。\nだから「使い続ける」ことが、守ることになる。","tag":"#受け継ぐ","confidence":87},{"id":"2026-W21-027","pattern":"③余白型","theme":"家族が起きる前の10分","body":"朝、家族が起きる前の10分。\n\nお湯を沸かして、\n一本だけ焚いて、\n誰も話しかけてこない時間を持つ。\n\n「自分だけの朝」は、\n10分あれば十分だと知った。","reply":"「自分の時間がない」と感じている人に聞くと、\nたいてい10分の隙間はある。\n\nその10分を使う習慣が、\n一日の質を変えていく。\n\nあなたの「10分」は何時ですか？","tag":"#暮らし","confidence":89},{"id":"2026-W21-028","pattern":"④水車静寂型","theme":"水車小屋の中だけ時間が違う","body":"水車小屋の中は、外とは時間が違う。\n\n水が回る音、木がきしむ音、\n石臼が粉を挽く低い音。\n\n外の世界の速さが、ここでは関係ない。\n\nここで挽かれた粉を焚くたびに、\nあの別世界の静けさを思い出す。","reply":"「別世界があると知っている」ことが、\n日常を耐えられるものにしてくれる気がします。\n\n水車小屋でも、山の中でも、\n自分だけの「別世界」はどこですか？","tag":"#静けさ","confidence":86},{"id":"2026-W21-029","pattern":"⑤未完ストーリー型","theme":"農家から「今年は届けられない」連絡","body":"農家から、短いメッセージが来た。\n\n「今年の椨、量が取れませんでした。\n例年の半分以下です」\n\nそれだけ。理由は書いていなかった。\n\n続きはリプ欄に。","reply":"電話を入れた。\n\n「春先の霜にやられてしまって。\n今年は無理かもしれません」\n\n沈黙が続いた後、\n「来年は必ず」と言ってくれた。\n\n自然の中で作るということは、\n毎年が初めてということだと改めて思った。","tag":"#手仕事","confidence":92},{"id":"2026-W21-030","pattern":"⑥専門家裏側型","theme":"一番地味で一番大事な「検品」の話","body":"お香の仕事で、\n一番地味で一番大事な仕事は「検品」。\n\n一本一本、長さ・太さ・折れ・反りを確認する。\n\n機械で確認できる部分もあるが、\n最後は目と手でしか確認できないことがある。\n\n地味な仕事が、品質を守っている。","reply":"「全部同じに見える」お香に、\nどれだけの手間がかかっているか。\n\n「綺麗に揃っている」ことが、\n実は一番難しい仕事の結果です。\n\n机に並んだお香を、次に見てほしい。","tag":"#国産お香","confidence":85},{"id":"2026-W21-031","pattern":"⑦デジタルデトックス型","theme":"寝る前のSNSをやめたら翌朝が変わった","body":"寝る前にSNSを見ると、\n翌朝、なんとなく重い。\n\n代わりに一本焚いて、\n煙が消えるのを見てから眠ると、\n翌朝、なんとなく軽い。\n\n科学的な根拠はわからない。\nでも、自分の体が知っている。","reply":"「スマホをやめろ」ではなく、\n「焚いてから眠る」という提案なら\n実行できる人が増える気がしています。\n\nやめる代わりに、始める。\n小さな置き換えの力。","tag":"#整える","confidence":91},{"id":"2026-W21-032","pattern":"⑧素材の叫び型","theme":"屋久杉の年輪に閉じ込められた精油","body":"屋久杉の年輪は、他の杉より密だ。\n\n樹齢100年の木の断面を見ると、\n年輪が1ミリ以下の間隔で詰まっている。\n\nその密度の中に、\n100年分の精油が閉じ込められている。\n\n一本のお香に含まれる、100年の時間。","reply":"屋久杉の精油は、\n他の素材より「重い香り」がする。\n\n低くて、深くて、長く続く。\nそれは分子量の問題でもあるが、\n「時間の重さ」でもある気がしています。","tag":"#受け継ぐ","confidence":87},{"id":"2026-W21-033","pattern":"⑨リプ完結型","theme":"初めてのお香の選び方","body":"「お香を初めて買う時、\nどう選べばいいですか」\nという質問を最近よくいただきます。\n\n私なりの選び方、リプ欄に。","reply":"【初めてのお香の選び方】\n\nまず「使う場面」を決める：\n\n・集中したい時→白檀・杉系（落ち着く香り）\n・リラックスしたい→椨・桂皮系（甘さのある香り）\n・気分を切り替えたい→柑橘系が入ったもの\n\nただし、理屈より「なんか好き」が一番大事。\n\n最初の一本は、\n嗅いで「いいな」と思ったものを選んでください。\n理由は後からついてきます。","tag":"#お香のある暮らし","confidence":84},{"id":"2026-W21-034","pattern":"⑩二択型","theme":"仕事中に焚くか焚かないか","body":"あなたは仕事中、お香を焚きますか？\n\n✍️ 焚く——集中できる・切り替えができる\n🚫 焚かない——気が散る・においが残る\n\nどちらの派の人も、理由が気になります。\n「焚かない派」の理由も特に聞きたい。","reply":"「仕事中は焚かない」という人が意外と多いです。\n\n「好きすぎて気が散る」という理由に\n少し笑いながら、深く頷きました。\n\n好きなものは、オフの時間のために取っておく。\nそれも、一つの使い方。","tag":"#選択","confidence":91},{"id":"2026-W21-035","pattern":"⑪失敗学び型","theme":"高価なお香を湿気で台無しにした","body":"百貨店で買った伽羅入りのお香を、\n洗面台の近くに置いていた。\n\n1ヶ月後、香りがほとんどなくなっていた。\n\n水回りの湿気が、全部吸ってしまっていた。\n\n保管が悪ければ、素材がいくら良くても意味がない。","reply":"お香の保管の鉄則：\n\n①水回りから離す\n②直射日光を避ける\n③密封容器＋乾燥剤\n\n桐箱があれば理想的だが、\nジップ袋＋シリカゲルでも十分効果があります。\n\n買った後の「保管」が、品質の半分を決める。","tag":"#暮らし","confidence":84},{"id":"2026-W21-036","pattern":"⑫暦型","theme":"麦秋至（5月28日頃）・実りの移り目","body":"5月28日頃、七十二候では「麦秋至（ばくしゅういたる）」。\n\n麦が黄金色に実り、収穫の時を迎える。\n\n梅雨の前の、最後の実りの季節。\n\n穀物が満ちて、\n次の季節へと移っていく。\nこの「移り目」に焚く一本が、今週一番好き。","reply":"「麦秋」という言葉は矛盾しているように見えて、\n実は一番美しい季節の表現だと思っています。\n\n麦は夏に収穫するが、暦では秋と呼ぶ。\n日本語の季節感は、体で覚えるものです。","tag":"#暦","confidence":87},{"id":"2026-W21-037","pattern":"①Dear Algo型","theme":"週末の夜、一人でいる人へ","body":"親愛なるアルゴリズム。\n\n週末の夜、一人で部屋にいる。\n\nSNSを開けば賑やかな世界があるのに、\n閉じたくなる時がある。\n\nそういう夜に、一本だけ焚く。\n\n「一人でいることを選んでいる」時間の豊かさを、\n知っている人に届けたい。","reply":"一人の夜に焚くお香は、\n「孤独」じゃなくて「静けさ」になる。\n\nその違いを知っている人が、\nいつかお香を選ぶ時、\nここにある。","tag":"#静けさ","confidence":91},{"id":"2026-W21-038","pattern":"③余白型","theme":"瞑想より煙を見る方が続いた","body":"「何も考えない時間」を作りたいと思って、\n瞑想を試みた。\n\n10分で断念した。\n\n代わりに一本焚いて、煙を見ていた。\n気づいたら20分が過ぎていた。\n\n「何も考えないようにしない」方が、\n何も考えられる。","reply":"お香の煙を見ていると、\n自然と思考が止まる気がします。\n\n「瞑想」と言うと構えてしまう人も、\n「煙を見る」なら続けられる。\n\n形より、続けられることの方が大事です。","tag":"#呼吸","confidence":90},{"id":"2026-W21-039","pattern":"⑩二択型","theme":"毎日の習慣か気が向いた時か","body":"お香との関係、あなたはどちら派？\n\n📅 毎日の習慣——時間を決めて、毎日焚く\n🎲 気が向いた時だけ
