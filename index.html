go型","theme":"初夏の空気が変わってきた月曜日","body":"親愛なるアルゴリズム。\n\n月曜の朝、空気が変わっていた。\n\n先週より、少し重い。\n夏が、じわじわと近づいている。\n\nこういう変化に気づいてしまう人が、\nどこかにいる。\n\n「季節を感じている人」に、今日も届けたい。","reply":"季節の変化は、カレンダーより\n鼻と皮膚で先に知る。\n\n「なんか今日、空気が違う」と思った日に\n一本焚いてみてください。\n\n季節に乗る、という感覚になる。","tag":"#暮らし","confidence":91},{"id":"2026-W20-014","pattern":"②構造的絶滅型","theme":"「国産」という言葉が空洞化する仕組み","body":"「国産」という言葉が信頼を失っていく理由：\n\n①「国産」と書けば高く売れる\n②定義が曖昧なまま使われる\n③本物と偽物の見分けがつかない\n\nこの3つが重なると、\n「どうせ同じでしょ」になる。\n\nだから、農家の名前と産地を出す。\n言葉じゃなく、顔で伝える。","reply":"福岡で育った椨（タブ）を使っていること、\n農家と直接取引していること。\n\nこういう情報をつけると、\n「選ぶ理由」が生まれる。\n\n素材の「顔」が見えると、\n香りの見え方が変わる。","tag":"#生産者支援","confidence":88},{"id":"2026-W20-015","pattern":"③余白型","theme":"深夜の静かな時間","body":"夜中の2時、家の中が静かになる。\n\n誰かが寝て、\n通知も止まって、\n自分だけの時間がやってくる。\n\n一本だけ焚く。\n誰にも見せない時間に、\n一番好きな香りを使う。\n\nこれが、私のご褒美。","reply":"誰かのためでも、SNSのためでもない時間。\n\n「一人で焚く」のが、\n実はお香の一番深い使い方だと思っています。\n\n深夜に焚く方、いますか？","tag":"#静けさ","confidence":90},{"id":"2026-W20-016","pattern":"④水車静寂型","theme":"水が粉を挽く哲学","body":"水が、お香を作っている。\n\n厳密には、水が水車を回して、\n水車が石臼を動かして、\n石臼が椨粉を挽く。\n\n「水がお香を作っている」というのは\n少し詩的すぎるかもしれないが、\n\n川があるから、このお香がある。\nそれは、本当のことだ。","reply":"水車製法は、川の流れを借りている。\n\n自然の力を人間が借りて、\n素材を加工する。\n\nそういう「借りる」関係が、\n今の時代に足りないものな気がしています。","tag":"#手仕事","confidence":87},{"id":"2026-W20-017","pattern":"⑤未完ストーリー型","theme":"農家から「今年は」という連絡","body":"農家から短いメッセージが来た。\n\n「今年の椨は、いつもと少し違います」\n\nそれだけ。\n詳しいことは書いてなかった。\n\n続きはリプ欄に。","reply":"翌日、電話をかけた。\n\n「今年は日照りが長くて、\n葉が小さくなった。\n香りは濃いかもしれない」\n\n天候が、香りを変える。\nそれが自然素材ということだ。\n\n今年の椨粉を、楽しみにしている。","tag":"#手仕事","confidence":90},{"id":"2026-W20-018","pattern":"⑥専門家裏側型","theme":"椨粉の「粒度」が香りを決める話","body":"椨粉の粒子の細かさが、\n燃え方を決める。\n\n細かすぎると、すぐに燃え尽きる。\n粗すぎると、火が通らない。\n\n水車製法は、ゆっくり挽くから\n「ちょうどいい粒度」になりやすい。\n\nこれが、電気製法との一番の違い。","reply":"粒度は目に見えないけれど、\n焚いた時の「持ち」に出る。\n\n10分で消えるお香と、\n15分続くお香の差は、\n素材の差だけじゃなく、粒度の差でもあります。","tag":"#国産お香","confidence":85},{"id":"2026-W20-019","pattern":"⑦デジタルデトックス型","theme":"会議が終わらない日の切り替え","body":"今日は会議が5本あった。\n\n話し続けて、聞き続けて、\n頭の中が人の言葉でいっぱいになった。\n\n帰ってきて、一本焚いた。\n\n煙は何も言わない。\nその「何も言わない」が、今日一番の会話だった。","reply":"言葉を使い果たした日に、\n無言のものがそばにあると助かる。\n\nお香は喋らない。\nでも空気を変えることで、\n「もう十分だよ」と言っている気がする。","tag":"#整える","confidence":91},{"id":"2026-W20-020","pattern":"⑧素材の叫び型","theme":"屋久杉の時間密度","body":"屋久杉は、年輪が密だ。\n\n樹齢100年以上の木は、\n節と節の間隔が数ミリしかない。\n\n「100年で、ここまでしか育たない」\n\nその遅さが、密度になる。\n密度が、香りになる。\n\nこのお香一本に、\n何十年かの時間が入っている。","reply":"屋久杉の香りは、他の木と明らかに違う。\n\n重くて、深くて、長く続く。\n\nその「違い」は、時間の違い。\n人間の時間じゃない、\n木の時間が香りに出ている。","tag":"#受け継ぐ","confidence":88},{"id":"2026-W20-021","pattern":"⑨リプ完結型","theme":"お香の煙の正しい方向","body":"「お香を焚く時、煙の方向を\n気にする必要がありますか」\n\nという質問がきました。\nリプ欄に答えます。","reply":"【お香と煙の方向について】\n\n基本的に、煙の向きを気にしすぎる必要はありません。\n\nただし：\n\n①顔に直接当たると目が痛くなることがある\n②火災報知器の近くは避ける\n③窓の風で煙が流れる場所は換気になってgood\n\n自然な対流に任せれば、香りは部屋全体に広がります。\n\n「正解の向き」はないです。","tag":"#お香のある暮らし","confidence":85},{"id":"2026-W20-022","pattern":"⑩二択型","theme":"香りは強めか弱めか","body":"好きなお香の香り、どちら派？\n\n🌸 はっきり香る——焚いているとすぐわかる存在感\n🌿 ほのかに香る——気づいたらある、そんな控えめさ\n\nこれ、その日の気分で変わる人も多いかも。\n今日の「あなた」はどちら？","reply":"「強く香らせたい日」は、\n実は気持ちが不安定な日が多い。\n\n「ほのかでいい」と思える日は、\n自分の中が落ち着いている日が多い。\n\nお香の選び方が、心のバロメーターになっている。","tag":"#選択","confidence":92},{"id":"2026-W20-023","pattern":"⑪失敗学び型","theme":"香立てを誤魔化した結果","body":"香立てがなくて、\n砂の代わりに土を使ったことがある。\n\n最初は問題なかった。\nでも、湿気で土が固まった。\nお香が刺さらなくなった。\n\n「砂」には理由がある。\n湿気にくく、熱に強く、詰まらない。\n\n代用は、やってみないとわからない。","reply":"砂の代わりに使えるもの：\n・塩（湿気に強い）\n・細かい砂利\n・専用の香灰\n\n「土」は湿気るのでNG。\n「米」は燃えるのでNG。\n\n小さな失敗から学ぶことが、\n使い続けると積み重なっていく。","tag":"#暮らし","confidence":83},{"id":"2026-W20-024","pattern":"⑫暦型","theme":"入梅の前の「今」の価値","body":"気象庁の梅雨入り予想は、\nまだ先のはずだ。\n\n今週は、乾いた晴れが続く。\n\nこの「梅雨の前の今」を\n特別に感じるのは、\n日本人の季節の感覚だと思う。\n\n終わりを知っているから、\n今が輝く。","reply":"「もうすぐ梅雨か」と思いながら\n晴れの日に窓を開ける。\n\nそのひと呼吸に、一本焚く。\n\n梅雨の前の、乾いた空気の香りを\n記憶に焼き付けておく。","tag":"#暦","confidence":88},{"id":"2026-W20-025","pattern":"①Dear Algo型","theme":"週の疲れとお香の関係","body":"親愛なるアルゴリズム。\n\n今週も、なんとかやりきった。\n\n特別なことは何もなかったけれど、\n毎日一本焚いて、\n毎日なんとか眠れた。\n\n「それだけでよかった」と言える週末が\n一番好きだ。\n\nそういう小さな積み重ねを、大切にしている人に届けたい。","reply":"「今週どうだった？」と聞かれると\nうまく答えられないことが多い。\n\nでも一本焚いた日数だけは、\nなんとなく覚えている。\n\nそれが、私の週の記録。","tag":"#暮らし","confidence":90},{"id":"2026-W20-026","pattern":"②構造的絶滅型","theme":"電気製法が広まった本当の理由","body":"なぜ電気製法が広まったか。\n\n①速い（水車の10倍以上の生産量）\n②安い（水利費・維持費が不要）\n③均一（同じ粒度が安定して出る）\n\nこれは、「悪い選択」じゃない。\n\n消費者が「安く・均一に」を求めた結果、\n市場がそれに応えた。\n\nだから「違い」を伝え続けることが仕事になった。","reply":"電気製法を否定したいわけじゃない。\n\n「水車製法にしかない何か」を\n知った上で選ぶ人が増えることで、\n\n水車工場が続く理由になる。\n選択が、文化を守る。","tag":"#受け継ぐ","confidence":87},{"id":"2026-W20-027","pattern":"③余白型","theme":"雨の予報の前日","body":"明日は雨の予報。\n\n今日は最後の晴れだと思って、\n窓を全部開けて一本焚いた。\n\n風が来て、煙が横に流れた。\n\nそういう偶然の形が、\n今日だけのものになる。","reply":"煙が流れる方向は、毎回違う。\n\n「今日の煙」は、今日しかない。\n\nそれを「見た」という事実が、\n記憶に残っていく。","tag":"#余韻","confidence":89},{"id":"2026-W20-028","pattern":"④水車静寂型","theme":"水車が止まる日のこと","body":"水車は、水が少ないと止まる。\n\n夏の渇水期、秋の台風の前後、\n機械のメンテナンスの日。\n\n「今日は動いていない」という日がある。\n\nその分、動いている日の音が\n愛おしく聞こえる。","reply":"水車が止まっている日に工場を訪ねたことがある。\n\n「今日は静かですね」と言ったら、\n「そうですね、川も今日は少し疲れてるみたいで」と言われた。\n\n川が疲れている、という言葉が忘れられない。","tag":"#静けさ","confidence":86},{"id":"2026-W20-029","pattern":"⑤未完ストーリー型","theme":"3代目が初めて語った「悩み」","body":"工場の3代目と、居酒屋で飲んだ。\n\n仕事の話ではなく、\nただ飲んでいた。\n\n2杯目で、「実は」と彼が言った。\n\n続きはリプ欄に。","reply":"「後継者のことを、本当に悩んでいる」\n\n「子どもには継がせたくない、でも\n続けてほしい気持ちもある」\n\n正直な矛盾を、飲みながら話してくれた。\n\nその話を聞いてから、\nこのお香を焚く時の気持ちが変わった。","tag":"#受け継ぐ","confidence":91},{"id":"2026-W20-030","pattern":"⑥専門家裏側型","theme":"「合わない香り」との付き合い方","body":"お香には「合わない」と感じるものがある。\n\nそれは、鼻が拒否しているわけじゃない。\n\n「今の自分の状態」に合っていない。\n\n同じお香でも、体調や気分や季節によって\n感じ方が変わる。\n\n「合わない」は、拒絶じゃなく、タイミングの話。","reply":"「このお香、苦手だったのに\n急に好きになりました」\n\nという声をいただくことがある。\n\n変わったのは香りじゃなく、あなた自身。\n香りは、変化を映す鏡でもある。","tag":"#選択","confidence":86},{"id":"2026-W20-031","pattern":"⑦デジタルデトックス型","theme":"通知の海から浮き上がる方法","body":"起きてすぐスマホを見る。\n\nそれで一日が始まると、\n最初から「反応モード」に入ってしまう。\n\n起きたら一本だけ焚く。\n煙が消えてから、スマホを開く。\n\nそれだけで、「自分の朝」が戻ってくる。","reply":"「スマホを見ないようにする」は難しい。\n\n「先に別のことをする」は、できる。\n\n意志の力じゃなく、順番の力。\n小さな先行動作が、朝を変える。","tag":"#整える","confidence":92},{"id":"2026-W20-032","pattern":"⑧素材の叫び型","theme":"自然栽培の「ゆっくりさ」について","body":"自然栽培の椨は、成長が遅い。\n\n農薬や化学肥料で促進しないから、\n木が自分のペースで育つ。\n\n「遅い」は、欠点じゃない。\n\n時間をかけて育ったものには、\n時間分の何かが宿っている気がする。\n\nそれを「香り」と呼んでいる。","reply":"椨の農家の人が「急かすと木が怒る」と言った。\n\n冗談のような言葉だけど、\nそういう感覚で育てている人がいる。\n\n「急かさない」という選択が、\n素材の質を守っている。","tag":"#生産者支援","confidence":87},{"id":"2026-W20-033","pattern":"⑨リプ完結型","theme":"お香と花粉症の相性","body":"「花粉症なのですが、\nお香を焚いても大丈夫ですか」\n\nという質問をよくいただきます。\nリプ欄に整理しました。","reply":"【花粉症とお香について】\n\n天然素材のお香は、合成香料より\nアレルギー反応が出にくい傾向がありますが、\n個人差があります。\n\n試す場合は：\n①換気をしながら\n②少量（1本未満）から\n③体調の良い日に\n\n「合わない」と感じたらすぐに止めてください。\n\nお香は万人向けではないですが、\n合う方には季節の助けになります。","tag":"#お香のある暮らし","confidence":84},{"id":"2026-W20-034","pattern":"⑩二択型","theme":"同じ香りを使い続けるか変えるか","body":"お香、あなたはどちら派？\n\n🌿 いつも同じ——変わらない安心感、帰る場所\n🌸 季節や気分で変える——今の自分に合うものを\n\nどちらが正しいわけじゃない。\nでも、あなたの「理由」が聞きたい。","reply":"「いつも同じ」には哲学がある。\n変えないことで、今の変化に気づける。\n\n「気分で変える」にも哲学がある。\n香りを合わせることで、今の自分を知れる。\n\nどちらも、自分への向き合い方だと思っています。","tag":"#選択","confidence":91},{"id":"2026-W20-035","pattern":"⑪失敗学び型","theme":"高価なお香を特別扱いしすぎた話","body":"屋久杉入りのお香を買った時、\n「もったいない」と思って\nずっとしまっておいた。\n\n半年後に出したら、\n香りが少し抜けていた。\n\nお香は、使うためにある。\n飾るためじゃない。","reply":"「もったいない」という感覚は大切。\n\nでも、使わないまま劣化させることの方が\nもったいない。\n\n「特別な日に」と思っていると、\n「特別な日」はなかなか来ない。\n\n今日が、特別な日。","tag":"#暮らし","confidence":85},{"id":"2026-W20-036","pattern":"⑫暦型","theme":"5月の終わり、季節の変わり目を焚く","body":"5月も、もう半分を過ぎた。\n\n暦はもう夏。\n体はまだ春の感覚。\n\nこういう「はざまの時間」を\n日本人はずっと大切にしてきた。\n\n梅雨の前、夏の前、\nこのひと呼吸を大切にしたい。","reply":"季節の「はざま」を知る人が、\n豊かな暮らしをしている気がする。\n\n「もう夏だ」と気づいた今日に、\n一本だけ焚いてみてください。\n\n今の空気を、香りで受け取る。","tag":"#暦","confidence":88},{"id":"2026-W20-037","pattern":"①Dear Algo型","theme":"深夜に一人で焚く人へ","body":"親愛なるアルゴリズム。\n\n深夜に一人でこれを読んでいる人がいると思う。\n\n眠れないとか、\n考えすぎているとか、\nただ起きているとか。\n\nそういう人に届けたい。\n一本だけ焚いて、煙を見ていると、\n「これでいい」と思える夜がある。","reply":"深夜のお香は、少し違う顔をしている。\n\n昼間より煙がゆっくり上がる気がする。\n（気のせいかもしれない）\n\nでも「夜だけの静けさ」の中に\n一人でいる時間は、豊かだと思っています。","tag":"#静けさ","confidence":90},{"id":"2026-W20-038","pattern":"③余白型","theme":"何もない日曜日の豊かさ","body":"何も予定のない日曜日。\n\n朝起きて、お茶を入れて、\n一本焚く。\n\n午前中ずっと、特別なことは何もしない。\n\nでもなぜか、\n「いい休日だった」と思える。\n\n何もないことが、一番の贅沢。","reply":"「何もしない」は、意外と難しい。\n\nSNSを開いて、動画を見て、\n気づいたら何かに使われている。\n\n一本焚くと、「何もしない」が始まる。\n煙が消えるまでの時間が、\n本当の余白になる。","tag":"#余韻","confidence":89},{"id":"2026-W20-039","pattern":"⑩二択型","theme":"お香はひとりの時間か、誰かとの時間か","body":"お香を焚く場面、あなたはどちらが多い？\n\n🙋 自分だけの時間——ひとりの空間を作るために\n👫 誰かといる時間——空気を共有するために\n\n「どちらでも」な方も多いと思うけど、\n「どちらかといえば」で答えてほしい。","reply":"一人で焚く時は「自分に帰る」感じ。\n誰かと焚く時は「ここにいる」感じ。\n\n同じお香なのに、\n全然違う体験になる。\n\n香りは、関係の中で変わる。","tag":"#暮らし","confidence":91},{"id":"2026-W20-040","pattern":"⑥専門家裏側型","theme":"書き続ける理由——香りは言葉になる","body":"毎週お香のことを書いている。\n\n「なぜそんなに書けるのか」と聞かれる。\n\n正直に言うと、\n書けば書くほど知らないことが増える。\n\n素材のこと、農家のこと、\n使い手のこと、季節のこと。\n\n「知り尽くした」と思った瞬間、\n新しい扉が開く。\n\nだから書き続けられる。","reply":"お香を好きになってから、\n暮らしの「解像度」が上がった気がします。\n\n季節に気づく。素材に気づく。時間に気づく。\n\nこれを伝え続けることが、\n私の仕事だと思っています。","tag":"#暮らし","confidence":88}]},

07","pattern":"⑦デジタルデトックス型","theme":"母の日SNS疲れと切り替え","body":"母の日のSNSは\n「感動の家族写真」が流れてくる。\n\n素敵だけど、\n見ていると少し疲れる。\n\n画面を閉じて、窓を開けた。\n5月の空気が入ってきた。\n\nその瞬間だけで、十分だった。","reply":"SNSの「正解の母の日」を見ていると、\n自分の暮らしが貧しく見えてくる。\nでも画面を閉じると、\n今ここにある静けさが見えてくる。","tag":"#呼吸","confidence":90},{"id":"2026-W19-008","pattern":"⑧素材の叫び型","theme":"自然栽培の椨農家の言葉","body":"「自然栽培、ってどういう意味ですか」と農家の人に聞いた。\n\n「化学肥料も、農薬も使わない。\n土の力と、木の力に任せる」\n\n「それって大変じゃないですか」\n\n「大変だよ。でも、\nそうじゃないと香りが出ない」\n\n土が育てた香りが、ここにある。","reply":"自然栽培の椨粉と、慣行栽培の椨粉を\n同じ配合で焚いてみたことがある。\n\n正直、言われなければわからないかもしれない。\nでも「知ってから焚いた時」の味わいは変わった。\n知ることで、感じ方が変わる。","tag":"#生産者支援","confidence":86},{"id":"2026-W19-009","pattern":"⑨リプ完結型","theme":"お香の本数の目安","body":"「一度に何本焚けばいいですか」\nとよく聞かれます。\n\n正解はないけれど、\n目安はあります。リプ欄に。","reply":"【お香の本数の目安】\n\n・6畳以下：1本\n・6〜10畳：1〜2本\n・10畳以上：2〜3本\n\nただし、これはあくまで目安。\n大切なのは「多すぎず、少なすぎず」。\n\n焚いて、空気を吸って、\n「ちょうどいい」と思えれば、それが正解。\n最初は1本から始めてみてください。","tag":"#お香のある暮らし","confidence":85},{"id":"2026-W19-010","pattern":"⑩二択型","theme":"焚く場所：リビングか寝室か","body":"同じ1本でも、\n焚く場所で全然違う。\n\nあなたはどちら派？\n\n🛋 リビング——空間全体に香りを満たす\n🛏 寝室——眠りに落ちる前の、ひとりの時間\n\nどちらが正解でもないけれど、\n選んだ理由が気になります。","reply":"私は寝室派でした。今はリビング派になっています。\n一緒に住む人が変わったことで、\n焚く場所も変わった。\n\n暮らしの変化が、香りの使い方に出る。","tag":"#暮らし","confidence":92},{"id":"2026-W19-011","pattern":"⑪失敗学び型","theme":"贈り物のお香が使われなかった理由","body":"以前、お香を誰かへのプレゼントに選んだ。\n\n喜んでくれた。\nでも後から「焚けていない」と知った。\n\n理由を聞いたら\n「焚き方がわからなかった」と。\n\n贈る前に、焚き方を一緒に伝えるべきだった。","reply":"お香って、焚き台もないと使えない。\n「香りが好き」と「焚く習慣がある」は別の話。\n\nそれからは贈る時、\n「焚き台、持ってますか？」を必ず聞くようにした。\n小さな気遣いで、贈り物が活きる。","tag":"#暮らし","confidence":84},{"id":"2026-W19-012","pattern":"⑫暦型","theme":"立夏・暦の上の初夏","body":"立夏が過ぎた。暦の上では夏。\nでも5月の風はまだ涼しくて、\n夏の顔をした春みたいな日が続く。\n\nこういう「曖昧な季節」が\n一番好きだったりする。\n\nあなたは、どの季節の間が一番好きですか？","reply":"季節の変わり目は、お香の変え時でもあります。\n「軽くなっていく空気」に合わせて、\n調合もすこし変えています。\n\n立夏過ぎから始まる、初夏のブレンド。","tag":"#暦","confidence":88},{"id":"2026-W19-013","pattern":"①Dear Algo型","theme":"5月の夜の静けさ","body":"親愛なるアルゴリズム。\n\n5月の夜はまだ長い。\n\n昼間の喧騒が引いて、\n窓の外の緑の気配だけが残る。\n\nこういう夜に、一本だけ焚く。\n煙が上がって、静けさが濃くなる。\n\n「静かな夜」を求めている人に、届けたい。","reply":"夜の静けさは、探しに行くものじゃない。\n一本焚いて、座って待っていれば\n向こうからやってくる。\n\n今夜、試してみてください。","tag":"#静けさ","confidence":91},{"id":"2026-W19-014","pattern":"②構造的絶滅型","theme":"椨農家の後継者問題の構造","body":"福岡県産の椨（タブ）を育てる農家が\n減り続けている。\n\n理由は3つ：\n\n①収穫まで時間がかかる（数年単位）\n②「国産」の価格を上げられない市場構造\n③息子・娘が継がない\n\nでも今年も育てている人がいる。\nそれが全てだと思っている。","reply":"「なぜ続けるんですか」と聞いたら、\n「やめると誰もいなくなるから」と言った。\n\n使命感でも信念でもなく、\nただ「いなくなるから」。\n\nその静かな覚悟が、香りになっている。","tag":"#受け継ぐ","confidence":89},{"id":"2026-W19-015","pattern":"③余白型","theme":"梅雨前の乾いた空気","body":"梅雨になる前の、\nこの時期の空気が好きだ。\n\n乾いていて、緑の匂いがして、\n少しだけ光が強くなってきた感じ。\n\n毎年来るのに、\n毎年「今年も来た」と思う。\n\nこの空気の中で焚くお香は、\nすこし明るい気がする。","reply":"梅雨が近づくと、お香の香りの広がり方が変わります。\n湿気が増えると、煙が重くなる。\nだから今のうちに、一番好きな香りを焚く。","tag":"#呼吸","confidence":88},{"id":"2026-W19-016","pattern":"④水車静寂型","theme":"電気を使わない選択","body":"「なぜ電気を使わないんですか」\nと聞いたら、\n工場の人はこう言った。\n\n「電気だと速すぎるんです。\n速く挽くと、熱が出て\n香りの成分が飛んでしまう」\n\n遅さが、香りを守る。\n水車の仕事は、速さを捨てた選択だった。","reply":"速いことが正しいとは限らない。\n\nこの工場を訪ねてから、\n自分の仕事も「速さより深さ」を選ぶようになった気がします。","tag":"#手仕事","confidence":87},{"id":"2026-W19-017","pattern":"⑤未完ストーリー型","theme":"3代目工場主の一言","body":"3代続く工場の、今の当主に会った。\n\n「正直、やめようと思ったことはありますか」\nと聞いた。\n\nしばらく間があって、\n「あります」と言った。\n\n続きはリプ欄に。","reply":"「でも父が残したものを、形にしたいと思って。\n父には仕事の話、あまりできなかったから」\n\n工場の機械の音が、静かに鳴っていた。\n\nこれが「受け継ぐ」ということだと思った。","tag":"#受け継ぐ","confidence":92},{"id":"2026-W19-018","pattern":"⑥専門家裏側型","theme":"屋久杉の木端を使う理由","body":"屋久杉は、伐採できない。\n\n特別天然記念物に指定されているから。\nでは、なぜうちのお香に入っているのか。\n\n建材や仏具の製造で出た「木端（こっぱ）」を使っている。\n\n捨てられるはずだったものが、\n香りになる。","reply":"最初に「屋久杉の木端」と聞いた時、\n「捨てるくらいなら、と譲っていただいた」と工場の人が言った。\n\n古いものを大切に使う、という感覚が\nこのお香の根っこにある気がしました。","tag":"#手仕事","confidence":86},{"id":"2026-W19-019","pattern":"⑦デジタルデトックス型","theme":"スマホを置く小さな儀式","body":"スマホを持ったまま、\n深呼吸できない。\n\n気づいたら手に持っていて、\n気づいたら画面を見ていて、\n気づいたら1時間が経っている。\n\n一本焚いて、\nスマホを引き出しに入れる。\n煙が消えるまでは、ここにいる。","reply":"「スマホを置く」という意志より、\n「お香を焚く」という行動の方が簡単。\n\n意志に頼らず、習慣に乗る。\n小さな儀式が、デジタルから離してくれる。","tag":"#整える","confidence":91},{"id":"2026-W19-020","pattern":"⑧素材の叫び型","theme":"自然栽培の「揃わない」豊かさ","body":"福岡の山の中に、椨の畑がある。\n\n見渡す限り、緑。\n農家の人が歩きながら言った。\n\n「この木たち、全部顔が違うんです。\n自然栽培だから、育ち方が揃わない」\n\n揃わない、ということが\n豊かさだと思った。","reply":"量産品は「揃えること」が品質。\n自然素材は「揃わないこと」が本物の証。\n\n毎年少しずつ違う香りを楽しめるのは、\n自然栽培だからこそです。","tag":"#生産者支援","confidence":87},{"id":"2026-W19-021","pattern":"⑨リプ完結型","theme":"煙が出ない時の対処法","body":"「お香に火をつけたのに\n煙が出ません」という相談、よくあります。\n\n原因と対処法、リプ欄に。","reply":"【煙が出ない時の原因3つ】\n\n①火が消えている\n→先端が赤く光っていれば燃えています。暗くして確認を。\n\n②湿気を吸っている\n→密封せずに保管していると湿気る。乾燥させてから使う。\n\n③天然素材は煙が少ない\n→少なくても香りは届いています。\n\n煙の量＝香りの強さ、ではないです。","tag":"#お香のある暮らし","confidence":85},{"id":"2026-W19-022","pattern":"⑩二択型","theme":"一人で焚くか誰かと焚くか","body":"お香を焚く時、あなたはどちら派？\n\n🌿 一人で——自分だけの時間を作るために\n👫 誰かと——空気を共有したいから\n\nどちらでもあり、な気もするけれど。\n今日のあなたはどちら？","reply":"一人で焚く時と、誰かと焚く時で\n同じお香でも受け取り方が変わる。\n\n「静けさ」の質が違う気がします。","tag":"#暮らし","confidence":90},{"id":"2026-W19-023","pattern":"⑪失敗学び型","theme":"2本同時に焚いて頭が痛くなった話","body":"「もっと香りを強くしたい」と思って\n2本同時に焚いた。\n\n最初の10分は良かった。\nでも20分後、頭が痛くなった。\n\n「良い香り」も、多すぎると逆効果。\n引き算の大切さを学んだ失敗。","reply":"天然素材のお香は、合成香料より揮発が早い。\n少量でも空間に香りが満ちます。\n\n「もう少し」ではなく「これで十分」と思える量が、\nちょうどいい量です。まずは1本から。","tag":"#暮らし","confidence":84},{"id":"2026-W19-024","pattern":"⑫暦型","theme":"五月雨・梅雨の前の乾いた今","body":"「五月雨（さみだれ）」という言葉がある。\n\n梅雨の雨を指す古い言葉。\nもうすぐそういう季節がやってくる。\n\n雨の前の、乾いた空気の今。\n窓を開けて、一本だけ焚く。\n\n雨が来る前の、最後の晴れ間を\n香りで受け取っておく。","reply":"梅雨になるとお香の香りが変わります。\n湿気を吸って、重くなる。\nだから今、好きな香りをしっかり焚いておく。\nこれも、暦に沿った暮らし。","tag":"#暦","confidence":87},{"id":"2026-W19-025","pattern":"①Dear Algo型","theme":"初夏の息吹・朝の窓","body":"親愛なるアルゴリズム。\n\n5月の朝、窓を開けると\n昨日より少し強い緑の匂いがした。\n\n夏が、近づいてきている。\n\nこの瞬間を大切にしたい人が、\nどこかにいると思って書いている。","reply":"夏は来るとわかっているのに、\n毎年「あ、来た」と気づく。\n\n季節の到来を、鼻で感じられることが\n豊かさだと思っています。","tag":"#呼吸","confidence":90},{"id":"2026-W19-026","pattern":"②構造的絶滅型","theme":"国産素材の価格構造と選択の力","body":"なぜ国産のお香素材は高いのか。\n\n①少量生産のため単価が上がる\n②流通コストが輸入品より高い\n③「国産」に対してお金を払う習慣がない\n\nこの3つが重なると、\n「輸入品で代替」が正解になってしまう。\n\n今も国産を選ぶ農家がいる。\n選んで買うことが、支えることになる。","reply":"「国産」というだけで選ぶ必要はないと思っています。\n「なぜ国産か」を知って選ぶことが大事。\n\n福岡の椨、屋久杉の木端——\nこれらの「なぜ」を伝えていきたい。","tag":"#受け継ぐ","confidence":88},{"id":"2026-W19-027","pattern":"③余白型","theme":"週末の朝15分の豊かさ","body":"週末の朝は、平日より15分だけ遅く起きる。\n\nその15分で、お茶を入れて\n一本だけ焚く。\n\n特別なことは何もない。\nでも、この15分が\n一週間の中で一番好きかもしれない。\n\nあなたの「一番好きな時間」はいつですか？","reply":"「特別じゃないけど好きな時間」を\n持っている人は、強いと思う。\n\nそういう時間を守るための、小さな習慣。","tag":"#暮らし","confidence":91},{"id":"2026-W19-028","pattern":"④水車静寂型","theme":"水車の音の記憶","body":"水車の音は、川の音に似ている。\n\nザー、ではなく\nコトコト、とか、チャポン、という\n低くて穏やかな音。\n\nこの音の中で挽かれた粉が\n今、手元にある。\n\n音は伝わらないけれど、\n香りの中にその静けさが残っている気がします。","reply":"水車製法の工場を訪ねた後、\nしばらく「水の音」が耳に残っていました。\n\n今もお香を焚くと、あの音を思い出す。\n香りは記憶とつながっている。","tag":"#静けさ","confidence":86},{"id":"2026-W19-029","pattern":"⑤未完ストーリー型","theme":"福岡・電波の届かない畑","body":"今週、福岡の農家を訪ねた。\n\n高速を降りてから、山道を20分。\n携帯の電波が途切れる場所に、\nその畑はある。\n\n続きはリプ欄に。","reply":"農家の人が「今年は雨が少なくて」と言いながら\n椨の葉を触っていた。\n\n「少し香りが濃いかもしれない」と。\n\n天候が、香りに直結している。\nスーパーで買う野菜と、根っこは同じだ。","tag":"#手仕事","confidence":91},{"id":"2026-W19-030","pattern":"⑥専門家裏側型","theme":"選ばれなかった香りの自由","body":"調合していると、「これは商品にならない」と判断するものが出る。\n\n強すぎる、弱すぎる、\nバランスが独特すぎる。\n\nでもその「選ばれなかった香り」を\n自分用に焚いていることがある。\n\n誰かのためじゃない香りが、\n一番自由で好きだったりする。","reply":"「完璧なお香」より「自分に合うお香」が大事。\n\n商品として選ばれなくても、\n誰かの「これが好き」になることはある。\nそういう出会いを作っていきたい。","tag":"#選択","confidence":85},{"id":"2026-W19-031","pattern":"⑦デジタルデトックス型","theme":"在宅ワークの終わり方","body":"在宅ワークで一番難しいのは\n「仕事を終わりにすること」。\n\nスペースが変わらないから、\n脳が切り替わらない。\n\nそういう時、一本焚く。\n煙が上がって、消えるまでを見る。\n\nその間に、私の仕事は終わっていく。","reply":"「儀式」と呼ぶと大げさだけど、\n体に「ここからは休み」と伝える行動が必要。\n\n場所が変えられないなら、空気を変える。\nお香は、空気を変える一番小さな方法。","tag":"#整える","confidence":90},{"id":"2026-W19-032","pattern":"⑧素材の叫び型","theme":"職人の手が感じること","body":"工場で、職人さんが棒状にお香を形成していた。\n\n機械と同じスピードで、手が動く。\nでも機械と違って、手には「感じる力」がある。\n\n「これは少し硬い」「これは水分が多い」\nそういう判断を、手がしている。\n\n数字に出ない品質が、ここにある。","reply":"自動化できる部分は自動化する。\nでも「感じること」は自動化できない。\n\n手仕事が残る理由は、そこにあると思っています。","tag":"#手仕事","confidence":88},{"id":"2026-W19-033","pattern":"⑨リプ完結型","theme":"煙が多すぎる時の原因と対処","body":"「お香を焚くと煙が多すぎて目が痛くなります」\nという声をいただきました。\n\n原因と解決法、リプ欄に。","reply":"【煙が多すぎる時の確認ポイント】\n\n①換気ができているか\n→密室 // State
function loadState(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || fallback); }
  catch { localStorage.removeItem(key); return JSON.parse(fallback); }
}
let reviewQueue   = loadState('ci_review',  '[]');
let stockList     = loadState('ci_stock',   '[]');
let historyList   = loadState('ci_history', '[]');
let loadedBatches = loadState('ci_batches', '[]');
let currentTab    = 'review';

// ---- Startup: check for new batches ----
function checkNewBatches() {
  const newBatches = WEEKLY_BATCHES.filter(b => !loadedBatches.includes(b.batchId));
  if (newBatches.length === 0) return;

  const banner = document.getElementById('batch-banner-area');
  const total  = newBatches.reduce((s, b) => s + b.posts.length, 0);
  const latest = newBatches[0];

  banner.innerHTML = `
    <div class="batch-banner">
      <div class="batch-banner-icon">🌿</div>
      <div class="batch-banner-text" style="flex:1">
        <h3>新しい投稿案が届いています</h3>
        <p>${newBatches.length}バッチ・合計${total}投稿（${latest.note}）</p>
        <button class="btn-load-batch" onclick="loadNewBatches()">レビューキューに追加する</button>
      </div>
    </div>`;
}

function loadNewBatches() {
  const newBatches = WEEKLY_BATCHES.filter(b => !loadedBatches.includes(b.batchId));
  let added = 0;
  newBatches.forEach(b => {
    b.posts.forEach(p => {
      if (!reviewQueue.find(r => r.id === p.id)) {
        reviewQueue.push({ ...p, batchId: b.batchId, addedAt: Date.now() });
        added++;
      }
    });
    loadedBatches.push(b.batchId);
  });
  localStorage.setItem('ci_batches', JSON.stringify(loadedBatches));
  save();
  document.getElementById('batch-banner-area').innerHTML = '';
  renderReview();
  showToast(`✅ ${added}投稿をレビューキューに追加しました`);
}

// ---- Tab ----
function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  btn.classList.add('active');
  currentTab = tab;
  if (tab === 'review')   renderReview();
  if (tab === 'stock')    renderStock();
  if (tab === 'history')  renderHistory();
  if (tab === 'generate') renderGenerateStats();
  if (tab === 'research') openResearchTab();
}

// ---- Badges ----
function updateBadges() {
  setBadge('b-review',  reviewQueue.length);
  setBadge('b-stock',   stockList.length);
  setBadge('b-history', historyList.length);

  // Header week
  const latestBatch = WEEKLY_BATCHES[0];
  if (latestBatch) {
    document.getElementById('header-week').textContent = latestBatch.batchId;
    document.getElementById('last-batch-date').textContent = latestBatch.generatedAt;
  }
}
function setBadge(id, n) {
  const el = document.getElementById(id);
  if (!el) return;
  if (n > 0) { el.style.display = 'flex'; el.textContent = n; }
  else el.style.display = 'none';
}

// ---- Render: Review ----
function renderReview() {
  const el = document.getElementById('review-list');
  const sh = document.getElementById('review-section-header');
  if (reviewQueue.length === 0) {
    sh.textContent = '';
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <p>レビュー待ちの投稿はありません<br>上のバナーから今週のバッチを読み込んでください</p>
    </div>`;
    return;
  }
  sh.textContent = `レビュー待ち ${reviewQueue.length}件（バズ確度順）`;
  const sorted = [...reviewQueue].sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
  el.innerHTML = sorted.map(p => `
    <div class="card" id="card-${p.id}">
      <div class="card-meta">
        <span class="chip">${esc(p.pattern)}</span>
        <span class="chip chip-confidence">確度 ${p.confidence}%</span>
        ${p.cta ? '<span class="chip" style="background:#e3f2fd;color:#1565c0;">🔗 導線</span>' : ''}
      </div>
      <div class="card-body">${nl(p.body)}</div>
      ${p.reply ? `<div class="card-reply">
        <div class="reply-label">追いリプ</div>
        <div class="reply-text">${nl(p.reply)}</div>
      </div>` : ''}
      ${p.tag ? `<div class="card-tag">${esc(p.tag)}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-skip"    onclick="skipPost('${p.id}')">スキップ</button>
        <button class="btn btn-approve" onclick="approvePost('${p.id}')">✓ ストックへ</button>
      </div>
    </div>`).join('');
}

// ---- Render: Stock ----
function renderStock() {
  const el = document.getElementById('stock-list');
  const sh = document.getElementById('stock-section-header');
  if (stockList.length === 0) {
    sh.textContent = '';
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📦</div>
      <p>ストックがまだありません<br>レビューで承認した投稿がここに溜まります</p>
    </div>`;
    return;
  }
  sh.textContent = `ストック ${stockList.length}件（コピーして投稿してください）`;
  el.innerHTML = stockList.map(p => `
    <div class="stock-card" id="sc-${p.id}">
      <div class="stock-meta">
        <span class="chip">${esc(p.pattern)}</span>
        ${p.cta ? '<span class="chip" style="background:#e3f2fd;color:#1565c0;">🔗 導線</span>' : ''}
        ${p.posted ? `<span class="chip posted-chip">投稿済</span>` : ''}
        <span style="font-size:11px;color:var(--muted);margin-left:auto;">${fmtDate(p.addedAt)}</span>
      </div>
      <div class="stock-body">${nl(p.body)}</div>
      ${p.reply ? `<div class="stock-reply">
        <div class="reply-label">追いリプ</div>
        <div class="reply-text">${nl(p.reply)}</div>
      </div>` : ''}
      ${p.tag ? `<div class="card-tag" style="margin-bottom:10px;">${esc(p.tag)}</div>` : ''}
      <div class="stock-actions">
        <button class="btn-sm btn-copy-main" id="cp-${p.id}" onclick="copyPost('${p.id}','body')">📋 コピー</button>
        ${p.reply ? `<button class="btn-sm btn-copy-reply" onclick="copyPost('${p.id}','reply')">追いリプ</button>` : ''}
        <button class="btn-sm btn-posted" onclick="markPosted('${p.id}')">投稿済にする</button>
        <button class="btn-sm btn-del" onclick="deleteStock('${p.id}')">削除</button>
      </div>
    </div>`).join('');
}

// ---- Render: History ----
function renderHistory() {
  const el = document.getElementById('history-list');
  if (historyList.length === 0) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📊</div>
      <p>まだ投稿済み記録がありません<br>ストックで「投稿済にする」を押すと記録されます</p>
    </div>`;
    return;
  }

  // Sort newest first
  const sorted = [...historyList].sort((a,b) => (b.postedAt || 0) - (a.postedAt || 0));
  el.innerHTML = sorted.map(p => {
    const resultClass = p.result === 'buzz' ? 'result-buzz' : p.result === 'ok' ? 'result-ok' : p.result === 'miss' ? 'result-miss' : '';
    const resultLabel = p.result === 'buzz' ? '🔥 バズった' : p.result === 'ok' ? '👍 普通' : p.result === 'miss' ? '💤 不発' : '未記録';
    return `<div class="history-card">
      <div class="history-body">${nl(p.body)}</div>
      <div class="history-meta">
        <span class="chip">${esc(p.pattern)}</span>
        ${p.result ? `<span class="result-pill ${resultClass}">${resultLabel}</span>` : ''}
        <span style="font-size:11px;color:var(--muted)">${fmtDate(p.postedAt)}</span>
      </div>
      <div class="perf-row">
        <button class="perf-btn ${p.result==='buzz'?'active-buzz':''}" onclick="setResult('${p.id}','buzz')">🔥 バズった</button>
        <button class="perf-btn ${p.result==='ok'?'active-ok':''}"   onclick="setResult('${p.id}','ok')">👍 普通</button>
        <button class="perf-btn ${p.result==='miss'?'active-miss':''}" onclick="setResult('${p.id}','miss')">💤 不発</button>
      </div>
    </div>`;
  }).join('');
}

// ---- Render: Generate stats ----
function renderGenerateStats() {
  const allGenerated = WEEKLY_BATCHES.reduce((s,b) => s + b.posts.length, 0);
  document.getElementById('total-generated').textContent = allGenerated;
  document.getElementById('total-approved').textContent = stockList.length + historyList.length;
  document.getElementById('total-posted').textContent = historyList.length;
}

// ---- Actions ----
function approvePost(id) {
  const i = reviewQueue.findIndex(p => p.id === id);
  if (i < 0) return;
  const p = { ...reviewQueue[i], addedAt: Date.now() };
  reviewQueue.splice(i, 1);
  stockList.unshift(p);
  save();
  animateOut('card-' + id, 'right', renderReview);
  showToast('✅ ストックに追加しました');
}

function skipPost(id) {
  const i = reviewQueue.findIndex(p => p.id === id);
  if (i < 0) return;
  reviewQueue.splice(i, 1);
  save();
  animateOut('card-' + id, 'left', renderReview);
  showToast('スキップしました');
}

function deleteStock(id) {
  stockList = stockList.filter(p => p.id !== id);
  save();
  renderStock();
  showToast('削除しました');
}

function markPosted(id) {
  const i = stockList.findIndex(p => p.id === id);
  if (i < 0) return;
  const p = { ...stockList[i], posted: true, postedAt: Date.now(), result: null };
  stockList.splice(i, 1);
  historyList.unshift(p);
  save();
  queueSync();
  renderStock();
  showToast('📮 投稿済みに移動しました');
}

function setResult(id, result) {
  const p = historyList.find(p => p.id === id);
  if (!p) return;
  p.result = result;
  save();
  queueSync();
  renderHistory();
  showToast(result === 'buzz' ? '🔥 バズった！記録しました' : result === 'ok' ? '👍 記録しました' : '💤 記録しました');
}

// ---- 結果同期（D1へ送信 → 週次生成が学習する） ----
const SYNC_URL = '/api/results';
const SYNC_KEY = 'ci-threads-sync-v1';
let syncTimer = null;
function queueSync() {
  localStorage.setItem('ci_sync_dirty', '1');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncResults, 1500);
}
async function syncResults() {
  if (historyList.length === 0) { localStorage.removeItem('ci_sync_dirty'); return; }
  const posts = historyList.map(p => ({
    id: p.id,
    batchId: p.batchId || null,
    pattern: p.pattern || null,
    theme: p.theme || null,
    tag: p.tag || null,
    body: p.body || null,
    cta: !!p.cta,
    postedAt: p.postedAt || null,
    result: p.result || null
  }));
  try {
    const res = await fetch(SYNC_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-sync-key': SYNC_KEY },
      body: JSON.stringify({ posts })
    });
    if (res.ok) localStorage.removeItem('ci_sync_dirty');
  } catch { /* オフライン等。dirtyフラグが残り、次回ロード時に再送される */ }
}

function copyPost(id, type) {
  const p = stockList.find(p => p.id === id);
  if (!p) return;
  const text = type === 'reply' ? p.reply : p.body;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove();
    flashCopy(id, type);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => flashCopy(id, type)).catch(fallback);
  } else fallback();
}

function flashCopy(id, type) {
  if (type === 'body') {
    const btn = document.getElementById('cp-' + id);
    if (btn) {
      btn.textContent = 'コピー済！'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    }
  }
  showToast(type === 'reply' ? '追いリプをコピーしました' : '投稿本文をコピーしました');
}

// ---- Utils ----
function save() {
  localStorage.setItem('ci_review',  JSON.stringify(reviewQueue));
  localStorage.setItem('ci_stock',   JSON.stringify(stockList));
  localStorage.setItem('ci_history', JSON.stringify(historyList));
  updateBadges();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nl(s) { return esc(s).replace(/\n/g,'<br>'); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function animateOut(id, dir, cb) {
  const el = document.getElementById(id);
  if (!el) { cb(); return; }
  el.style.transition = 'transform 0.28s ease, opacity 0.28s ease';
  el.style.transform = `translateX(${dir === 'right' ? 70 : -70}px)`;
  el.style.opacity = '0';
  setTimeout(cb, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ---- Hard Reload ----
function hardReload() {
  showToast('最新版を取得中...');
  setTimeout(() => window.location.reload(), 500);
}

// ============================================================
// 研究タブ（国産バズ・リサーチライブラリ）
// ============================================================
const BUZZ_URL = '/api/buzz';
const BUZZ_TAGS = ['国産', '国産を守ろう', '国産を選ぼう', '国産メーカー品', 'その他'];
let buzzLibrary = loadState('ci_buzz_lib',     '[]'); // ライブラリ本体（サーバー同期済み＋未同期含む）
let buzzPending = loadState('ci_buzz_pending', '[]'); // 未同期のid一覧
let buzzTagFilter = 'all';
let buzzExpanded = {}; // id -> 展開表示中か

function saveBuzzLocal() {
  localStorage.setItem('ci_buzz_lib',     JSON.stringify(buzzLibrary));
  localStorage.setItem('ci_buzz_pending', JSON.stringify(buzzPending));
}

// ---- id生成（URLがあれば正規化ハッシュ、なければ本文先頭50字のハッシュ）----
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h.toString(36);
}
function normalizeUrl(u) {
  return u.trim().replace(/^https?:\/\//, '').replace(/\/+$/, '').split('?')[0].split('#')[0];
}
function makeBuzzId(url, body) {
  const src = (url && url.trim()) ? normalizeUrl(url) : (body || '').slice(0, 50);
  return 'bz-' + hashStr(src);
}

// ---- クイック収集フォーム ----
function saveBuzzPost() {
  const body = document.getElementById('bz-body').value.trim();
  if (!body) { showToast('本文を入力してください'); return; }
  const url    = document.getElementById('bz-url').value.trim();
  const author = document.getElementById('bz-author').value.trim().replace(/^@/, '');
  const tag    = document.getElementById('bz-tag').value;
  const hookType = document.getElementById('bz-hook').value;
  const whyBuzz  = document.getElementById('bz-why').value.trim();
  const likes   = parseInt(document.getElementById('bz-likes').value, 10);
  const replies = parseInt(document.getElementById('bz-replies').value, 10);
  const reposts = parseInt(document.getElementById('bz-reposts').value, 10);

  const id  = makeBuzzId(url, body);
  const now = Date.now();
  const entry = {
    id, url: url || null, author: author || null, tag, body,
    likes:   Number.isFinite(likes)   ? likes   : null,
    replies: Number.isFinite(replies) ? replies : null,
    reposts: Number.isFinite(reposts) ? reposts : null,
    hookType, pattern: null, whyBuzz: whyBuzz || null,
    source: 'manual', collectedAt: now, updatedAt: now
  };

  const i = buzzLibrary.findIndex(p => p.id === id);
  if (i >= 0) buzzLibrary[i] = { ...buzzLibrary[i], ...entry, collectedAt: buzzLibrary[i].collectedAt || now };
  else buzzLibrary.unshift(entry);

  if (!buzzPending.includes(id)) buzzPending.push(id);
  saveBuzzLocal();
  clearBuzzForm();
  renderBuzzList();
  renderBuzzDashboard();

  syncBuzzPending().then(ok => {
    showToast(ok ? '✅ ライブラリに保存しました' : '📥 ローカルに保存しました（後で自動的に再送します）');
  });
}

function clearBuzzForm() {
  ['bz-url', 'bz-body', 'bz-author', 'bz-likes', 'bz-replies', 'bz-reposts', 'bz-why'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('bz-tag').value  = '国産';
  document.getElementById('bz-hook').value = '意外性';
}

// ---- 未同期キューの再送 ----
async function syncBuzzPending() {
  if (buzzPending.length === 0) return true;
  const posts = buzzPending.map(id => buzzLibrary.find(p => p.id === id)).filter(Boolean);
  if (posts.length === 0) { buzzPending = []; saveBuzzLocal(); return true; }
  try {
    const res = await fetch(BUZZ_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-sync-key': SYNC_KEY },
      body: JSON.stringify({ posts })
    });
    if (res.ok) {
      buzzPending = [];
      saveBuzzLocal();
      return true;
    }
  } catch { /* オフライン等。次回タブオープン／オンライン復帰時に再送 */ }
  return false;
}

// ---- サーバーから取得してローカルキャッシュとマージ（id重複はサーバー優先）----
async function fetchBuzzLibrary() {
  try {
    const res = await fetch(BUZZ_URL);
    if (!res.ok) return;
    const data = await res.json();
    const serverPosts = Array.isArray(data.posts) ? data.posts : [];
    const serverMap = new Map(serverPosts.map(p => [p.id, {
      id: p.id, url: p.url, author: p.author, tag: p.tag, body: p.body,
      likes: p.likes, replies: p.replies, reposts: p.reposts,
      hookType: p.hook_type, pattern: p.pattern, whyBuzz: p.why_buzz,
      source: p.source, collectedAt: p.collected_at, updatedAt: p.updated_at
    }]));
    const merged = [...serverMap.values()];
    buzzLibrary.forEach(local => { if (!serverMap.has(local.id)) merged.push(local); });
    buzzLibrary = merged;
    saveBuzzLocal();
    renderBuzzList();
    renderBuzzDashboard();
  } catch { /* オフライン等。ローカルキャッシュの表示を維持 */ }
}

function openResearchTab() {
  renderBuzzList();
  renderBuzzDashboard();
  syncBuzzPending().then(() => fetchBuzzLibrary());
}

// ---- Render: タグ絞り込みチップ ----
function renderBuzzTagFilter() {
  const el = document.getElementById('buzz-tag-filter');
  const tags = ['all', ...BUZZ_TAGS];
  el.innerHTML = tags.map(t => {
    const label = t === 'all' ? 'すべて' : t;
    return `<button class="chip-filter ${buzzTagFilter === t ? 'active' : ''}" onclick="setBuzzTagFilter('${t}')">${esc(label)}</button>`;
  }).join('');
}
function setBuzzTagFilter(t) {
  buzzTagFilter = t;
  renderBuzzList();
}

function buzzNeedsClamp(body) {
  return body.length > 160 || body.split('\n').length > 8;
}

// ---- Render: ライブラリ一覧 ----
function renderBuzzList() {
  renderBuzzTagFilter();
  const el = document.getElementById('buzz-list');
  const sh = document.getElementById('buzz-section-header');
  let list = [...buzzLibrary];
  if (buzzTagFilter !== 'all') list = list.filter(p => p.tag === buzzTagFilter);
  list.sort((a, b) => (b.likes || 0) - (a.likes || 0));

  if (list.length === 0) {
    sh.textContent = 'ライブラリ';
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <p>まだ収集した投稿がありません<br>上のフォームからバズ投稿を登録してください</p>
    </div>`;
    return;
  }
  sh.textContent = `ライブラリ ${list.length}件（いいね数順）`;
  el.innerHTML = list.map(p => {
    const clampNeeded = buzzNeedsClamp(p.body || '');
    const expanded = !!buzzExpanded[p.id];
    return `
    <div class="buzz-card" id="bz-card-${p.id}">
      <div class="buzz-meta">
        ${p.tag ? `<span class="chip">#${esc(p.tag)}</span>` : ''}
        ${p.hookType ? `<span class="chip chip-confidence">${esc(p.hookType)}</span>` : ''}
        ${p.author ? `<span style="font-size:12px;color:var(--muted);margin-left:auto;">@${esc(p.author)}</span>` : ''}
      </div>
      <div class="buzz-body ${(clampNeeded && !expanded) ? 'clamp' : ''}">${nl(p.body)}</div>
      ${clampNeeded ? `<div class="buzz-expand" onclick="toggleBuzzExpand('${p.id}')">${expanded ? '折りたたむ ▲' : 'もっと見る ▼'}</div>` : ''}
      <div class="buzz-stats">
        <span>❤️ ${p.likes ?? '-'}</span>
        <span>💬 ${p.replies ?? '-'}</span>
        <span>🔁 ${p.reposts ?? '-'}</span>
      </div>
      ${p.whyBuzz ? `<div class="buzz-why">💡 ${esc(p.whyBuzz)}</div>` : ''}
      <div class="buzz-actions">
        <button class="btn-sm btn-copy-main" id="bzcp-${p.id}" onclick="copyBuzzPattern('${p.id}')">🧬 型をコピー</button>
        ${p.url ? `<a href="${esc(p.url)}" target="_blank" rel="noopener" class="btn-sm btn-copy-reply buzz-link">開く</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleBuzzExpand(id) {
  buzzExpanded[id] = !buzzExpanded[id];
  renderBuzzList();
}

function copyBuzzPattern(id) {
  const p = buzzLibrary.find(p => p.id === id);
  if (!p) return;
  const text = `【参考バズ投稿】フック型:${p.hookType || '不明'} / タグ:${p.tag || '不明'} / ❤️${p.likes ?? 0}\n本文:${p.body}\nなぜバズった:${p.whyBuzz || '不明'}\nこの型でクリスタルインセンス（国産お香）の投稿を作って`;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove();
    flashBuzzCopy(id);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => flashBuzzCopy(id)).catch(fallback);
  } else fallback();
}

function flashBuzzCopy(id) {
  const btn = document.getElementById('bzcp-' + id);
  if (btn) {
    btn.textContent = 'コピー済！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '🧬 型をコピー'; btn.classList.remove('copied'); }, 2000);
  }
  showToast('型をコピーしました');
}

// ---- Render: 傾向ダッシュボード ----
function renderBuzzDashboard() {
  renderBuzzDashboardLib();
  renderBuzzDashboardOwn();
}

function renderBuzzDashboardLib() {
  const el = document.getElementById('buzz-dashboard-lib');
  if (buzzLibrary.length === 0) {
    el.innerHTML = `<div class="dash-empty">まだライブラリにデータがありません</div>`;
    return;
  }
  // タグ別 件数・平均いいね
  const tagStats = {};
  buzzLibrary.forEach(p => {
    const t = p.tag || 'その他';
    if (!tagStats[t]) tagStats[t] = { n: 0, likesSum: 0 };
    tagStats[t].n++;
    tagStats[t].likesSum += (p.likes || 0);
  });
  const maxTagN = Math.max(...Object.values(tagStats).map(s => s.n));
  const tagRows = Object.entries(tagStats)
    .sort((a, b) => b[1].n - a[1].n)
    .map(([t, s]) => {
      const avg = Math.round(s.likesSum / s.n);
      const pct = Math.round(s.n / maxTagN * 100);
      return `<div class="dash-row">
        <div class="dash-row-label"><span>#${esc(t)}（${s.n}件）</span><span>平均❤️${avg}</span></div>
        <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

  // フック型の分布
  const hookStats = {};
  buzzLibrary.forEach(p => {
    const h = p.hookType || '不明';
    hookStats[h] = (hookStats[h] || 0) + 1;
  });
  const maxHook = Math.max(...Object.values(hookStats));
  const hookRows = Object.entries(hookStats)
    .sort((a, b) => b[1] - a[1])
    .map(([h, n]) => {
      const pct = Math.round(n / maxHook * 100);
      return `<div class="dash-row">
        <div class="dash-row-label"><span>${esc(h)}</span><span>${n}件</span></div>
        <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%;background:var(--accent);"></div></div>
      </div>`;
    }).join('');

  el.innerHTML = `
    <div class="dash-subhead">タグ別（件数・平均いいね）</div>
    ${tagRows}
    <div class="dash-subhead">フック型の分布</div>
    ${hookRows}`;
}

function renderBuzzDashboardOwn() {
  const el = document.getElementById('buzz-dashboard-own');
  const labeled = historyList.filter(p => ['buzz', 'ok', 'miss'].includes(p.result));
  if (labeled.length < 3) {
    el.innerHTML = `<div class="dash-empty">結果を記録すると自社傾向が育ちます（現在${labeled.length}件）</div>`;
    return;
  }
  const stats = {};
  labeled.forEach(p => {
    const pt = p.pattern || '不明';
    if (!stats[pt]) stats[pt] = { buzz: 0, n: 0 };
    stats[pt].n++;
    if (p.result === 'buzz') stats[pt].buzz++;
  });
  const rows = Object.entries(stats)
    .filter(([, s]) => s.n >= 2)
    .sort((a, b) => (b[1].buzz / b[1].n) - (a[1].buzz / a[1].n))
    .map(([pt, s]) => {
      const rate = Math.round(s.buzz / s.n * 100);
      return `<div class="dash-row">
        <div class="dash-row-label"><span>${esc(pt)}</span><span>バズ率${rate}%（${s.n}件）</span></div>
        <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${rate}%"></div></div>
      </div>`;
    }).join('');
  el.innerHTML = rows || `<div class="dash-empty">2件以上記録があるパターンがまだありません</div>`;
}
