<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CI Posts">
  <title>CI Threads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #6b8e7f;
      --primary-light: #e8f0ec;
      --accent: #c4956a;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --success: #4caf50;
      --danger: #ef5350;
      --warn: #ff9800;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    .header {
      padding: 14px 20px 12px;
      padding-top: calc(14px + env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-week { font-size: 11px; color: var(--accent); font-weight: 600;
      background: #fff3e0; padding: 3px 9px; border-radius: 12px; }

    /* Content */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    /* Tab bar */
    .tab-bar {
      display: flex; background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 10px 0; border: none; background: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-family: inherit;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-icon { font-size: 21px; position: relative; display: inline-block; }
    .badge {
      position: absolute; top: -3px; right: -8px;
      background: var(--accent); color: white;
      font-size: 9px; font-weight: 700; min-width: 15px; height: 15px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
    }

    /* Section header */
    .section-header {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; margin-top: 4px;
    }

    /* New batch banner */
    .batch-banner {
      background: linear-gradient(135deg, var(--primary), #4a7a6b);
      color: white; border-radius: 14px; padding: 16px 18px;
      margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
    }
    .batch-banner-icon { font-size: 28px; }
    .batch-banner-text h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .batch-banner-text p { font-size: 12px; opacity: 0.85; line-height: 1.4; }
    .btn-load-batch {
      margin-top: 10px; width: 100%; padding: 10px; background: rgba(255,255,255,0.2);
      color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    /* Review cards */
    .card {
      background: var(--surface); border-radius: 18px; padding: 20px;
      margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border);
      transition: transform 0.28s ease, opacity 0.28s ease;
    }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .chip {
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
    }
    .chip-confidence { background: #fff3e0; color: var(--accent); }
    .card-body {
      font-size: 15px; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .card-reply {
      margin-top: 12px; padding: 10px 14px;
      background: var(--bg); border-radius: 10px; border-left: 3px solid var(--primary);
    }
    .reply-label {
      font-size: 9px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
    }
    .reply-text { font-size: 13px; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }
    .card-tag { margin-top: 9px; font-size: 12px; color: var(--accent); font-weight: 500; }
    .card-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn { flex: 1; padding: 13px; border-radius: 12px; border: none;
      font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; }
    .btn:active { opacity: 0.82; transform: scale(0.98); }
    .btn-approve { background: var(--success); color: white; }
    .btn-skip { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-skip:active { background: #fde; }

    /* Stock cards */
    .stock-card {
      background: var(--surface); border-radius: 16px; padding: 17px;
      margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .stock-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .posted-chip { background: #e3f2fd; color: #1976d2; }
    .stock-body {
      font-size: 14px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word; margin-bottom: 10px;
    }
    .stock-reply {
      padding: 9px 12px; background: var(--bg); border-radius: 9px;
      border-left: 2px solid var(--primary); margin-bottom: 12px;
    }
    .stock-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn-sm {
      padding: 9px 14px; border-radius: 10px; border: none;
      font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer;
    }
    .btn-copy-main { background: var(--primary); color: white; flex: 1; }
    .btn-copy-main.copied { background: var(--success); }
    .btn-copy-reply { background: var(--primary-light); color: var(--primary); }
    .btn-posted { background: #e3f2fd; color: #1976d2; }
    .btn-del { background: none; color: var(--muted); border: 1px solid var(--border); }

    /* Performance tracker */
    .perf-row {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .perf-btn {
      flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 12px; font-family: inherit; cursor: pointer; background: var(--bg);
      text-align: center;
    }
    .perf-btn.active-buzz { background: #fff3cd; border-color: #ff9800; }
    .perf-btn.active-ok { background: #e8f5e9; border-color: #4caf50; }
    .perf-btn.active-miss { background: #fce4ec; border-color: #e91e63; }

    /* History view */
    .history-card {
      background: var(--surface); border-radius: 14px; padding: 15px;
      margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .history-body { font-size: 13px; color: var(--text); white-space: pre-wrap;
      word-break: break-word; line-height: 1.65; margin-bottom: 8px; }
    .history-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .result-pill {
      font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px;
    }
    .result-buzz { background: #fff3cd; color: #e65100; }
    .result-ok { background: #e8f5e9; color: #2e7d32; }
    .result-miss { background: #fce4ec; color: #880e4f; }

    /* Generate view */
    .gen-card { background: var(--surface); border-radius: 16px; padding: 20px;
      margin-bottom: 14px; box-shadow: var(--shadow); }
    .gen-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .gen-card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .btn-gen-main {
      width: 100%; padding: 15px; background: var(--primary); color: white;
      border: none; border-radius: 13px; font-size: 16px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }
    .btn-gen-main:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Empty state */
    .empty { text-align: center; padding: 56px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(76px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1a1a1a; color: white; padding: 10px 20px;
      border-radius: 22px; font-size: 13px; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Separator */
    .sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">CI Threads</div>
      <div class="header-sub">クリスタルインセンス 投稿ストック</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-week" id="header-week"></div>
      <button onclick="hardReload()" style="background:var(--primary-light);border:none;color:var(--primary);font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;" title="最新版に更新">🔄</button>
    </div>
  </div>

  <div class="content">
    <!-- レビュー -->
    <div id="view-review" class="view active">
      <div id="batch-banner-area"></div>
      <div class="section-header" id="review-section-header"></div>
      <div id="review-list"></div>
    </div>

    <!-- ストック -->
    <div id="view-stock" class="view">
      <div class="section-header" id="stock-section-header"></div>
      <div id="stock-list"></div>
    </div>

    <!-- 実績 -->
    <div id="view-history" class="view">
      <div class="section-header">投稿済み・反応記録</div>
      <div id="history-list"></div>
    </div>

    <!-- 情報 -->
    <div id="view-generate" class="view">
      <div class="gen-card">
        <h3>🔄 週次自動更新</h3>
        <p>毎週月曜朝5時にClaudeが最新のThreadsトレンドを調べて投稿案を自動追加します。Macの電源オフでも動きます。</p>
        <button class="btn-gen-main" onclick="hardReload()">🔄 今すぐ最新版に更新</button>
        <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center;">新しいバッチがある場合、レビュータブにバナーが出ます</p>
      </div>
      <div class="gen-card">
        <h3>📊 統計</h3>
        <div style="font-size:13px;color:var(--muted);line-height:2;">
          最終更新: <span id="last-batch-date">—</span><br>
          累計生成: <span id="total-generated">0</span>投稿 ／
          承認済: <span id="total-approved">0</span>投稿 ／
          投稿済: <span id="total-posted">0</span>投稿
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('review',this)">
      <div class="tab-icon">📥<span class="badge" id="b-review" style="display:none"></span></div>
      <span>レビュー</span>
    </button>
    <button class="tab-btn" onclick="switchTab('stock',this)">
      <div class="tab-icon">✅<span class="badge" id="b-stock" style="display:none"></span></div>
      <span>ストック</span>
    </button>
    <button class="tab-btn" onclick="switchTab('history',this)">
      <div class="tab-icon">📊<span class="badge" id="b-history" style="display:none"></span></div>
      <span>実績</span>
    </button>
    <button class="tab-btn" onclick="switchTab('generate',this)">
      <div class="tab-icon">📋</div>
      <span>情報</span>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 【週次投稿バッチ】← Claudeが毎週ここを更新します
// batchId: "YYYY-WNN" 形式 (重複チェックに使用)
// ============================================================
const WEEKLY_BATCHES = [
  {"batchId":"2026-W25","generatedAt":"2026-06-21","note":"自動生成","posts":[{"id":"2026-W25-001","pattern":"①Dear Algo型","theme":"夏至が過ぎた翌朝の人へ","body":"親愛なるアルゴリズム。\n\n今日、夏至が過ぎた。\n\n「これから少しずつ、\n夜が長くなっていく」\nということを知っている人に届けてほしい。\n\nその人は今夜きっと、\n何かを焚きたいと思っているはずだから。","reply":"夏至の翌日は、\nもう日が短くなり始めている。\n\n気づかないくらい、ゆっくり。\n\nそのゆっくりさを、煙が教えてくれる気がした。\n昨夜はいつもより長く、見ていた。\n\n夏至の夜、何をしていましたか？","tag":"#暦","confidence":91},{"id":"2026-W25-002","pattern":"①Dear Algo型","theme":"一年の折り返しで立ち止まりたい人へ","body":"親愛なるアルゴリズム。\n\n今週で、2026年の折り返し。\n\n「前半、飛ばしすぎた」\nと感じている人がいたら届けてほしい。\n\nまだ先は長い。\nでも今日だけ、立ち止まっていい。","reply":"折り返しで「疲れた」と感じるのは、\nちゃんと走ってきた証拠だと思う。\n\n走ってきた半年を、\n煙が静かに受け取ってくれる。\n\n上半期の振り返り、どうでしたか？","tag":"#整える","confidence":90},{"id":"2026-W25-003","pattern":"①Dear Algo型","theme":"夏の朝が苦手な人へ","body":"親愛なるアルゴリズム。\n\n夏の朝が、苦手な人に届けてほしい。\n\n暑くて、\n布団から出たくなくて、\n今日も一日が重たい感じがして。\n\nそういう人の、枕元に。","reply":"夏の朝は、目覚めた瞬間に\n「今日も暑い」とわかる。\n\nその感覚に先に煙を用意しておくと、\n「今日も暑いけど、煙がある」に変わる。\n\n夏の朝、どうやって起きていますか？","tag":"#暮らし","confidence":89},{"id":"2026-W25-004","pattern":"①Dear Algo型","theme":"蝉の声が始まった街の人へ","body":"親愛なるアルゴリズム。\n\nどこかで、蝉が鳴き始めた。\n\nそれを聞いて\n「夏が来た」と感じた人に、\n今日の投稿を届けてほしい。\n\nその感受性を、大事にしてほしいから。","reply":"蝉の声は、急に始まる。\n\n昨日まで静かだった街が、\n今朝から全然違う音になっている。\n\nその切り替わりを感じた日は、\n夜に一本、焚きたくなる。\n\n蝉の声、もう聞こえましたか？","tag":"#暮らし","confidence":90},{"id":"2026-W25-005","pattern":"②構造的絶滅型","theme":"お香職人が一番消耗する季節","body":"お香職人が、一番消耗する季節がある。\n\n夏だ。\n\n熱と湿気が続く作業場で、\n火を使う仕事をする。\n\nその数が、年々減っている。","reply":"夏の作業場は40度を超える。\n\nエアコンは入れられない。\n湿度管理が崩れるから。\n\n機械に変えれば涼しくなる。\nでも「手仕事でしか出ない質」がある。\n\nその選択を今も続けている人がいる。\n\n夏の仕事で一番つらい部分、何ですか？","tag":"#手仕事","confidence":87},{"id":"2026-W25-006","pattern":"②構造的絶滅型","theme":"夏場に作れないものがある理由","body":"実は、夏場に作れないお香がある。\n\n季節の問題じゃない。\n素材の問題だ。\n\n天然素材は、夏を選ぶ。","reply":"高温多湿の時期に配合すると、\n素材同士が変質しやすい。\n\n管理できる温度と湿度の範囲が\n天然素材には存在する。\n\n「いつでも同じように作れる」のは\n工業製品だけかもしれない。\n\nものを選ぶとき「季節」を気にしたことはありますか？","tag":"#素材","confidence":86},{"id":"2026-W25-007","pattern":"②構造的絶滅型","theme":"国産お香が一番売れない季節","body":"国産お香が、一番売れないのが夏だ。\n\n「お香は冬のもの」というイメージ。\n\nそのイメージが、産業全体を痩せさせている。","reply":"秋冬に売れて、夏に売れない。\n\n売上の波が大きいと、\n職人を通年で雇えなくなる。\n\n「夏にも焚く人が増える」だけで、\n続けられる職人の数が変わる。\n\n夏にお香を使ったことはありますか？","tag":"#受け継ぐ","confidence":85},{"id":"2026-W25-008","pattern":"③余白型","theme":"夏至の翌朝","body":"夏至の翌朝、\nカーテンを開けたら、もう明るかった。\n\n今年一番遅い夕暮れが、昨日だった。\n\n一本、焚いた。","reply":"今日から少しずつ、\n夜が長くなっていく。\n\n「秋に向かっている」という\nかすかな感覚。\n\n煙が揺れているのを見ながら、\nそのことを考えていた。\n\n夏至の翌朝、どう感じましたか？","tag":"#余韻","confidence":92},{"id":"2026-W25-009","pattern":"③余白型","theme":"扇風機と煙","body":"扇風機をつけたら、\n煙が横に流れた。\n\n止めたら、\nまた上に戻っていった。","reply":"煙は、空気の流れを全部見せてくれる。\n\n扇風機をつけた時と消した時、\n部屋の空気がどう動いているか、\nいつも煙が教えてくれる。\n\n夏の部屋、扇風機派ですか、エアコン派ですか？","tag":"#余韻","confidence":90},{"id":"2026-W25-010","pattern":"③余白型","theme":"蝉と煙","body":"窓の外で蝉が鳴いている。\n\nうるさいな、と思って窓を閉めた。\n\n一本、焚いた。\n\n静かになった。","reply":"「うるさい」と感じる音が、\n静かな部屋に届かなくなった時、\nかえって外の賑やかさを感じる。\n\n今日の蝉の声、どのくらいうるさかったですか？","tag":"#静けさ","confidence":89},{"id":"2026-W25-011","pattern":"③余白型","theme":"夏の宵","body":"夏の夕方、\nまだ明るいうちから一本焚いた。\n\n煙が、夕陽の色に染まった気がした。\n\nいつもより長く、見ていた。","reply":"夏の宵は、光が長い。\n\n昼と夜の間に、\n長い「どちらでもない時間」がある。\n\nその時間に煙があると、\nどこにいるのかわからなくなる感覚がある。\n\n夕方の時間、どう過ごしていますか？","tag":"#余韻","confidence":88},{"id":"2026-W25-012","pattern":"④水車静寂型","theme":"梅雨明け後の川が変わる","body":"梅雨明けの日、\n水車場の川が変わる。\n\n水量が落ちて、\n水車の音が軽くなる。","reply":"水が少ないと、水車への圧力が下がる。\n粉が細かくなる。\n\n梅雨の椨粉と夏の椨粉は、\n粒度が少しだけ違う。\n\nその違いを感じられるかどうかは、\n毎日焚いている人だけが知っている。\n\n「いつもと少し違う」を感じたことはありますか？","tag":"#手仕事","confidence":87},{"id":"2026-W25-013","pattern":"④水車静寂型","theme":"夏の早朝、川に行く職人","body":"夏は、早朝の川が全然違う。\n\n職人さんが一番好きな時間が\n「夏の夜明けの川」だと言っていた。","reply":"夜明けの川は、まだ涼しい。\n\n水温も、空気温度も、\n日中とは別の川みたいに見える。\n\n「その時間の川の音を聞きながら挽く粉が\n一番好きだ」と言っていた。\n\n早朝に行きたい場所、ありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W25-014","pattern":"④水車静寂型","theme":"渇水の夏と水車の知恵","body":"川が干上がりそうな夏がある。\n\n水車は止まる。\n\nその時に、職人が何をするか。\n聞いたことがある。","reply":"「今年できる分だけ作る」と言っていた。\n\n量を調整するのではなく、\n「自然に合わせる」という考え方。\n\n水が少ない年の粉は水が多い年と違う。\nその違いを「個性」として受け入れている。\n\n「自然に合わせる」を選んだ経験はありますか？","tag":"#手仕事","confidence":85},{"i 香","confidence":89},{"id":"2026-W25-029","pattern":"⑨リプ完結型","theme":"夏が一番好きというお客様からのメッセージ","body":"先日、夏が一番好きというお客様から\nメッセージが届いた。\n\nその理由が、意外だった。\n\nリプ欄に。","reply":"「夏は虫が嫌で窓を閉めたくなる。\nでもお香を焚いている部屋だけは\n窓を開けたくなるんです」\n\nとメッセージに書いてあった。\n\n「煙がある部屋に、外の風を通したい」\nその感覚、わかる気がした。\n\nあなたの「窓を開けたくなる瞬間」は？","tag":"#暮らし","confidence":92},{"id":"2026-W25-030","pattern":"⑨リプ完結型","theme":"「なぜ夏でも焚くの？」と聞かれた","body":"「なぜ夏もお香を焚くの？\n暑くないの？」と聞かれた。\n\nうまく答えられなかった。\n\nリプ欄に続く。","reply":"しばらく考えて、こう答えた。\n\n「暑さを忘れたいわけじゃなくて、\n暑さの中にいるための儀式みたいなもの」\n\n暑さを消そうとするより、\n暑さと一緒にいる。\n\nその感覚、わかりますか？","tag":"#暮らし","confidence":90},{"id":"2026-W25-031","pattern":"⑩二択型","theme":"夏のお香、昼派？夜派？","body":"夏にお香を焚くなら、\n\n「昼のクールダウンした部屋で」派と\n「夜の蒸し暑い中で」派、\n\nどちらですか？\n\nわたしは断然、夜派。","reply":"昼派は「快適な空間に静けさを足す」感じ。\n\n夜派は「暑さごと受け入れる」\n覚悟が必要で、でも燃える感じがある。\n\nどちらの理由も、聞いてみたい。\n\nあなたはどちらで焚きますか？","tag":"#選択","confidence":89},{"id":"2026-W25-032","pattern":"⑩二択型","theme":"夏を「涼しくする」か「感覚を変える」か","body":"夏を「涼しく」するための方法として、\n\n「冷やす（エアコン・氷）」と\n「感覚を変える（香り・音・照明）」、\n\nどちらを先に選びますか？","reply":"エアコンで温度を下げるのが確実。\nでも「涼しい感覚」は温度だけじゃない。\n\n線香の匂いが「なんか涼しい」気がするのは、\n脳が過去の「縁側の夏」を思い出すから。\n\n感覚は、記憶と繋がっている。\n\nどちらから手を伸ばしますか？","tag":"#選択","confidence":88},{"id":"2026-W25-033","pattern":"⑩二択型","theme":"夏の「やめること」を選ぶなら","body":"夏の間、一つだけ「やめる」とするなら、\n\n「SNSチェックを減らす」か\n「間食をやめる」か\n\nどちらが続けやすそうですか？\n\n正直に教えてほしい。","reply":"「やめる」って、\n代わりに何かをしないと続かない気がする。\n\nSNSをやめるなら、代わりに煙を見る。\n間食をやめるなら、代わりに水と深呼吸を。\n\n「引き算」の時に「足すもの」が大事。\n\nあなたにとっての「替わりのもの」は何ですか？","tag":"#整える","confidence":87},{"id":"2026-W25-034","pattern":"⑩二択型","theme":"夏の朝の最初の行動","body":"夏の朝に最初にすることは、\n\n「窓を開けて外の空気を入れる」派と\n「エアコンをつけて温度を下げる」派、\n\nどちらが多いと思いますか？","reply":"窓を開ける派は、外の音から一日が始まる。\nエアコン派は、快適な温度から一日が始まる。\n\nどちらも正解だけど、\n窓を開けた朝にお香を焚くと、\n外の夏と内の煙が同時に来て、\n妙にいい朝になる。\n\n今朝の最初の行動、何でしたか？","tag":"#暮らし","confidence":88},{"id":"2026-W25-035","pattern":"⑪失敗学び型","theme":"夏に全量まとめて作って失敗した","body":"ある夏、「まとめて全量作った方が効率的」\nと思って、一気に製造した。\n\n半分、駄目になった。","reply":"夏の高温で、完成品の品質が落ちた。\n\n天然素材は完成してからも「生きている」。\n高温にさらされると変質する。\n\n夏は少量ずつ、こまめに作る。\n「効率」が天然素材には通用しないことを、\nその夏に学んだ。\n\n「効率よくしようとして裏目に出た」経験はありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W25-036","pattern":"⑪失敗学び型","theme":"エアコンの下に保管して劣化した話","body":"エアコンの風が直接当たる棚に\nお香を保管していた時期がある。\n\n劣化が、いつもより速かった。","reply":"エアコンの風は除湿されている。\n\n一見乾燥しているから良さそうだが、\n風が直接当たると素材表面だけが急激に乾燥して、\n内部との差が出る。\n\nその差が「ひび」のような劣化を起こす。\n\n今、お香の保管場所はどこですか？","tag":"#国産お香","confidence":84},{"id":"2026-W25-037","pattern":"⑪失敗学び型","theme":"夏のギフト企画を作りすぎた年","body":"「夏のお香ギフト」を作って\n大量に在庫を抱えた夏がある。\n\n「需要がある」と思い込んでいた。","reply":"「夏ギフト」として認知してもらうには、\n「夏にお香を焚く文化」がなければ届かない。\n\n商品を作る前に文化を作る、\nという順番があることを\nその夏に学んだ。\n\n「先に必要なものが違った」経験はありますか？","tag":"#暮らし","confidence":86},{"id":"2026-W25-038","pattern":"⑫暦型","theme":"夏至（今週）","body":"今週の日曜は夏至。\n\n一年で、昼が一番長い日。\n\n日が暮れるのを待ちながら、\n一本焚いた。","reply":"「一番長い昼」が終わった後に来る夜は、\n一年で一番「夜になった」と感じる瞬間かもしれない。\n\n夏至の夜に焚いたお香の煙を、\nずっと見ていた。\n\n夏至の夜、何をしていましたか？","tag":"#暦","confidence":92},{"id":"2026-W25-039","pattern":"⑫暦型","theme":"夏越の祓（6月30日）","body":"6月30日は「夏越の祓」（なごしのはらえ）。\n\n一年の前半に積んだ穢れを、\n祓い清める神事。\n\n茅の輪をくぐる、あれです。","reply":"「前半を清める」という行為が、\n今でも神社で続いている。\n\n6月30日の夕方、茅の輪がある神社は\nどこも列ができる。\n\n「区切りを作る」という感覚を\n今も大切にしている文化が残っている。\n\n夏越の祓、行ったことはありますか？","tag":"#暦","confidence":89},{"id":"2026-W25-040","pattern":"⑫暦型","theme":"小暑（7月7日）","body":"来月7月7日は「小暑」（しょうしょ）。\n\n本格的な暑さが始まる節気。\n七夕と重なる年が多い。\n\n「小」なのに、一番暑い季節の始まり。","reply":"小暑を過ぎると「暑中見舞い」の季節になる。\n\n旧暦の人たちは、\n「小暑」という言葉で暑さの到来を知った。\n\n予定ではなく、自然のカレンダーで生きていた。\n\n「来週から本格的に暑い」\n心の準備、できていますか？","tag":"#暦","confidence":88}]},

家は、\n今、何軒あると思いますか。\n\n少ない。本当に少ない。","reply":"農薬を使わない栽培は、\n手間が3倍かかる。\n収量は6割に落ちる。\n\nそれでも続けてきた農家が、\n後継者不足で廃業を考え始めている。\n\nわたしたちが買い続けることが、\n直接「続けてくれ」と言うことになる。\n\nそのことを、最近よく考えている。","tag":"#受け継ぐ","confidence":88},{"id":"2026-W24-008","pattern":"③余白型","theme":"雨音の朝","body":"雨が降っている朝、\n目覚ましより雨音が先だった。\n\n一本、焚いた。\n\n雨と煙が、部屋に充ちた。","reply":"雨の音は、外から来る。\n煙の揺れは、内側にある。\n\n外と内が同時に動いている朝は、\nなぜか気持ちが落ち着く。\n\n今朝の天気、どうでしたか？","tag":"#余韻","confidence":92},{"id":"2026-W24-009","pattern":"③余白型","theme":"梅雨の夜、窓が曇っていた","body":"梅雨の夜、\n窓ガラスが曇っていた。\n\n外が見えなくなった分だけ、\n部屋の中が濃くなった気がした。","reply":"煙が、部屋の空気と混ざる。\n\n外が見えない夜は、\n内側に集中するしかなくて、\nそれが悪くなかった。\n\nあなたの「梅雨の夜の過ごし方」は？","tag":"#静けさ","confidence":89},{"id":"2026-W24-010","pattern":"③余白型","theme":"蒸し暑い昼下がり","body":"蒸し暑い昼下がり。\n\n何もやる気が出なかった。\n一本だけ焚いて、\n天井を見ていた。","reply":"何もしないことを\n「サボり」だと思っていた時期がある。\n\n今は「充電」だと思っている。\n\n煙がゆっくり消えていくのを見ながら、\n充電している。\n\n梅雨の「何もしない時間」の使い方は？","tag":"#呼吸","confidence":88},{"id":"2026-W24-011","pattern":"③余白型","theme":"傘を干してから","body":"雨の日に帰って、\n傘を干した。\n\nそれから一本焚いた。\n\n外から内へ、切り替わった。","reply":"傘を干す、靴を揃える、一本焚く。\n\nたった三つのことが、\n「外の自分」から「家の自分」に戻す儀式になっている。\n\nあなたの「帰宅の儀式」は何ですか？","tag":"#暮らし","confidence":91},{"id":"2026-W24-012","pattern":"④水車静寂型","theme":"梅雨の増水と水車","body":"梅雨になると、水車の回転数が変わる。\n\n川の水量が増えて、\n水車が重くなる。\n\n粉の粒子も、少し変わる。","reply":"水量が多いと、水車の刃面への圧力が増す。\n粉が細かくなりすぎないよう、\n職人が水量を読みながら調整する。\n\n機械なら全部自動化できる。\nでも「今日の川の状態」を読んで動けるのは人だけ。\n\nそういう仕事が、今も続いている。","tag":"#手仕事","confidence":87},{"id":"2026-W24-013","pattern":"④水車静寂型","theme":"水車を止めない理由","body":"水車を「止める」という選択肢が、\nあの工場にはない。\n\nなぜかを聞いた。\n\n「一度止めると、合わせ直すのが大変だから」と言った。","reply":"水車は動き続けることで、\n木の部品が水に馴染んでいく。\n\n止めると乾燥して、\n再起動した時に歪みが出る。\n\n「続ける」方が、時に「始める」より難しい。\n\nあなたが「止めずに続けているもの」は？","tag":"#手仕事","confidence":86},{"id":"2026-W24-014","pattern":"④水車静寂型","theme":"川音と水車の音が重なる時間","body":"水車場の中で、\n川の音と水車の音が重なる時間がある。\n\nどちらがどちらかわからなくなる。\n\nそういう場所で挽かれた粉が、\n煙になる。","reply":"音のある場所で作られたものは、\n音を持っている気がする。\n\n水の音を聞きながら挽かれた粉は、\n焚いた時に何か違うと思っている。\n\n気のせいかもしれない。でも、気のせいじゃない気がする。\n\n音にこだわったことはありますか？","tag":"#静けさ","confidence":85},{"id":"2026-W24-015","pattern":"⑤未完ストーリー型","theme":"父から渡されたもの","body":"父から渡されたものが、一つある。\n\n物じゃない。\n言葉でもない。\n\n続きはリプ欄で。","reply":"「黙って見ていること」\n\nわからない時に、すぐ聞くのではなく、\nまず自分で見続ける習慣。\n\n仕入れ先の工場でも、最初の一年は\nただ見ているだけにした。\n\nその一年が、今の自分を作っている気がする。\n\n父から受け取ったもの、ありますか？","tag":"#受け継ぐ","confidence":90},{"id":"2026-W24-016","pattern":"⑤未完ストーリー型","theme":"梅雨に初めて仕入れに行った日","body":"初めて梅雨の時期に\n仕入れに行った日のことを、\nまだ覚えている。\n\n続きはリプ欄で。","reply":"福岡は、梅雨が本格的だった。\n農家の畑は水を含んで、\n足が沈むほどだった。\n\n「こんな状態で育つんですか」と聞いたら、\n「この水があるから育つ」と言われた。\n\n梅雨が嫌いではなくなった日。\n\n訪問先で考えが変わった経験はありますか？","tag":"#手仕事","confidence":89},{"id":"2026-W24-017","pattern":"⑤未完ストーリー型","theme":"試作19回ボツになった","body":"ある配合の試作品が、\n19回連続でボツになった。\n\n20回目に通った。\n\nその話を、リプ欄に。","reply":"ボツの理由は毎回違った。\n煙が多い。香りが薄い。\n火持ちが短い。\n\n19回全部、職人さんが「惜しい。でも違う」と言い続けた。\n\n20回目に「これだ」と言った顔が、今でも思い出せる。\n\n「これだ」と思えた瞬間、最近ありましたか？","tag":"#手仕事","confidence":91},{"id":"2026-W24-018","pattern":"⑥専門家裏側型","theme":"梅雨と気圧とお香の関係","body":"梅雨にお香の品質が落ちやすいのは、\n「湿気」だけが理由ではないのを知っていますか。\n\n実は「気圧」も関係している。","reply":"低気圧が続くと、\nお香の燃焼速度が変わる。\n\n気圧が低いと酸素が薄くなるため、\n火が安定しにくくなる。\n\n梅雨の日に「いつもより煙が少ない」と感じたら、\nそれは品質の問題ではなく気圧の影響かもしれない。\n\n天気で香りの印象が変わると感じたことありますか？","tag":"#国産お香","confidence":86},{"id":"2026-W24-019","pattern":"⑥専門家裏側型","theme":"雨の日の煙の上がり方","body":"雨の日の煙と、\n晴れの日の煙は、\n上がり方が違う。\n\n知っていましたか？","reply":"雨の日は湿度が高いので、\n煙の粒子が水分を含んで重くなる。\n\n上に上がらず、\nゆっくり横に広がる。\n\n「今日は煙がいつもと違う」と感じたら、\n外の天気を確認してみてほしい。\n\nそのまま部屋の中に居続けたくなるはず。","tag":"#国産お香","confidence":87},{"id":"2026-W24-020","pattern":"⑥専門家裏側型","theme":"梅雨に仕込む素材が良い理由","body":"実は、梅雨に仕込む素材が\n一年で一番良いと言われる理由がある。\n\n教えてもらったのは、工場の職人さんから。","reply":"梅雨の湿度が、\n素材の繊維を柔らかくして、\n混ぜ合わせやすくする。\n\n乾燥した冬に仕込むと、\n粉が静電気で固まって扱いにくい。\n\n「梅雨が嫌い」と言っていた職人さんが、\n「でも梅雨の仕込みは好き」と言っていた。\n\n嫌いの中に「でも好き」がある、ありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W24-021","pattern":"⑦デジタルデトックス型","theme":"梅雨の週末、2時間何もしない","body":"梅雨の週末、\n午後の2時間を「何もしない時間」にした。\n\n最初の30分は、\n何もしないことが辛かった。","reply":"次の30分は、ただ雨音を聞いていた。\n\n残りの1時間は、\nお香を焚いて煙を見ていた。\n\n2時間後、なぜか頭の中が整理されていた。\n\n「何もしない」って、実は何かをしている気がする。\n試したことはありますか？","tag":"#整える","confidence":91},{"id":"2026-W24-022","pattern":"⑦デジタルデトックス型","theme":"ニュースを見る前に一本焚く","body":"朝、ニュースを見る前に\n一本焚くようにした。\n\n3週間続いている。","reply":"ニュースを最初に見ると、\n世界の問題から一日が始まる。\n\n煙を最初に見ると、\n今この部屋から一日が始まる。\n\nどちらが「自分の一日」かは、\n試してみるとわかる。\n\n朝の最初の「行動」は何ですか？","tag":"#整える","confidence":90},{"id":"2026-W24-023","pattern":"⑦デジタルデトックス型","theme":"雨音と煙だけがある部屋","body":"音楽もない、\nテレビもない、\nスマホも裏向き。\n\n雨音と煙だけがある部屋に、\n30分いた。","reply":"最初は「何かしなきゃ」と思う。\n次に「何もしなくていい」になる。\n最後に「ここにいたい」になる。\n\nその順番を全部経験したのは、\nお香のおかげかもしれない。\n\n「何もしない30分」、作れそうですか？","tag":"#静けさ","confidence":89},{"id":"2026-W24-024","pattern":"⑧素材の叫び型","theme":"椨粉の矛盾——梅雨に弱いのに梅雨に育つ","body":"椨粉は、梅雨の湿気を嫌う。\n\nなのに、椨の木は梅雨に育つ。\n\nこの矛盾を、ずっと考えている。","reply":"木の状態で吸う雨水と、\n粉になってから吸う湿気は、別物らしい。\n\n生きている間は雨が必要。\n粉になったら雨が天敵になる。\n\n形が変わると、必要なものが変わる。\n\n素材だけの話じゃない気がしてきた。","tag":"#素材","confidence":88},{"id":"2026-W24-025","pattern":"⑧素材の叫び型","theme":"屋久杉のヤニが香りの正体","body":"屋久杉には、ヤニが多い。\n\n普通の杉の数倍。\n\nそのヤニが、香りの正体。","reply":"屋久島の厳しい環境が、\nヤニを増やす。\n\n台風、塩風、急激な温度変化。\n木が「生き残るため」に出すヤニが、\n何百年も積み重なって、\n今日焚いた煙になっている。\n\n生き延びてきたものの香りを、\n今日も吸っている。","tag":"#素材","confidence":90},{"id":"2026-W24-026","pattern":"⑧素材の叫び型","theme":"なぜ福岡の椨木なのか","body":"なぜ福岡の椨木なのか、\nよく聞かれる。\n\n答えは単純だ。\n\n「そこにいた農家を信頼したから」。","reply":"産地で選んだわけじゃない。\n\n農薬を使わず、30年続けている人と\n直接会って、話して、\n畑を見せてもらって、決めた。\n\n「どこで作ったか」より\n「誰が作ったか」で選んでいる。\n\nものを選ぶ時、あなたは何を重視しますか？","tag":"#素材","confidence":88},{"id":"2026-W24-027","pattern":"⑨リプ完結型","theme":"父の日に父に聞いたこと","body":"去年の父の日、\n父にあることを聞いた。\n\n答えを聞いて、少し泣いた。\n\n続きはリプ欄に。","reply":"「仕事をしてきて、一番良かったことは何？」と聞いた。\n\n「お前が自分で決めたことを、\nわたしのせいにしなかったこと」と言われた。\n\n自分で選んで、自分で進んできたか、\n確認されたような気がした。\n\n父の日、今年は何か伝えようと思っている。","tag":"#受け継ぐ","confidence":92},{"id":"2026-W24-028","pattern":"⑨リプ完結型","theme":"梅雨仕込みのお香を真夏に焚いた日","body":"梅雨に仕込んだお香を、\n真夏に初めて焚いた日のことを覚えている。\n\n続きはリプで。","reply":"梅雨の湿度を含んで仕込んだものは、\n乾いた夏に焚くと、何か「戻ろうとする」感じがある。\n\n煙が少しだけ重くて、粘り強い。\n\n季節を越えた素材の記憶が、\n煙になって出てくる気がした。\n\n「季節が変わったな」と感じた瞬間はありますか？","tag":"#余韻","confidence":89},{"id":"2026-W24-029","pattern":"⑨リプ完結型","theme":"忘れられないメッセージ","body":"お客さんから来た、\n忘れられないメッセージがある。\n\n今日も何度か読み返した。\n\nリプ欄に。","reply":"「母が入院している間、\n毎日一本焚いていました。\n退院した日も、焚きました。\n煙が変わらずそこにいてくれて、助かりました」\n\nお香に何かができるとしたら、\n「そこにいること」だと思っている。\n\nあなたにとっての「そこにいるもの」は何ですか？","tag":"#暮らし","confidence":93},{"id":"2026-W24-030","pattern":"⑨リプ完結型","theme":"3代目に怒られた話","body":"工場の3代目に、\n一度だけ怒られたことがある。\n\nなぜ怒られたかを、リプ欄で。","reply":"「値段を下げてほしい」と言った時だった。\n\n「価格を下げるということは、\nどこかを削るということ。\nわたしは削るものを持っていない」\n\nそれ以来、値段の交渉をしたことがない。\n\n「削れないもの」を持っている人と、\n取引できていることが誇りだと思っている。","tag":"#手仕事","confidence":91},{"id":"2026-W24-031","pattern":"⑩二択型","theme":"梅雨の雨音、好きですか？","body":"「梅雨の雨音」が好きですか？\n\n　A：好き、静かになるから\n　B：好きじゃない、気分が沈む\n\nどちらに近いですか？\n\n正直に教えてほしい。","reply":"Aの人に聞きたい。\n雨音の中でお香を焚いたことはありますか？\n\nBの人に聞きたい。\n「この雨の間は、ゆっくりしていい」\nと自分に言ったことはありますか？\n\nどちらの答えを聞いても、嬉しい。","tag":"#暮らし","confidence":89},{"id":"2026-W24-032","pattern":"⑩二択型","theme":"朝の煙と夜の煙","body":"朝に焚く煙と、\n夜に焚く煙。\n\nどちらが「長く見ていられる」と思いますか？\n\nわたしは、圧倒的に夜派。","reply":"朝の煙は「今日が始まる」から\n早く消えてほしくなる。\n\n夜の煙は「今日が終わる」から\nゆっくり消えてほしくなる。\n\n同じ煙なのに、時間によって\n「一緒にいたい時間」が変わる。\n\nあなたは朝派ですか、夜派ですか？","tag":"#選択","confidence":90},{"id":"2026-W24-033","pattern":"⑩二択型","theme":"父の日：使うものか残るものか","body":"父の日のプレゼントを選ぶなら、\n\n　A：使ってなくなるもの\n　B：手元に残るもの\n\nどちらを選びますか？\n\nお香は、Aです。","reply":"「なくなるもの」を贈るのは、\n少し勇気がいる。\n\nでも毎日使って、煙になって消える経験が\n「選んでくれた人のことを思い出す機会」になる。\n\n残るものは「思い出す」まで待つ。\n使うものは「使うたびに思い出す」。\n\nどちらが好きですか？","tag":"#選択","confidence":88},{"id":"2026-W24-034","pattern":"⑩二択型","theme":"梅雨の部屋：窓開ける派 vs 閉める派","body":"梅雨の部屋、\n\n　A：窓を開けて外の空気を入れる\n　B：窓を閉めて空調で管理する\n\nどちら派ですか？\n\nお香を焚くなら、どちらがいいと思いますか？","reply":"Aの場合、雨の匂いと煙が混ざる。\nBの場合、煙だけがある閉じた空間になる。\n\nどちらも正解で、\n「今日の気分」で変えるのが一番いいと思っている。\n\n部屋の空気、今日はどうしていますか？","tag":"#暮らし","confidence":87},{"id":"2026-W24-035","pattern":"⑪失敗学び型","theme":"梅雨前に在庫を増やして失敗","body":"梅雨前に、在庫を多めに仕込んだ年がある。\n\n「雨続きで発送が遅れるかも」という\n予防のつもりだった。\n\n見事に失敗した。","reply":"梅雨前に仕込んだ素材が、\n梅雨の湿気をたっぷり吸ってしまった。\n\n密封が甘かった一部のロットが、\n品質を落とした。\n\n今は逆に、梅雨前には在庫を絞る。\n「備えが裏目」になることを学んだ。\n\n準備しすぎて失敗した経験ありますか？","tag":"#手仕事","confidence":85},{"id":"2026-W24-036","pattern":"⑪失敗学び型","theme":"お香を焚きすぎた夜","body":"蒸し暑い夜に、お香を3本同時に焚いた。\n\n「涼しくなるかも」と思って。\n\nならなかった。逆に頭が痛くなった。","reply":"お香は「多く焚けば効果が上がる」ものではない。\n\n煙が多すぎると、\n部屋の酸素を消費して、\n逆に息苦しくなる。\n\n一本で十分な品質を出せているか、\nが大事。\n\n「多ければいい」が間違いだった経験はありますか？","tag":"#国産お香","confidence":84},{"id":"2026-W24-037","pattern":"⑪失敗学び型","theme":"「梅雨限定」を断念した話","body":"「梅雨限定のお香」を\n作ろうとしたことがある。\n\n試作を重ねて、結局出さなかった。\n\n理由は意外なところにあった。","reply":"「梅雨らしい香り」を考えた時、\nわたしが思い浮かべたのは\n土の匂い、雨の匂い、草の匂い。\n\nそれを再現しようとすると、\n人工的な香料が必要になる。\n\n天然素材だけでは「梅雨」は作れなかった。\n\n諦めることで見えた「自分のこだわり」が、\n逆に嬉しかった。\n\n諦めてよかった経験ありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W24-038","pattern":"⑫暦型","theme":"入梅から三週目","body":"入梅から数えると、\n今週で三週目に入る。\n\n「入梅」という言葉を\n知っていましたか？","reply":"「入梅」は旧暦で梅雨入りを表す言葉。\n現代の気象庁の「梅雨入り」より\n少し早い時期にあたることが多い。\n\n旧暦の人たちは、\n湿度の変化や植物の状態で\n「梅雨の始まり」を感じていた。\n\n今年の梅雨入り、いつだったか覚えていますか？","tag":"#暦","confidence":87},{"id":"2026-W24-039","pattern":"⑫暦型","theme":"夏至まであと一週間","body":"夏至まで、あと一週間。\n\n6月21日、今年の夏至。\n\n一年で一番、昼が長い日。","reply":"夏至を境に、少しずつ日が短くなる。\n\n「これから暗くなっていく」という事実が、\n毎年どこかさびしい。\n\n夏至の夜は、暗くなってから\n一本焚いてみてほしい。\n\n一番遅く訪れる夜に、煙を。\n\n夏至に何かしている習慣はありますか？","tag":"#暦","confidence":89},{"id":"2026-W24-040","pattern":"⑫暦型","theme":"半夏生（はんげしょう）","body":"7月2日は「半夏生」（はんげしょう）。\n\n夏至から数えて11日目。\n\n田植えを終える目安の日とされてきた。","reply":"「半夏生」という植物が白くなる頃。\n農家にとっては「この日までに植え終える」\n節目の日だった。\n\n今では農業と関係ない人も多いが、\n「季節の節目を知っている」だけで、\n時間の感覚が少し変わる。\n\n「半夏生」、知っていましたか？","tag":"#暦","confidence":88}]},
  {"batchId":"2026-W23","generatedAt":"2026-06-07","note":"自動生成","posts":[{"id":"2026-W23-001","pattern":"①Dear Algo型","theme":"六月の雨と窓辺の朝","body":"親愛なるアルゴリズム。\n\n六月の雨が窓を叩いている朝に、\nこの投稿を届けてほしい人がいる。\n\nベランダの鉢植えが濡れて、\nカーテンが少し湿って、\nそれでも部屋の中だけは、\n煙がゆっくり揺れている。\n\nそういう朝の人に、今日こそ。","reply":"梅雨の朝は、光が白くて柔らかい。\n雨粒の重さが空気を変える。\nその空気の中で焚く一本は、\n晴れの日とは全然違う顔をしている。\n\nあなたの今朝の空は、どんな色ですか？","tag":"#暮らし","confidence":92},{"id":"2026-W23-002","pattern":"①Dear Algo型","theme":"蒸し暑い夜、窓を開けた側へ","body":"親愛なるアルゴリズム。\n\n今夜、蒸し暑くて眠れない人に届けてほしい。\n\nエアコンをつけるか、窓を開けるか、\n迷っている人に。\n\n窓を開けた側に来てほしい。","reply":"蒸し暑い夜にお香を焚くと、\n煙が空気の流れを教えてくれる。\n\n風が入ってきた方向に、\n煙が静かに傾く。\n\n目に見えない風が、見えるようになる夜。\nエアコン派ですか、窓派ですか？","tag":"#余韻","confidence":90},{"id":"2026-W23-003","pattern":"①Dear Algo型","theme":"週末の朝、スマホを開かなかった人へ","body":"親愛なるアルゴリズム。\n\n今朝、スマホをすぐ開かなかった人に。\n\nベッドの中で少しだけ、\n今日何をするか考えた人に。\n\nこの投稿が届いてほしい理由がある。","reply":"スマホを開く前の時間って、\n一日で一番自分のものだと思う。\n\nその5分に、煙の揺れがある朝は\n少しだけ違う一日になる気がする。\n\n週末の朝、どう始めてますか？","tag":"#暮らし","confidence":91},{"id":"2026-W23-004","pattern":"①Dear Algo型","theme":"「丁寧な暮らし」に疲れた人へ","body":"親愛なるアルゴリズム。\n\n「丁寧な暮らし」という言葉に\n少し疲れた人に届けてほしい。\n\n頑張って「丁寧」にしなくていい。\nただ、一本焚く。それだけでいい。","reply":"「丁寧な暮らし」がプレッシャーになることがある。\n\nインテリア雑誌みたいにしなくていい。\n白い部屋じゃなくていい。\n\nただ、今この瞬間に\n煙が揺れているだけでいい。\n\nあなたにとっての「十分」って何ですか？","tag":"#呼吸","confidence":89},{"id":"2026-W23-005","pattern":"②構造的絶滅型","theme":"水車製粉所の現在地","body":"日本に残る水車製粉所が、いくつあるか知っていますか。\n\n数えたことがある。\n\n100を切っていた。","reply":"電気を使わず、水の力で粉を挽く。\nその仕組みを維持できる人間が、急速に減っている。\n\n機械なら交換できる。\nでも「水車を見て、聞いて、直す人」は\n育てるのに30年かかる。\n\n今いる職人が引退したら、終わる。\nこの事実を知っている人は少ない。","tag":"#手仕事","confidence":88},{"id":"2026-W23-006","pattern":"②構造的絶滅型","theme":"自然栽培農家が続ける矛盾","body":"「農薬を使わない」と決めると、\n収量は6割に落ちる。\n\nそれでもやっている農家が福岡にいる。","reply":"6割の収量で、市場価格と同じ値段では売れない。\nでも高くすると売れない。\n\nその矛盾の中で30年続けてきた農家から、\nうちは椨粉を仕入れている。\n\n「続けてくれてありがとう」と\n毎年思いながら。","tag":"#手仕事","confidence":87},{"id":"2026-W23-007","pattern":"②構造的絶滅型","theme":"3代続く工場の「4代目問題」","body":"3代続く工場には、\nたいてい同じ問題がある。\n\n「4代目をどうするか」問題だ。","reply":"長男が継がなかった場合、\n工場は「廃業」か「売却」の二択になる。\n\n工場の機械は専用品で、他に使い道がない。\n\nうちが取引している工場の3代目は、\n今年60を超えた。\n\n「まだ先の話」と言えなくなっている。","tag":"#受け継ぐ","confidence":86},{"id":"2026-W23-008","pattern":"③余白型","theme":"白い空の朝","body":"雨音がしている。\n\nカーテンを開けたら、\n空が白かった。\n\n一本、焚く。","reply":"白い空の朝は、\n煙の色もどこか白い。\n\n窓の外の白と、\n部屋の中の白が\nゆっくり混ざっていく。\n\n梅雨の朝が、好きになった。\nあなたの好きな天気は？","tag":"#余韻","confidence":90},{"id":"2026-W23-009","pattern":"③余白型","theme":"仕事終わりの静止","body":"今日の仕事が終わった。\n\n何もしたくなかったから、\nただ一本だけ焚いた。","reply":"何かをするための準備じゃない。\n何かを終わらせるためでもない。\n\nただ、煙がある部屋に\n自分がいるだけ。\n\nそれが今日の全部だった。\n\nそういう日、最近ありましたか？","tag":"#余韻","confidence":89},{"id":"2026-W23-010","pattern":"③余白型","theme":"紫陽花の道から帰って","body":"紫陽花が咲いている道を通った。\n\n家に帰って、一本焚いた。\n\nそれだけの話。","reply":"「なぜそうしたの？」と聞かれたら、\nうまく答えられない。\n\nでもその「なんとなく」の積み重ねが\n暮らしになっていく気がする。\n\nあなたにも「なんとなくそうしてしまう」\n小さな習慣ありますか？","tag":"#暮らし","confidence":88},{"id":"2026-W23-011","pattern":"③余白型","theme":"音のない土曜日","body":"土曜の午後。\n\nテレビを消した。\nスマホも、伏せた。\n\n煙だけが動いていた。","reply":"静かにしようと思ってしたわけじゃない。\nただ、そうなっていた。\n\nその時間の後、\nなんとなく体が軽かった。\n\n音のない時間、意外と好きですか？","tag":"#静けさ","confidence":91},{"id":"2026-W23-012","pattern":"④水車静寂型","theme":"梅雨の川と水車の音","body":"梅雨になると、川が速くなる。\n\n水車の音が変わる。\nゴ、ゴ、ゴ、と重くなる。\n\nその水で、粉が挽かれる。","reply":"水車の速度が変わると、\n粉の粒子も変わる。\n\n雨の多い梅雨に挽かれた粉は\n少しだけ荒く、力強い。\n\n季節の違いが粉に出て、\n粉の違いが煙に出る。\n\n自然とはそういうものらしい。","tag":"#手仕事","confidence":87},{"id":"2026-W23-013","pattern":"④水車静寂型","theme":"「水があるから」という答え","body":"なぜ電気を使わないのか、と聞いた。\n\n「水があるから」と言った。\n\n深い答えだと思った。","reply":"電動製粉機の方が、\n均一で、早くて、安い。\n\nそれでも「水があるから」という言葉は、\n何百年もそこにあった理由そのものだった。\n\n川があれば粉が挽ける。\nその単純さが、今も続いている。\n\nあなたの「変えない理由」はありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W23-014","pattern":"④水車静寂型","theme":"夜中の水車場","body":"夜中の水車場に行ったことがある。\n\n水の音だけが聞こえて、\n他は何もなかった。\n\n月が川に映っていた。","reply":"水車は夜も回っている。\n\n誰もいない場所で、\n誰も頼んでいないのに、\nただ粉を挽き続けている。\n\nその粉で作ったお香を、\n今朝焚いた。","tag":"#静けさ","confidence":88},{"id":"2026-W23-015","pattern":"⑤未完ストーリー型","theme":"屋久杉の原木を触った日","body":"初めて屋久杉の原木を触った日のことを、\nまだ覚えている。\n\n続きはリプ欄で。","reply":"木目が細かすぎて、年輪が数えられなかった。\n\n「これ、何年ですか」と聞いたら、\n「わからない、千年は超えてる」と言われた。\n\n千年分の時間を\n今日焚いた。\n\nあなたが触れた中で「時間の重さ」を感じたものは？","tag":"#素材","confidence":91},{"id":"2026-W23-016","pattern":"⑤未完ストーリー型","theme":"配合を変えて失敗した秋","body":"去年の秋、配合を変えた。\n\n全部失敗した。\n\n続きはリプ欄に。","reply":"比率を少し変えただけで、\n全然違う煙になる。\n\n3ヶ月かけて調整して、\nようやく元に戻った。\n\n「変えない」という選択が\nどれだけ難しいか、あの秋に学んだ。\n\n似たような経験、ありますか？","tag":"#手仕事","confidence":89},{"id":"2026-W23-017","pattern":"⑤未完ストーリー型","theme":"農家の畑の端に立った","body":"初めてタブノキ農家を訪ねた時、\n畑の端に立って黙っていた。\n\n理由は、リプ欄で。","reply":"農薬を使わないと、雑草が生い茂る。\n\n草だらけの畑を見て、\n「これが自然栽培か」と思った。\n\n綺麗じゃない。でも、豊かだった。\nあの景色が今も忘れられない。\n\n「綺麗じゃないけど豊か」なもの、\nあなたの周りにありますか？","tag":"#手仕事","confidence":87},{"id":"2026-W23-018","pattern":"⑥専門家裏側型","theme":"椨粉の粒度チェックは手のひらで","body":"椨粉の粒度チェックは\n手のひらで触ってわかる。\n\n機械を使わない。","reply":"指の腹に粉をのせて、こすり合わせる。\n\nザラつきの感触で\n「今日は少し荒い」「今日は細かい」がわかる。\n\n30年続けると、手が目になる。\n\n「体で覚えた」仕事ってありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W23-019","pattern":"⑥専門家裏側型","theme":"お香の品質劣化を見分ける煙の色","body":"お香の品質が落ちているサインを\n知っていますか？\n\n煙の「色」で見ます。","reply":"良いお香の煙は、白くてまっすぐ。\n劣化したお香は、煙が茶色くなる。\n\n湿気を吸って変質したか、\n原料が酸化したか、どちらか。\n\n買った時と煙の色が違うと感じたら、\n保管場所を見直すサインです。\n\n保管、気にしていますか？","tag":"#国産お香","confidence":85},{"id":"2026-W23-020","pattern":"⑥専門家裏側型","theme":"梅雨・夏のお香保管の3つのNG","body":"梅雨から夏、\nお香の天敵は「湿気」です。\n\nやってはいけないことが3つある。","reply":"①直射日光が当たる場所\n②水回りの近く（キッチン、洗面所）\n③密閉していない状態での高温保管\n\n涼しくて暗くて、密閉できる場所が正解。\n\n夏越しさせてあげてください。\n\n今の保管場所、大丈夫そうですか？","tag":"#国産お香","confidence":84},{"id":"2026-W23-021","pattern":"⑦デジタルデトックス型","theme":"スマホを10分だけ別室に置いた","body":"今夜、10分だけ\nスマホを別の部屋に置いてみた。\n\n思ったより長かった。","reply":"10分って短いはずなのに、\n手持ち無沙汰で3回部屋を往復した。\n\nそれほどまでに、\nスマホを持っている手が「普通」になっていた。\n\nその10分に、お香を一本。\n煙を見ているだけで、10分が満ちた。\n\n試してみますか？","tag":"#整える","confidence":91},{"id":"2026-W23-022","pattern":"⑦デジタルデトックス型","theme":"通知を全オフにした夜","body":"通知を全部オフにした夜、\n部屋が静かすぎて落ち着かなかった。\n\nでも一時間後には、\n眠れていた。","reply":"通知音って「いつ来るかわからない」から\nずっと気になってしまう。\n\nそれをなくすと、\n今この部屋に何があるかだけを\n感じられるようになる。\n\nその感覚、久しぶりだった。\n\n通知、オフにしたことありますか？","tag":"#整える","confidence":89},{"id":"2026-W23-023","pattern":"⑦デジタルデトックス型","theme":"一日11時間、画面を見ていた","body":"一日、何時間、画面を見ていますか。\n\nわたしは先週、計ってみた。\n\n正直に書きます。","reply":"11時間だった。\n\n起きている時間の約7割。\n\nそれを知って、\n夜だけは画面から離れようと決めた。\n\n今はその時間に、煙を見ている。\n\nあなたは何時間くらいだと思いますか？","tag":"#呼吸","confidence":88},{"id":"2026-W23-024","pattern":"⑧素材の叫び型","theme":"タブノキが自分を知っている","body":"タブノキを切ると、\n独特の香りが出る。\n\nこの木、自分が誰かを知っている。","reply":"樹皮を剥ぐと、内側が赤い。\n\nその赤さが、乾燥すると消えて\n粉になって、煙になる。\n\n木が変わっていく過程を\nすべて手で触ってきた。\n\n自分の仕事の「元」を見たことありますか？","tag":"#素材","confidence":87},{"id":"2026-W23-025","pattern":"⑧素材の叫び型","theme":"屋久杉の重さは時間の重さ","body":"屋久杉は、重い。\n\n同じサイズの他の杉の\n倍くらいある。\n\n密度が違う。","reply":"屋久島の過酷な環境で育つと、\n木の細胞が詰まる。\n\nその密度が「香り」になる。\n\n軽い木からは軽い香りしか出ない。\n重さは、時間の重さだと思う。\n\n重みのある香り、好きですか？","tag":"#素材","confidence":89},{"id":"2026-W23-026","pattern":"⑧素材の叫び型","theme":"椨粉の色が天気を教える","body":"椨粉には、\n同じものが一つもない。\n\n同じ農家の、同じ畑でも、\n年によって色が変わる。","reply":"今年の椨粉は、少し茶色みが強い。\n\n去年より雨が多かったからかもしれない。\n天気が粉の色になる。\n\n工場の職人さんが、\n「今年は違いますね」と言っていた。\n\n天気が食べ物の味を変えた経験ありますか？","tag":"#素材","confidence":88},{"id":"2026-W23-027","pattern":"⑨リプ完結型","theme":"初めてお香を焚いた日の記憶","body":"初めてお香を焚いた日のことを、\n今でも覚えている。\n\nリプ欄に続く。","reply":"小学生の頃、祖父の家でお線香の煙を見ていた。\n\n「なぜ煙が消えないのに見えるのか」\nずっと不思議だった。\n\nあの疑問が、今の仕事の出発点かもしれない。\n\nあなたの「初めてお香」の記憶はありますか？","tag":"#暮らし","confidence":90},{"id":"2026-W23-028","pattern":"⑨リプ完結型","theme":"工場に初めて泊まった朝","body":"取引先の工場に、\n初めて泊めてもらった夜があった。\n\n続きはリプで。","reply":"翌朝5時、職人さんが動き出す音がした。\n\n機械の音じゃない。水の音だった。\n\n「朝一番は川の具合を見に行く」と言われた。\nそれが30年変わらない習慣らしい。\n\n毎朝続けていることって、ありますか？","tag":"#手仕事","confidence":91},{"id":"2026-W23-029","pattern":"⑨リプ完結型","theme":"お客さんの思いがけない一言","body":"先日、お客さんから\n思いがけないことを言われた。\n\n詳しくはリプ欄で。","reply":"「このお香を焚いている間、\n夫との喧嘩をしていない気がします」\n\nそう書かれていた。\n\nお香に何かある、というより、\n焚く行為に何かある気がした。\n\nあなたにとってお香が「何かを変えた」経験はありますか？","tag":"#暮らし","confidence":92},{"id":"2026-W23-030","pattern":"⑨リプ完結型","theme":"香りのタイムマシン","body":"香りと記憶は直結している。\n\nある日、突然それを証明されることがある。\n\nリプ欄で。","reply":"先日、新しいお香の試作品を嗅いだら、\n祖母の台所の匂いがした。\n\nどこにも行っていないのに、\n一瞬でそこに戻れた。\n\n香りって、タイムマシンだと思う。\n\nあなたを「あの場所」に連れていく香りはありますか？","tag":"#余韻","confidence":93},{"id":"2026-W23-031","pattern":"⑩二択型","theme":"焚く場所：寝室 vs リビング","body":"お香を焚くなら、\n\n「寝室」と\n「リビング」\n\nどっちが好きですか？\n\nわたしは、断然寝室派です。","reply":"寝室は「一日の終わり」の場所だから、\n煙が一緒に眠りについてくれる感じがする。\n\nリビング派の理由も聞いてみたい。\n「みんなと同じ空気を吸う」感じがいいのかな。\n\nどちらで焚きますか？","tag":"#暮らし","confidence":90},{"id":"2026-W23-032","pattern":"⑩二択型","theme":"梅雨、好き？嫌い？","body":"梅雨が「好き」な人と\n「嫌い」な人、\n\n割合はどちらが多いと思いますか？\n\n正直に教えてほしい。","reply":"意外と「好き」派がいる感覚がある。\n\n雨の音が好きとか、\n読書が捗るとか、\n外に出ない言い訳ができるとか。\n\nお香を焚く人には\n梅雨が好きな人が多い気がしている。\n\nどちらですか？","tag":"#暮らし","confidence":88},{"id":"2026-W23-033","pattern":"⑩二択型","theme":"朝と夜、どちらに焚く？","body":"お香を焚くのは\n\n「朝一番」か\n「夜寝る前」か\n\nどちら派ですか？\n\n切り替えの使い方が全然違うと思って。","reply":"朝派は「今日を始める儀式」として。\n夜派は「今日を終わらせる儀式」として。\n\nどちらも正解だけど、\n両方やっている人がいたら、\nその使い分けをぜひ教えてほしい。","tag":"#選択","confidence":89},{"id":"2026-W23-034","pattern":"⑩二択型","theme":"一本 vs 複数本","body":"一度に焚くのは\n\n「必ず一本だけ」派と\n「気分で複数本」派、\n\nどっちですか？\n\nうちは一本派です。理由をリプで。","reply":"一本にこだわるのは、\n「一本で十分な量の香りを出せる」という\n職人の自信があるから。\n\nたくさん焚けば強くなるのではなく、\n一本の質で勝負している、という意思表示でもある。\n\nあなたは何本派ですか？","tag":"#選択","confidence":88},{"id":"2026-W23-035","pattern":"⑪失敗学び型","theme":"仕入れ先を変えて戻した話","body":"一度だけ、\nコスト削減のために別の仕入れ先に変えた。\n\n3ヶ月で戻した。","reply":"価格が3割安かった。\nでも、粉の粒子が均一すぎた。\n\n「均一」は機械にしかできない。\n水車で挽くと、粒子にばらつきが出る。\n\nそのばらつきが「深み」になると、\n変えて初めてわかった。\n\n「失ってわかった大切なこと」ありますか？","tag":"#手仕事","confidence":86},{"id":"2026-W23-036","pattern":"⑪失敗学び型","theme":"夏越し失敗の教訓","body":"3年前、在庫を持ちすぎた。\n\n半年分の椨粉が、\n夏を越えられなかった。","reply":"湿気と高温で、酸化が進んだ。\n\n天然素材は生き物に近いから、\n「余裕を持って大量仕入れ」が\n正解じゃないことがある。\n\n今は「3ヶ月サイクル」に変えた。\n少量多回転が正解だった。\n\n似たような「持ちすぎた」経験はありますか？","tag":"#暮らし","confidence":85},{"id":"2026-W23-037","pattern":"⑪失敗学び型","theme":"「100%天然」と書いて指摘された","body":"以前、「100%天然」という言葉を\nそのままSNSに書いた。\n\nすぐに指摘が来た。","reply":"「水は天然ですか、添加物ですか」という質問だった。\n\n厳密に言えば、水も添加物とも言える。\n\nそれ以来、「天然」という言葉は使わなくなった。\n正確な言葉を選ぶことが、誠実さだと学んだ。\n\n言葉の使い方で気をつけていることってありますか？","tag":"#手仕事","confidence":84},{"id":"2026-W23-038","pattern":"⑫暦型","theme":"芒種（ぼうしゅ）の頃","body":"6月6日は「芒種」（ぼうしゅ）。\n\n稲の穂が出る前の、種まきの季節。\n\n「芒」（のぎ）とは、稲の先端の棘のこと。\n梅雨も、この頃に始まる。","reply":"芒種の頃、梅雨も始まる。\n\n雨が降るから種が育つ。\n種が育つから秋に収穫できる。\n\n農業も、お香の原料も、\n雨の季節があってこそ続いている。\n\n「芒種」という言葉、知っていましたか？","tag":"#暦","confidence":87},{"id":"2026-W23-039","pattern":"⑫暦型","theme":"夏至まであと二週間","body":"夏至まで、あと約二週間。\n\n一年で一番昼が長い日。\n\n日が暮れるのが遅い夜に、\nお香を焚く時間が変わる。","reply":"夏至の夜は、7時を過ぎても空が明るい。\n\n「暗くなってから焚く」習慣がある人は、\n焚く時間が自然と遅くなる。\n\n夏至を境に、少しずつ夜が長くなる。\nそのことが、なぜか毎年少し嬉しい。\n\n夏至に何かしていることはありますか？","tag":"#暦","confidence":88},{"id":"2026-W23-040","pattern":"⑫暦型","theme":"蛍の季節と水車場","body":"六月、川辺に蛍が出る季節。\n\n水車場の近くにも、\n蛍が来るらしい。","reply":"水が綺麗な場所にしか蛍は来ない。\n\n水車で粉を挽ける場所には、\n蛍が来る川がある。\n\nそれだけで、\nその水で挽いた粉を信じられる気がする。\n\n今年、蛍を見ましたか？","tag":"#暦","confidence":90}]},

":"②構造的絶滅型","theme":"水車製法が電力化されなかった理由","body":"なぜ今も水車なのか。\n\n電動に変えると：\n①コストが下がる\n②均一に挽ける\n③天候に左右されない\n\nそれでも変えなかった理由は、\n「電力にすると粉の温度が上がる」から。\n\n熱が椨粉の香り成分を飛ばしてしまう。\n水車は、熱を生まない。","reply":"「なぜ水車にこだわるのか」を\nコストや伝統の話だと思っていた。\n\n違った。香りの話だった。\n\n電動より水車の方が「香りが生きる」という、\n科学的な理由があった。\n\nこだわりには、必ず根拠がある。","tag":"#手仕事","confidence":89},{"id":"2026-W22-022","pattern":"③余白型","theme":"夜中の雨音とお香","body":"夜中に目が覚めた。\n\n雨が降っていた。\n\n眠れないまま一本焚いて、\n暗い部屋で煙を見ていた。\n\n朝になる前の時間。\nそれだけのことだったけど、忘れない夜になった。","reply":"夜中に目が覚める時って、\n何か考えていることがあるんだと思う。\n\nお香を焚くと、その「何か」と\nゆっくり向き合える気がする。\n\n解決はしない。でも少し、整う。","tag":"#余韻","confidence":90},{"id":"2026-W22-023","pattern":"⑩二択型","theme":"お香の置き方","body":"お香を焚く時、\n\n「立てて焚く」か「寝かせて焚く」か\n\nどちらが好きですか？\n\n香立てに立てる派と、\n横型の皿に寝かせる派。\n煙の広がり方がまったく違う。","reply":"寝かせる派の声が多い気がしている。\n\n横に寝かせると、煙が低く這うように広がって、\n部屋全体にゆっくり香りが満ちる。\n\n立てると、上に向かって一筋の線になる。\n\n気分によって変えても、いいと思う。","tag":"#暮らし","confidence":88},{"id":"2026-W22-024","pattern":"⑤未完ストーリー型","theme":"梅雨の工場訪問","body":"梅雨の盛りに、工場を訪ねた。\n\n工場中に、乾燥中のお香が並んでいた。\n白い香煙のような気体が、\n床を這っていた。\n\n続きはリプ欄に。","reply":"「これ、なんですか」と聞いたら、\n「蒸気ですよ」と。\n\n乾燥の過程で、お香から水分と一緒に\n微かな香り成分が立ち上がっているらしい。\n\n工場全体が、お香の匂いで満ちていた。\n製品になる前から、もう、お香だった。","tag":"#手仕事","confidence":90},{"id":"2026-W22-025","pattern":"①Dear Algo型","theme":"夏至を前にした光","body":"親愛なるアルゴリズム。\n\n6月の光が、少しずつ長くなっている。\n夏至まで、あと数週間。\n\n一年で一番、昼が長い日が来る前に。\n\n光の中でお香を焚いている人に届けたい。\n今年の夏至をどう迎えるか、もう考えている人に。","reply":"夏至の朝に焚くお香を、\nもう選んでいる人がいると信じている。\n\nそういう人が、届け先でいてほしい。","tag":"#暦","confidence":91},{"id":"2026-W22-026","pattern":"⑦デジタルデトックス型","theme":"梅雨の午後、画面から目を離す","body":"梅雨の午後、画面から目を離せない日があった。\n\nニュースも、SNSも、メールも。\n全部「今すぐ確認しないといけない気がする」になっていた。\n\nお香を一本焚いて、20分だけ離れた。\n\n世界は、何も変わっていなかった。","reply":"「20分離れても世界は変わらない」は、\n体験しないとわからない。\n\nお香の一本分、約20分。\n\nその間に見逃したものは、\n今日の本当に大事なことじゃなかった気がする。","tag":"#暮らし","confidence":87},{"id":"2026-W22-027","pattern":"⑨リプ完結型","theme":"屋久島に行ったことがない","body":"屋久杉を使っているのに、\nまだ屋久島に行ったことがない。\n\n行きたいのか聞かれると、\n正直わからない。\n\n続きはリプ欄に。","reply":"「知らないまま使っている」ことへの\n罪悪感と好奇心が混ざっている。\n\n工場長は「行かなくていい、想像で十分」と言う。\n\n木目に触れた時の感触が、\nもう屋久島だと思えるから。\n\nまだ迷っている。","tag":"#素材","confidence":89},{"id":"2026-W22-028","pattern":"⑧素材の叫び型","theme":"福岡の椨粉が語ること","body":"福岡の山で育った椨粉が言っている。\n\n「農薬なしで育つのは、時間がかかる。\n肥料なしで育つのは、土が強くないといけない。\n\nその土が、福岡のあの山にある。\nだから、ここでしか育てられない。」\n\n産地の意味を、素材が知っている。","reply":"「国産」「無添加」は言葉として便利だけど、\n本当は場所の話だと思う。\n\n福岡のあの山の、あの土の、あの椨粉。\n\n代替がない。\nだから、続けてくれている農家に頭が下がる。","tag":"#素材","confidence":88},{"id":"2026-W22-029","pattern":"⑥専門家裏側型","theme":"梅雨前の最終検品","body":"梅雨入り前に、最終検品を終えた。\n\n確認したこと：\n・香りの強度（湿気による変化がないか）\n・折れやすさ（乾燥が十分か）\n・色のムラ（素材のばらつき）\n\nすべてクリア。今年の梅雨は、これで越す。\n\n検品は、お客さんに代わって焚く行為だと思っている。","reply":"「検品は誰のためか」と考えると、\n答えは明確で、\n受け取る人の最初の一本のため。\n\n最初の一本が良くないと、\nその人にとってのお香は、そこで終わる。\n\n最初の一本に、全部乗っている。","tag":"#国産お香","confidence":86},{"id":"2026-W22-030","pattern":"⑫暦型","theme":"入梅（にゅうばい）という言葉","body":"「入梅」という言葉がある。\n\n梅雨に入る日。\n雑節のひとつで、6月11日頃。\n\n「入梅いわし」という言葉もあって、\nこの時期のイワシが一番おいしいらしい。\n\n日本の暦は、食と連動している。\nお香も、季節と連動している気がする。","reply":"入梅の頃に焚くお香は、\n水分を含んだ空気の中で\n煙がよく広がる。\n\n梅雨はお香の季節だ、と\n毎年この時期に確信する。","tag":"#暦","confidence":87},{"id":"2026-W22-031","pattern":"⑪失敗学び型","theme":"湿気でお香を駄目にした話","body":"一度、在庫を全部駄目にした。\n\n梅雨の倉庫に3週間、除湿せずに置いた。\n箱を開けたら、白カビが生えていた。\n\n天然素材だから、当たり前だった。\nでも知らなかった。\n\n失った量と、教えてもらった知識の重さが\n今でも比例している。","reply":"「失って学んだことは忘れない」は本当で、\n梅雨が来るたびに、あの箱のことを思い出す。\n\n今は湿度管理が習慣になった。\n\n失敗が、今年のお香を守っている。","tag":"#暮らし","confidence":88},{"id":"2026-W22-032","pattern":"⑩二択型","theme":"梅雨の香り、好き・嫌い","body":"「梅雨の香り」が好きですか？\n\n雨が降り始める前の、\nあの土と草と湿気が混ざった匂い。\n\n好き派と嫌い派に、きれいに分かれる気がする。\nあなたはどちら？","reply":"好き派の人は、\nおそらくお香も好きだと思っていて。\n\n「自然の匂いに鼻が開いている人」は、\nお香の煙も受け取れる気がする。\n\nどちらでも、聞かせてください。","tag":"#暮らし","confidence":90},{"id":"2026-W22-033","pattern":"③余白型","theme":"窓を開けたら雨の匂い","body":"窓を開けたら、雨の匂いがした。\n\nまだ降っていない。\n降る前の、あの独特の土の香り。\n\nそのまま一本焚いた。\n\n外の匂いと、煙が重なって、\n部屋が梅雨になった。","reply":"「ペトリコール」という言葉がある。\n雨が降る前に地面から立ち上る匂いのこと。\n\nその言葉を知ってから、雨前に窓を開けるようになった。\n\nペトリコールとお香は、意外と合う。","tag":"#余韻","confidence":89},{"id":"2026-W22-034","pattern":"④水車静寂型","theme":"水車小屋の夜明け","body":"梅雨の水車小屋 \n\n自然栽培で、急かさず育てた木の粉は\nちゃんと「重い」。\n\n軽い粉との差が、\n焚いた時の香りの奥行きになる。","reply":"軽い椨粉は、さらさらしていて扱いやすい。\n重い椨粉は、しっとりとして、少し粘り気がある。\n\nその「粘り」に、土の時間が入っている気がして\n手でふれる度に思う。","tag":"#生産者支援","confidence":88},{"id":"2026-W21-021","pattern":"⑨リプ完結型","theme":"お香と睡眠の関係","body":"「お香を焚くと眠れますか？\n睡眠に使っている方いますか？」\n\nという質問をよくいただきます。\n知っている範囲で、リプ欄にまとめます。","reply":"【お香と睡眠について】\n\n眠る前に焚く派の方が多いです。\n\nポイントは：\n①短めのお香（5〜10分）で焚き切る\n②煙が出ているうちに消さない\n③換気しながら焚く\n\n「眠るために焚く」より、\n「今日を終わらせるために焚く」という感覚が合う方が多いようです。\n\n余韻の中で眠る、が正解かもしれません。","tag":"#お香のある暮らし","confidence":84},{"id":"2026-W21-022","pattern":"⑩二択型","theme":"存在感がある香りか控えめな香りか","body":"同じお香でも、量で強さが変わる。\nあなたはどちら派？\n\n🔥 存在感がある香り——焚いているとすぐわかる\n🍃 ふんわり漂う香り——気づいたらある、くらいの控えめさ\n\nその日の気分で変わる人も多いけど、\n「だいたいどちら」で答えてほしい。","reply":"「強め」の時は、自分の輪郭がほしい日。\n「弱め」の時は、消えていたい日。\n\n香りの強さが、気持ちの状態を教えてくれることがある。\n今日のあなたは、どちらを選びましたか？","tag":"#選択","confidence":92},{"id":"2026-W21-023","pattern":"⑪失敗学び型","theme":"急いでお香を折ってしまった","body":"急いでいる時に、\n香立てにお香を刺そうとして、折ってしまった。\n\n天然素材のお香は、折れやすい。\n特に湿気が少ない季節は、もろい。\n\n「急ぎながら焚く」が、\nそもそも矛盾だと気づいた。","reply":"お香を焚く時間は、「急がない時間」のはずで。\n\n急いでいる時に焚こうとすること自体が、\n「もう限界」のサインかもしれない。\n\n折れたお香を見て、\n少し笑えるくらいになった今が好きです。","tag":"#暮らし","confidence":84},{"id":"2026-W21-024","pattern":"⑫暦型","theme":"芒種（6月6日）を前に準備する","body":"もうすぐ芒種（ぼうしゅ）が来る。\n\n麦が実り、田に苗を植える季節。\n梅雨の始まりとも重なる。\n\n「忙しい」と読めるその漢字が、\nなぜか好きだ。\n\n今週は、その手前の静かな時間。","reply":"芒種は「種まきをする」という意味の節気。\n\n何かを始める前の、準備の季節。\n\n今週、来月にやりたいことを\nひとつだけ決めておくと、\n6月が少し変わるかもしれない。","tag":"#暦","confidence":88},{"id":"2026-W21-025","pattern":"①Dear Algo型","theme":"疲れた水曜日の夜の誰かへ","body":"親愛なるアルゴリズム。\n\n水曜日の夜、画面の前で\n「今週長いな」と思っている人がいると思う。\n\n特別なことは何もないのに、疲れた日。\n\nそういう人に届けたい。\n一本焚いて、煙を見るだけでいい夜がある。","reply":"「疲れた」と「休めた」の間に、\nお香の時間を置く。\n\n何もしない時間を作ることが、\n一番の回復方法だと思っています。","tag":"#呼吸","confidence":90},{"id":"2026-W21-026","pattern":"②構造的絶滅型","theme":"水車工場を消す「水利権」の問題","body":"水車を動かすには、川の水を使う権利がいる。\n「水利権」という仕組みが必要だ。\n\n水利権が取れなくなった水車工場が\n全国にある。\n\n「水が使えなければ、水車は回せない」\n\nこれが、製法より先に工場が消える理由になっている。","reply":"法律の問題が、文化を消すことがある。\n\n水利権の更新が、\n知られないまま切れていた工場を知っている。\n\n制度の問題は個人では変えにくい。\nだから「使い続ける」ことが、守ることになる。","tag":"#受け継ぐ","confidence":87},{"id":"2026-W21-027","pattern":"③余白型","theme":"家族が起きる前の10分","body":"朝、家族が起きる前の10分。\n\nお湯を沸かして、\n一本だけ焚いて、\n誰も話しかけてこない時間を持つ。\n\n「自分だけの朝」は、\n10分あれば十分だと知った。","reply":"「自分の時間がない」と感じている人に聞くと、\nたいてい10分の隙間はある。\n\nその10分を使う習慣が、\n一日の質を変えていく。\n\nあなたの「10分」は何時ですか？","tag":"#暮らし","confidence":89},{"id":"2026-W21-028","pattern":"④水車静寂型","theme":"水車小屋の中だけ時間が違う","body":"水車小屋の中は、外とは時間が違う。\n\n水が回る音、木がきしむ音、\n石臼が粉を挽く低い音。\n\n外の世界の速さが、ここでは関係ない。\n\nここで挽かれた粉を焚くたびに、\nあの別世界の静けさを思い出す。","reply":"「別世界があると知っている」ことが、\n日常を耐えられるものにしてくれる気がします。\n\n水車小屋でも、山の中でも、\n自分だけの「別世界」はどこですか？","tag":"#静けさ","confidence":86},{"id":"2026-W21-029","pattern":"⑤未完ストーリー型","theme":"農家から「今年は届けられない」連絡","body":"農家から、短いメッセージが来た。\n\n「今年の椨、量が取れませんでした。\n例年の半分以下です」\n\nそれだけ。理由は書いていなかった。\n\n続きはリプ欄に。","reply":"電話を入れた。\n\n「春先の霜にやられてしまって。\n今年は無理かもしれません」\n\n沈黙が続いた後、\n「来年は必ず」と言ってくれた。\n\n自然の中で作るということは、\n毎年が初めてということだと改めて思った。","tag":"#手仕事","confidence":92},{"id":"2026-W21-030","pattern":"⑥専門家裏側型","theme":"一番地味で一番大事な「検品」の話","body":"お香の仕事で、\n一番地味で一番大事な仕事は「検品」。\n\n一本一本、長さ・太さ・折れ・反りを確認する。\n\n機械で確認できる部分もあるが、\n最後は目と手でしか確認できないことがある。\n\n地味な仕事が、品質を守っている。","reply":"「全部同じに見える」お香に、\nどれだけの手間がかかっているか。\n\n「綺麗に揃っている」ことが、\n実は一番難しい仕事の結果です。\n\n机に並んだお香を、次に見てほしい。","tag":"#国産お香","confidence":85},{"id":"2026-W21-031","pattern":"⑦デジタルデトックス型","theme":"寝る前のSNSをやめたら翌朝が変わった","body":"寝る前にSNSを見ると、\n翌朝、なんとなく重い。\n\n代わりに一本焚いて、\n煙が消えるのを見てから眠ると、\n翌朝、なんとなく軽い。\n\n科学的な根拠はわからない。\nでも、自分の体が知っている。","reply":"「スマホをやめろ」ではなく、\n「焚いてから眠る」という提案なら\n実行できる人が増える気がしています。\n\nやめる代わりに、始める。\n小さな置き換えの力。","tag":"#整える","confidence":91},{"id":"2026-W21-032","pattern":"⑧素材の叫び型","theme":"屋久杉の年輪に閉じ込められた精油","body":"屋久杉の年輪は、他の杉より密だ。\n\n樹齢100年の木の断面を見ると、\n年輪が1ミリ以下の間隔で詰まっている。\n\nその密度の中に、\n100年分の精油が閉じ込められている。\n\n一本のお香に含まれる、100年の時間。","reply":"屋久杉の精油は、\n他の素材より「重い香り」がする。\n\n低くて、深くて、長く続く。\nそれは分子量の問題でもあるが、\n「時間の重さ」でもある気がしています。","tag":"#受け継ぐ","confidence":87},{"id":"2026-W21-033","pattern":"⑨リプ完結型","theme":"初めてのお香の選び方","body":"「お香を初めて買う時、\nどう選べばいいですか」\nという質問を最近よくいただきます。\n\n私なりの選び方、リプ欄に。","reply":"【初めてのお香の選び方】\n\nまず「使う場面」を決める：\n\n・集中したい時→白檀・杉系（落ち着く香り）\n・リラックスしたい→椨・桂皮系（甘さのある香り）\n・気分を切り替えたい→柑橘系が入ったもの\n\nただし、理屈より「なんか好き」が一番大事。\n\n最初の一本は、\n嗅いで「いいな」と思ったものを選んでください。\n理由は後からついてきます。","tag":"#お香のある暮らし","confidence":84},{"id":"2026-W21-034","pattern":"⑩二択型","theme":"仕事中に焚くか焚かないか","body":"あなたは仕事中、お香を焚きますか？\n\n✍️ 焚く——集中できる・切り替えができる\n🚫 焚かない——気が散る・においが残る\n\nどちらの派の人も、理由が気になります。\n「焚かない派」の理由も特に聞きたい。","reply":"「仕事中は焚かない」という人が意外と多いです。\n\n「好きすぎて気が散る」という理由に\n少し笑いながら、深く頷きました。\n\n好きなものは、オフの時間のために取っておく。\nそれも、一つの使い方。","tag":"#選択","confidence":91},{"id":"2026-W21-035","pattern":"⑪失敗学び型","theme":"高価なお香を湿気で台無しにした","body":"百貨店で買った伽羅入りのお香を、\n洗面台の近くに置いていた。\n\n1ヶ月後、香りがほとんどなくなっていた。\n\n水回りの湿気が、全部吸ってしまっていた。\n\n保管が悪ければ、素材がいくら良くても意味がない。","reply":"お香の保管の鉄則：\n\n①水回りから離す\n②直射日光を避ける\n③密封容器＋乾燥剤\n\n桐箱があれば理想的だが、\nジップ袋＋シリカゲルでも十分効果があります。\n\n買った後の「保管」が、品質の半分を決める。","tag":"#暮らし","confidence":84},{"id":"2026-W21-036","pattern":"⑫暦型","theme":"麦秋至（5月28日頃）・実りの移り目","body":"5月28日頃、七十二候では「麦秋至（ばくしゅういたる）」。\n\n麦が黄金色に実り、収穫の時を迎える。\n\n梅雨の前の、最後の実りの季節。\n\n穀物が満ちて、\n次の季節へと移っていく。\nこの「移り目」に焚く一本が、今週一番好き。","reply":"「麦秋」という言葉は矛盾しているように見えて、\n実は一番美しい季節の表現だと思っています。\n\n麦は夏に収穫するが、暦では秋と呼ぶ。\n日本語の季節感は、体で覚えるものです。","tag":"#暦","confidence":87},{"id":"2026-W21-037","pattern":"①Dear Algo型","theme":"週末の夜、一人でいる人へ","body":"親愛なるアルゴリズム。\n\n週末の夜、一人で部屋にいる。\n\nSNSを開けば賑やかな世界があるのに、\n閉じたくなる時がある。\n\nそういう夜に、一本だけ焚く。\n\n「一人でいることを選んでいる」時間の豊かさを、\n知っている人に届けたい。","reply":"一人の夜に焚くお香は、\n「孤独」じゃなくて「静けさ」になる。\n\nその違いを知っている人が、\nいつかお香を選ぶ時、\nここにある。","tag":"#静けさ","confidence":91},{"id":"2026-W21-038","pattern":"③余白型","theme":"瞑想より煙を見る方が続いた","body":"「何も考えない時間」を作りたいと思って、\n瞑想を試みた。\n\n10分で断念した。\n\n代わりに一本焚いて、煙を見ていた。\n気づいたら20分が過ぎていた。\n\n「何も考えないようにしない」方が、\n何も考えられる。","reply":"お香の煙を見ていると、\n自然と思考が止まる気がします。\n\n「瞑想」と言うと構えてしまう人も、\n「煙を見る」なら続けられる。\n\n形より、続けられることの方が大事です。","tag":"#呼吸","confidence":90},{"id":"2026-W21-039","pattern":"⑩二択型","theme":"毎日の習慣か気が向いた時か","body":"お香との関係、あなたはどちら派？\n\n📅 毎日の習慣——時間を決めて、毎日焚く\n🎲 気が向いた時だけ go型","theme":"初夏の空気が変わってきた月曜日","body":"親愛なるアルゴリズム。\n\n月曜の朝、空気が変わっていた。\n\n先週より、少し重い。\n夏が、じわじわと近づいている。\n\nこういう変化に気づいてしまう人が、\nどこかにいる。\n\n「季節を感じている人」に、今日も届けたい。","reply":"季節の変化は、カレンダーより\n鼻と皮膚で先に知る。\n\n「なんか今日、空気が違う」と思った日に\n一本焚いてみてください。\n\n季節に乗る、という感覚になる。","tag":"#暮らし","confidence":91},{"id":"2026-W20-014","pattern":"②構造的絶滅型","theme":"「国産」という言葉が空洞化する仕組み","body":"「国産」という言葉が信頼を失っていく理由：\n\n①「国産」と書けば高く売れる\n②定義が曖昧なまま使われる\n③本物と偽物の見分けがつかない\n\nこの3つが重なると、\n「どうせ同じでしょ」になる。\n\nだから、農家の名前と産地を出す。\n言葉じゃなく、顔で伝える。","reply":"福岡で育った椨（タブ）を使っていること、\n農家と直接取引していること。\n\nこういう情報をつけると、\n「選ぶ理由」が生まれる。\n\n素材の「顔」が見えると、\n香りの見え方が変わる。","tag":"#生産者支援","confidence":88},{"id":"2026-W20-015","pattern":"③余白型","theme":"深夜の静かな時間","body":"夜中の2時、家の中が静かになる。\n\n誰かが寝て、\n通知も止まって、\n自分だけの時間がやってくる。\n\n一本だけ焚く。\n誰にも見せない時間に、\n一番好きな香りを使う。\n\nこれが、私のご褒美。","reply":"誰かのためでも、SNSのためでもない時間。\n\n「一人で焚く」のが、\n実はお香の一番深い使い方だと思っています。\n\n深夜に焚く方、いますか？","tag":"#静けさ","confidence":90},{"id":"2026-W20-016","pattern":"④水車静寂型","theme":"水が粉を挽く哲学","body":"水が、お香を作っている。\n\n厳密には、水が水車を回して、\n水車が石臼を動かして、\n石臼が椨粉を挽く。\n\n「水がお香を作っている」というのは\n少し詩的すぎるかもしれないが、\n\n川があるから、このお香がある。\nそれは、本当のことだ。","reply":"水車製法は、川の流れを借りている。\n\n自然の力を人間が借りて、\n素材を加工する。\n\nそういう「借りる」関係が、\n今の時代に足りないものな気がしています。","tag":"#手仕事","confidence":87},{"id":"2026-W20-017","pattern":"⑤未完ストーリー型","theme":"農家から「今年は」という連絡","body":"農家から短いメッセージが来た。\n\n「今年の椨は、いつもと少し違います」\n\nそれだけ。\n詳しいことは書いてなかった。\n\n続きはリプ欄に。","reply":"翌日、電話をかけた。\n\n「今年は日照りが長くて、\n葉が小さくなった。\n香りは濃いかもしれない」\n\n天候が、香りを変える。\nそれが自然素材ということだ。\n\n今年の椨粉を、楽しみにしている。","tag":"#手仕事","confidence":90},{"id":"2026-W20-018","pattern":"⑥専門家裏側型","theme":"椨粉の「粒度」が香りを決める話","body":"椨粉の粒子の細かさが、\n燃え方を決める。\n\n細かすぎると、すぐに燃え尽きる。\n粗すぎると、火が通らない。\n\n水車製法は、ゆっくり挽くから\n「ちょうどいい粒度」になりやすい。\n\nこれが、電気製法との一番の違い。","reply":"粒度は目に見えないけれど、\n焚いた時の「持ち」に出る。\n\n10分で消えるお香と、\n15分続くお香の差は、\n素材の差だけじゃなく、粒度の差でもあります。","tag":"#国産お香","confidence":85},{"id":"2026-W20-019","pattern":"⑦デジタルデトックス型","theme":"会議が終わらない日の切り替え","body":"今日は会議が5本あった。\n\n話し続けて、聞き続けて、\n頭の中が人の言葉でいっぱいになった。\n\n帰ってきて、一本焚いた。\n\n煙は何も言わない。\nその「何も言わない」が、今日一番の会話だった。","reply":"言葉を使い果たした日に、\n無言のものがそばにあると助かる。\n\nお香は喋らない。\nでも空気を変えることで、\n「もう十分だよ」と言っている気がする。","tag":"#整える","confidence":91},{"id":"2026-W20-020","pattern":"⑧素材の叫び型","theme":"屋久杉の時間密度","body":"屋久杉は、年輪が密だ。\n\n樹齢100年以上の木は、\n節と節の間隔が数ミリしかない。\n\n「100年で、ここまでしか育たない」\n\nその遅さが、密度になる。\n密度が、香りになる。\n\nこのお香一本に、\n何十年かの時間が入っている。","reply":"屋久杉の香りは、他の木と明らかに違う。\n\n重くて、深くて、長く続く。\n\nその「違い」は、時間の違い。\n人間の時間じゃない、\n木の時間が香りに出ている。","tag":"#受け継ぐ","confidence":88},{"id":"2026-W20-021","pattern":"⑨リプ完結型","theme":"お香の煙の正しい方向","body":"「お香を焚く時、煙の方向を\n気にする必要がありますか」\n\nという質問がきました。\nリプ欄に答えます。","reply":"【お香と煙の方向について】\n\n基本的に、煙の向きを気にしすぎる必要はありません。\n\nただし：\n\n①顔に直接当たると目が痛くなることがある\n②火災報知器の近くは避ける\n③窓の風で煙が流れる場所は換気になってgood\n\n自然な対流に任せれば、香りは部屋全体に広がります。\n\n「正解の向き」はないです。","tag":"#お香のある暮らし","confidence":85},{"id":"2026-W20-022","pattern":"⑩二択型","theme":"香りは強めか弱めか","body":"好きなお香の香り、どちら派？\n\n🌸 はっきり香る——焚いているとすぐわかる存在感\n🌿 ほのかに香る——気づいたらある、そんな控えめさ\n\nこれ、その日の気分で変わる人も多いかも。\n今日の「あなた」はどちら？","reply":"「強く香らせたい日」は、\n実は気持ちが不安定な日が多い。\n\n「ほのかでいい」と思える日は、\n自分の中が落ち着いている日が多い。\n\nお香の選び方が、心のバロメーターになっている。","tag":"#選択","confidence":92},{"id":"2026-W20-023","pattern":"⑪失敗学び型","theme":"香立てを誤魔化した結果","body":"香立てがなくて、\n砂の代わりに土を使ったことがある。\n\n最初は問題なかった。\nでも、湿気で土が固まった。\nお香が刺さらなくなった。\n\n「砂」には理由がある。\n湿気にくく、熱に強く、詰まらない。\n\n代用は、やってみないとわからない。","reply":"砂の代わりに使えるもの：\n・塩（湿気に強い）\n・細かい砂利\n・専用の香灰\n\n「土」は湿気るのでNG。\n「米」は燃えるのでNG。\n\n小さな失敗から学ぶことが、\n使い続けると積み重なっていく。","tag":"#暮らし","confidence":83},{"id":"2026-W20-024","pattern":"⑫暦型","theme":"入梅の前の「今」の価値","body":"気象庁の梅雨入り予想は、\nまだ先のはずだ。\n\n今週は、乾いた晴れが続く。\n\nこの「梅雨の前の今」を\n特別に感じるのは、\n日本人の季節の感覚だと思う。\n\n終わりを知っているから、\n今が輝く。","reply":"「もうすぐ梅雨か」と思いながら\n晴れの日に窓を開ける。\n\nそのひと呼吸に、一本焚く。\n\n梅雨の前の、乾いた空気の香りを\n記憶に焼き付けておく。","tag":"#暦","confidence":88},{"id":"2026-W20-025","pattern":"①Dear Algo型","theme":"週の疲れとお香の関係","body":"親愛なるアルゴリズム。\n\n今週も、なんとかやりきった。\n\n特別なことは何もなかったけれど、\n毎日一本焚いて、\n毎日なんとか眠れた。\n\n「それだけでよかった」と言える週末が\n一番好きだ。\n\nそういう小さな積み重ねを、大切にしている人に届けたい。","reply":"「今週どうだった？」と聞かれると\nうまく答えられないことが多い。\n\nでも一本焚いた日数だけは、\nなんとなく覚えている。\n\nそれが、私の週の記録。","tag":"#暮らし","confidence":90},{"id":"2026-W20-026","pattern":"②構造的絶滅型","theme":"電気製法が広まった本当の理由","body":"なぜ電気製法が広まったか。\n\n①速い（水車の10倍以上の生産量）\n②安い（水利費・維持費が不要）\n③均一（同じ粒度が安定して出る）\n\nこれは、「悪い選択」じゃない。\n\n消費者が「安く・均一に」を求めた結果、\n市場がそれに応えた。\n\nだから「違い」を伝え続けることが仕事になった。","reply":"電気製法を否定したいわけじゃない。\n\n「水車製法にしかない何か」を\n知った上で選ぶ人が増えることで、\n\n水車工場が続く理由になる。\n選択が、文化を守る。","tag":"#受け継ぐ","confidence":87},{"id":"2026-W20-027","pattern":"③余白型","theme":"雨の予報の前日","body":"明日は雨の予報。\n\n今日は最後の晴れだと思って、\n窓を全部開けて一本焚いた。\n\n風が来て、煙が横に流れた。\n\nそういう偶然の形が、\n今日だけのものになる。","reply":"煙が流れる方向は、毎回違う。\n\n「今日の煙」は、今日しかない。\n\nそれを「見た」という事実が、\n記憶に残っていく。","tag":"#余韻","confidence":89},{"id":"2026-W20-028","pattern":"④水車静寂型","theme":"水車が止まる日のこと","body":"水車は、水が少ないと止まる。\n\n夏の渇水期、秋の台風の前後、\n機械のメンテナンスの日。\n\n「今日は動いていない」という日がある。\n\nその分、動いている日の音が\n愛おしく聞こえる。","reply":"水車が止まっている日に工場を訪ねたことがある。\n\n「今日は静かですね」と言ったら、\n「そうですね、川も今日は少し疲れてるみたいで」と言われた。\n\n川が疲れている、という言葉が忘れられない。","tag":"#静けさ","confidence":86},{"id":"2026-W20-029","pattern":"⑤未完ストーリー型","theme":"3代目が初めて語った「悩み」","body":"工場の3代目と、居酒屋で飲んだ。\n\n仕事の話ではなく、\nただ飲んでいた。\n\n2杯目で、「実は」と彼が言った。\n\n続きはリプ欄に。","reply":"「後継者のことを、本当に悩んでいる」\n\n「子どもには継がせたくない、でも\n続けてほしい気持ちもある」\n\n正直な矛盾を、飲みながら話してくれた。\n\nその話を聞いてから、\nこのお香を焚く時の気持ちが変わった。","tag":"#受け継ぐ","confidence":91},{"id":"2026-W20-030","pattern":"⑥専門家裏側型","theme":"「合わない香り」との付き合い方","body":"お香には「合わない」と感じるものがある。\n\nそれは、鼻が拒否しているわけじゃない。\n\n「今の自分の状態」に合っていない。\n\n同じお香でも、体調や気分や季節によって\n感じ方が変わる。\n\n「合わない」は、拒絶じゃなく、タイミングの話。","reply":"「このお香、苦手だったのに\n急に好きになりました」\n\nという声をいただくことがある。\n\n変わったのは香りじゃなく、あなた自身。\n香りは、変化を映す鏡でもある。","tag":"#選択","confidence":86},{"id":"2026-W20-031","pattern":"⑦デジタルデトックス型","theme":"通知の海から浮き上がる方法","body":"起きてすぐスマホを見る。\n\nそれで一日が始まると、\n最初から「反応モード」に入ってしまう。\n\n起きたら一本だけ焚く。\n煙が消えてから、スマホを開く。\n\nそれだけで、「自分の朝」が戻ってくる。","reply":"「スマホを見ないようにする」は難しい。\n\n「先に別のことをする」は、できる。\n\n意志の力じゃなく、順番の力。\n小さな先行動作が、朝を変える。","tag":"#整える","confidence":92},{"id":"2026-W20-032","pattern":"⑧素材の叫び型","theme":"自然栽培の「ゆっくりさ」について","body":"自然栽培の椨は、成長が遅い。\n\n農薬や化学肥料で促進しないから、\n木が自分のペースで育つ。\n\n「遅い」は、欠点じゃない。\n\n時間をかけて育ったものには、\n時間分の何かが宿っている気がする。\n\nそれを「香り」と呼んでいる。","reply":"椨の農家の人が「急かすと木が怒る」と言った。\n\n冗談のような言葉だけど、\nそういう感覚で育てている人がいる。\n\n「急かさない」という選択が、\n素材の質を守っている。","tag":"#生産者支援","confidence":87},{"id":"2026-W20-033","pattern":"⑨リプ完結型","theme":"お香と花粉症の相性","body":"「花粉症なのですが、\nお香を焚いても大丈夫ですか」\n\nという質問をよくいただきます。\nリプ欄に整理しました。","reply":"【花粉症とお香について】\n\n天然素材のお香は、合成香料より\nアレルギー反応が出にくい傾向がありますが、\n個人差があります。\n\n試す場合は：\n①換気をしながら\n②少量（1本未満）から\n③体調の良い日に\n\n「合わない」と感じたらすぐに止めてください。\n\nお香は万人向けではないですが、\n合う方には季節の助けになります。","tag":"#お香のある暮らし","confidence":84},{"id":"2026-W20-034","pattern":"⑩二択型","theme":"同じ香りを使い続けるか変えるか","body":"お香、あなたはどちら派？\n\n🌿 いつも同じ——変わらない安心感、帰る場所\n🌸 季節や気分で変える——今の自分に合うものを\n\nどちらが正しいわけじゃない。\nでも、あなたの「理由」が聞きたい。","reply":"「いつも同じ」には哲学がある。\n変えないことで、今の変化に気づける。\n\n「気分で変える」にも哲学がある。\n香りを合わせることで、今の自分を知れる。\n\nどちらも、自分への向き合い方だと思っています。","tag":"#選択","confidence":91},{"id":"2026-W20-035","pattern":"⑪失敗学び型","theme":"高価なお香を特別扱いしすぎた話","body":"屋久杉入りのお香を買った時、\n「もったいない」と思って\nずっとしまっておいた。\n\n半年後に出したら、\n香りが少し抜けていた。\n\nお香は、使うためにある。\n飾るためじゃない。","reply":"「もったいない」という感覚は大切。\n\nでも、使わないまま劣化させることの方が\nもったいない。\n\n「特別な日に」と思っていると、\n「特別な日」はなかなか来ない。\n\n今日が、特別な日。","tag":"#暮らし","confidence":85},{"id":"2026-W20-036","pattern":"⑫暦型","theme":"5月の終わり、季節の変わり目を焚く","body":"5月も、もう半分を過ぎた。\n\n暦はもう夏。\n体はまだ春の感覚。\n\nこういう「はざまの時間」を\n日本人はずっと大切にしてきた。\n\n梅雨の前、夏の前、\nこのひと呼吸を大切にしたい。","reply":"季節の「はざま」を知る人が、\n豊かな暮らしをしている気がする。\n\n「もう夏だ」と気づいた今日に、\n一本だけ焚いてみてください。\n\n今の空気を、香りで受け取る。","tag":"#暦","confidence":88},{"id":"2026-W20-037","pattern":"①Dear Algo型","theme":"深夜に一人で焚く人へ","body":"親愛なるアルゴリズム。\n\n深夜に一人でこれを読んでいる人がいると思う。\n\n眠れないとか、\n考えすぎているとか、\nただ起きているとか。\n\nそういう人に届けたい。\n一本だけ焚いて、煙を見ていると、\n「これでいい」と思える夜がある。","reply":"深夜のお香は、少し違う顔をしている。\n\n昼間より煙がゆっくり上がる気がする。\n（気のせいかもしれない）\n\nでも「夜だけの静けさ」の中に\n一人でいる時間は、豊かだと思っています。","tag":"#静けさ","confidence":90},{"id":"2026-W20-038","pattern":"③余白型","theme":"何もない日曜日の豊かさ","body":"何も予定のない日曜日。\n\n朝起きて、お茶を入れて、\n一本焚く。\n\n午前中ずっと、特別なことは何もしない。\n\nでもなぜか、\n「いい休日だった」と思える。\n\n何もないことが、一番の贅沢。","reply":"「何もしない」は、意外と難しい。\n\nSNSを開いて、動画を見て、\n気づいたら何かに使われている。\n\n一本焚くと、「何もしない」が始まる。\n煙が消えるまでの時間が、\n本当の余白になる。","tag":"#余韻","confidence":89},{"id":"2026-W20-039","pattern":"⑩二択型","theme":"お香はひとりの時間か、誰かとの時間か","body":"お香を焚く場面、あなたはどちらが多い？\n\n🙋 自分だけの時間——ひとりの空間を作るために\n👫 誰かといる時間——空気を共有するために\n\n「どちらでも」な方も多いと思うけど、\n「どちらかといえば」で答えてほしい。","reply":"一人で焚く時は「自分に帰る」感じ。\n誰かと焚く時は「ここにいる」感じ。\n\n同じお香なのに、\n全然違う体験になる。\n\n香りは、関係の中で変わる。","tag":"#暮らし","confidence":91},{"id":"2026-W20-040","pattern":"⑥専門家裏側型","theme":"書き続ける理由——香りは言葉になる","body":"毎週お香のことを書いている。\n\n「なぜそんなに書けるのか」と聞かれる。\n\n正直に言うと、\n書けば書くほど知らないことが増える。\n\n素材のこと、農家のこと、\n使い手のこと、季節のこと。\n\n「知り尽くした」と思った瞬間、\n新しい扉が開く。\n\nだから書き続けられる。","reply":"お香を好きになってから、\n暮らしの「解像度」が上がった気がします。\n\n季節に気づく。素材に気づく。時間に気づく。\n\nこれを伝え続けることが、\n私の仕事だと思っています。","tag":"#暮らし","confidence":88}]},

07","pattern":"⑦デジタルデトックス型","theme":"母の日SNS疲れと切り替え","body":"母の日のSNSは\n「感動の家族写真」が流れてくる。\n\n素敵だけど、\n見ていると少し疲れる。\n\n画面を閉じて、窓を開けた。\n5月の空気が入ってきた。\n\nその瞬間だけで、十分だった。","reply":"SNSの「正解の母の日」を見ていると、\n自分の暮らしが貧しく見えてくる。\nでも画面を閉じると、\n今ここにある静けさが見えてくる。","tag":"#呼吸","confidence":90},{"id":"2026-W19-008","pattern":"⑧素材の叫び型","theme":"自然栽培の椨農家の言葉","body":"「自然栽培、ってどういう意味ですか」と農家の人に聞いた。\n\n「化学肥料も、農薬も使わない。\n土の力と、木の力に任せる」\n\n「それって大変じゃないですか」\n\n「大変だよ。でも、\nそうじゃないと香りが出ない」\n\n土が育てた香りが、ここにある。","reply":"自然栽培の椨粉と、慣行栽培の椨粉を\n同じ配合で焚いてみたことがある。\n\n正直、言われなければわからないかもしれない。\nでも「知ってから焚いた時」の味わいは変わった。\n知ることで、感じ方が変わる。","tag":"#生産者支援","confidence":86},{"id":"2026-W19-009","pattern":"⑨リプ完結型","theme":"お香の本数の目安","body":"「一度に何本焚けばいいですか」\nとよく聞かれます。\n\n正解はないけれど、\n目安はあります。リプ欄に。","reply":"【お香の本数の目安】\n\n・6畳以下：1本\n・6〜10畳：1〜2本\n・10畳以上：2〜3本\n\nただし、これはあくまで目安。\n大切なのは「多すぎず、少なすぎず」。\n\n焚いて、空気を吸って、\n「ちょうどいい」と思えれば、それが正解。\n最初は1本から始めてみてください。","tag":"#お香のある暮らし","confidence":85},{"id":"2026-W19-010","pattern":"⑩二択型","theme":"焚く場所：リビングか寝室か","body":"同じ1本でも、\n焚く場所で全然違う。\n\nあなたはどちら派？\n\n🛋 リビング——空間全体に香りを満たす\n🛏 寝室——眠りに落ちる前の、ひとりの時間\n\nどちらが正解でもないけれど、\n選んだ理由が気になります。","reply":"私は寝室派でした。今はリビング派になっています。\n一緒に住む人が変わったことで、\n焚く場所も変わった。\n\n暮らしの変化が、香りの使い方に出る。","tag":"#暮らし","confidence":92},{"id":"2026-W19-011","pattern":"⑪失敗学び型","theme":"贈り物のお香が使われなかった理由","body":"以前、お香を誰かへのプレゼントに選んだ。\n\n喜んでくれた。\nでも後から「焚けていない」と知った。\n\n理由を聞いたら\n「焚き方がわからなかった」と。\n\n贈る前に、焚き方を一緒に伝えるべきだった。","reply":"お香って、焚き台もないと使えない。\n「香りが好き」と「焚く習慣がある」は別の話。\n\nそれからは贈る時、\n「焚き台、持ってますか？」を必ず聞くようにした。\n小さな気遣いで、贈り物が活きる。","tag":"#暮らし","confidence":84},{"id":"2026-W19-012","pattern":"⑫暦型","theme":"立夏・暦の上の初夏","body":"立夏が過ぎた。暦の上では夏。\nでも5月の風はまだ涼しくて、\n夏の顔をした春みたいな日が続く。\n\nこういう「曖昧な季節」が\n一番好きだったりする。\n\nあなたは、どの季節の間が一番好きですか？","reply":"季節の変わり目は、お香の変え時でもあります。\n「軽くなっていく空気」に合わせて、\n調合もすこし変えています。\n\n立夏過ぎから始まる、初夏のブレンド。","tag":"#暦","confidence":88},{"id":"2026-W19-013","pattern":"①Dear Algo型","theme":"5月の夜の静けさ","body":"親愛なるアルゴリズム。\n\n5月の夜はまだ長い。\n\n昼間の喧騒が引いて、\n窓の外の緑の気配だけが残る。\n\nこういう夜に、一本だけ焚く。\n煙が上がって、静けさが濃くなる。\n\n「静かな夜」を求めている人に、届けたい。","reply":"夜の静けさは、探しに行くものじゃない。\n一本焚いて、座って待っていれば\n向こうからやってくる。\n\n今夜、試してみてください。","tag":"#静けさ","confidence":91},{"id":"2026-W19-014","pattern":"②構造的絶滅型","theme":"椨農家の後継者問題の構造","body":"福岡県産の椨（タブ）を育てる農家が\n減り続けている。\n\n理由は3つ：\n\n①収穫まで時間がかかる（数年単位）\n②「国産」の価格を上げられない市場構造\n③息子・娘が継がない\n\nでも今年も育てている人がいる。\nそれが全てだと思っている。","reply":"「なぜ続けるんですか」と聞いたら、\n「やめると誰もいなくなるから」と言った。\n\n使命感でも信念でもなく、\nただ「いなくなるから」。\n\nその静かな覚悟が、香りになっている。","tag":"#受け継ぐ","confidence":89},{"id":"2026-W19-015","pattern":"③余白型","theme":"梅雨前の乾いた空気","body":"梅雨になる前の、\nこの時期の空気が好きだ。\n\n乾いていて、緑の匂いがして、\n少しだけ光が強くなってきた感じ。\n\n毎年来るのに、\n毎年「今年も来た」と思う。\n\nこの空気の中で焚くお香は、\nすこし明るい気がする。","reply":"梅雨が近づくと、お香の香りの広がり方が変わります。\n湿気が増えると、煙が重くなる。\nだから今のうちに、一番好きな香りを焚く。","tag":"#呼吸","confidence":88},{"id":"2026-W19-016","pattern":"④水車静寂型","theme":"電気を使わない選択","body":"「なぜ電気を使わないんですか」\nと聞いたら、\n工場の人はこう言った。\n\n「電気だと速すぎるんです。\n速く挽くと、熱が出て\n香りの成分が飛んでしまう」\n\n遅さが、香りを守る。\n水車の仕事は、速さを捨てた選択だった。","reply":"速いことが正しいとは限らない。\n\nこの工場を訪ねてから、\n自分の仕事も「速さより深さ」を選ぶようになった気がします。","tag":"#手仕事","confidence":87},{"id":"2026-W19-017","pattern":"⑤未完ストーリー型","theme":"3代目工場主の一言","body":"3代続く工場の、今の当主に会った。\n\n「正直、やめようと思ったことはありますか」\nと聞いた。\n\nしばらく間があって、\n「あります」と言った。\n\n続きはリプ欄に。","reply":"「でも父が残したものを、形にしたいと思って。\n父には仕事の話、あまりできなかったから」\n\n工場の機械の音が、静かに鳴っていた。\n\nこれが「受け継ぐ」ということだと思った。","tag":"#受け継ぐ","confidence":92},{"id":"2026-W19-018","pattern":"⑥専門家裏側型","theme":"屋久杉の木端を使う理由","body":"屋久杉は、伐採できない。\n\n特別天然記念物に指定されているから。\nでは、なぜうちのお香に入っているのか。\n\n建材や仏具の製造で出た「木端（こっぱ）」を使っている。\n\n捨てられるはずだったものが、\n香りになる。","reply":"最初に「屋久杉の木端」と聞いた時、\n「捨てるくらいなら、と譲っていただいた」と工場の人が言った。\n\n古いものを大切に使う、という感覚が\nこのお香の根っこにある気がしました。","tag":"#手仕事","confidence":86},{"id":"2026-W19-019","pattern":"⑦デジタルデトックス型","theme":"スマホを置く小さな儀式","body":"スマホを持ったまま、\n深呼吸できない。\n\n気づいたら手に持っていて、\n気づいたら画面を見ていて、\n気づいたら1時間が経っている。\n\n一本焚いて、\nスマホを引き出しに入れる。\n煙が消えるまでは、ここにいる。","reply":"「スマホを置く」という意志より、\n「お香を焚く」という行動の方が簡単。\n\n意志に頼らず、習慣に乗る。\n小さな儀式が、デジタルから離してくれる。","tag":"#整える","confidence":91},{"id":"2026-W19-020","pattern":"⑧素材の叫び型","theme":"自然栽培の「揃わない」豊かさ","body":"福岡の山の中に、椨の畑がある。\n\n見渡す限り、緑。\n農家の人が歩きながら言った。\n\n「この木たち、全部顔が違うんです。\n自然栽培だから、育ち方が揃わない」\n\n揃わない、ということが\n豊かさだと思った。","reply":"量産品は「揃えること」が品質。\n自然素材は「揃わないこと」が本物の証。\n\n毎年少しずつ違う香りを楽しめるのは、\n自然栽培だからこそです。","tag":"#生産者支援","confidence":87},{"id":"2026-W19-021","pattern":"⑨リプ完結型","theme":"煙が出ない時の対処法","body":"「お香に火をつけたのに\n煙が出ません」という相談、よくあります。\n\n原因と対処法、リプ欄に。","reply":"【煙が出ない時の原因3つ】\n\n①火が消えている\n→先端が赤く光っていれば燃えています。暗くして確認を。\n\n②湿気を吸っている\n→密封せずに保管していると湿気る。乾燥させてから使う。\n\n③天然素材は煙が少ない\n→少なくても香りは届いています。\n\n煙の量＝香りの強さ、ではないです。","tag":"#お香のある暮らし","confidence":85},{"id":"2026-W19-022","pattern":"⑩二択型","theme":"一人で焚くか誰かと焚くか","body":"お香を焚く時、あなたはどちら派？\n\n🌿 一人で——自分だけの時間を作るために\n👫 誰かと——空気を共有したいから\n\nどちらでもあり、な気もするけれど。\n今日のあなたはどちら？","reply":"一人で焚く時と、誰かと焚く時で\n同じお香でも受け取り方が変わる。\n\n「静けさ」の質が違う気がします。","tag":"#暮らし","confidence":90},{"id":"2026-W19-023","pattern":"⑪失敗学び型","theme":"2本同時に焚いて頭が痛くなった話","body":"「もっと香りを強くしたい」と思って\n2本同時に焚いた。\n\n最初の10分は良かった。\nでも20分後、頭が痛くなった。\n\n「良い香り」も、多すぎると逆効果。\n引き算の大切さを学んだ失敗。","reply":"天然素材のお香は、合成香料より揮発が早い。\n少量でも空間に香りが満ちます。\n\n「もう少し」ではなく「これで十分」と思える量が、\nちょうどいい量です。まずは1本から。","tag":"#暮らし","confidence":84},{"id":"2026-W19-024","pattern":"⑫暦型","theme":"五月雨・梅雨の前の乾いた今","body":"「五月雨（さみだれ）」という言葉がある。\n\n梅雨の雨を指す古い言葉。\nもうすぐそういう季節がやってくる。\n\n雨の前の、乾いた空気の今。\n窓を開けて、一本だけ焚く。\n\n雨が来る前の、最後の晴れ間を\n香りで受け取っておく。","reply":"梅雨になるとお香の香りが変わります。\n湿気を吸って、重くなる。\nだから今、好きな香りをしっかり焚いておく。\nこれも、暦に沿った暮らし。","tag":"#暦","confidence":87},{"id":"2026-W19-025","pattern":"①Dear Algo型","theme":"初夏の息吹・朝の窓","body":"親愛なるアルゴリズム。\n\n5月の朝、窓を開けると\n昨日より少し強い緑の匂いがした。\n\n夏が、近づいてきている。\n\nこの瞬間を大切にしたい人が、\nどこかにいると思って書いている。","reply":"夏は来るとわかっているのに、\n毎年「あ、来た」と気づく。\n\n季節の到来を、鼻で感じられることが\n豊かさだと思っています。","tag":"#呼吸","confidence":90},{"id":"2026-W19-026","pattern":"②構造的絶滅型","theme":"国産素材の価格構造と選択の力","body":"なぜ国産のお香素材は高いのか。\n\n①少量生産のため単価が上がる\n②流通コストが輸入品より高い\n③「国産」に対してお金を払う習慣がない\n\nこの3つが重なると、\n「輸入品で代替」が正解になってしまう。\n\n今も国産を選ぶ農家がいる。\n選んで買うことが、支えることになる。","reply":"「国産」というだけで選ぶ必要はないと思っています。\n「なぜ国産か」を知って選ぶことが大事。\n\n福岡の椨、屋久杉の木端——\nこれらの「なぜ」を伝えていきたい。","tag":"#受け継ぐ","confidence":88},{"id":"2026-W19-027","pattern":"③余白型","theme":"週末の朝15分の豊かさ","body":"週末の朝は、平日より15分だけ遅く起きる。\n\nその15分で、お茶を入れて\n一本だけ焚く。\n\n特別なことは何もない。\nでも、この15分が\n一週間の中で一番好きかもしれない。\n\nあなたの「一番好きな時間」はいつですか？","reply":"「特別じゃないけど好きな時間」を\n持っている人は、強いと思う。\n\nそういう時間を守るための、小さな習慣。","tag":"#暮らし","confidence":91},{"id":"2026-W19-028","pattern":"④水車静寂型","theme":"水車の音の記憶","body":"水車の音は、川の音に似ている。\n\nザー、ではなく\nコトコト、とか、チャポン、という\n低くて穏やかな音。\n\nこの音の中で挽かれた粉が\n今、手元にある。\n\n音は伝わらないけれど、\n香りの中にその静けさが残っている気がします。","reply":"水車製法の工場を訪ねた後、\nしばらく「水の音」が耳に残っていました。\n\n今もお香を焚くと、あの音を思い出す。\n香りは記憶とつながっている。","tag":"#静けさ","confidence":86},{"id":"2026-W19-029","pattern":"⑤未完ストーリー型","theme":"福岡・電波の届かない畑","body":"今週、福岡の農家を訪ねた。\n\n高速を降りてから、山道を20分。\n携帯の電波が途切れる場所に、\nその畑はある。\n\n続きはリプ欄に。","reply":"農家の人が「今年は雨が少なくて」と言いながら\n椨の葉を触っていた。\n\n「少し香りが濃いかもしれない」と。\n\n天候が、香りに直結している。\nスーパーで買う野菜と、根っこは同じだ。","tag":"#手仕事","confidence":91},{"id":"2026-W19-030","pattern":"⑥専門家裏側型","theme":"選ばれなかった香りの自由","body":"調合していると、「これは商品にならない」と判断するものが出る。\n\n強すぎる、弱すぎる、\nバランスが独特すぎる。\n\nでもその「選ばれなかった香り」を\n自分用に焚いていることがある。\n\n誰かのためじゃない香りが、\n一番自由で好きだったりする。","reply":"「完璧なお香」より「自分に合うお香」が大事。\n\n商品として選ばれなくても、\n誰かの「これが好き」になることはある。\nそういう出会いを作っていきたい。","tag":"#選択","confidence":85},{"id":"2026-W19-031","pattern":"⑦デジタルデトックス型","theme":"在宅ワークの終わり方","body":"在宅ワークで一番難しいのは\n「仕事を終わりにすること」。\n\nスペースが変わらないから、\n脳が切り替わらない。\n\nそういう時、一本焚く。\n煙が上がって、消えるまでを見る。\n\nその間に、私の仕事は終わっていく。","reply":"「儀式」と呼ぶと大げさだけど、\n体に「ここからは休み」と伝える行動が必要。\n\n場所が変えられないなら、空気を変える。\nお香は、空気を変える一番小さな方法。","tag":"#整える","confidence":90},{"id":"2026-W19-032","pattern":"⑧素材の叫び型","theme":"職人の手が感じること","body":"工場で、職人さんが棒状にお香を形成していた。\n\n機械と同じスピードで、手が動く。\nでも機械と違って、手には「感じる力」がある。\n\n「これは少し硬い」「これは水分が多い」\nそういう判断を、手がしている。\n\n数字に出ない品質が、ここにある。","reply":"自動化できる部分は自動化する。\nでも「感じること」は自動化できない。\n\n手仕事が残る理由は、そこにあると思っています。","tag":"#手仕事","confidence":88},{"id":"2026-W19-033","pattern":"⑨リプ完結型","theme":"煙が多すぎる時の原因と対処","body":"「お香を焚くと煙が多すぎて目が痛くなります」\nという声をいただきました。\n\n原因と解決法、リプ欄に。","reply":"【煙が多すぎる時の確認ポイント】\n\n①換気ができているか\n→密室 // State
function loadState(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || fallback); }
  catch { localStorage.removeItem(key); return JSON.parse(fallback); }
}
let reviewQueue   = loadState('ci_review',  '[]');
let stockList     = loadState('ci_stock',   '[]');
let historyList   = loadState('ci_history', '[]');
let loadedBatches = loadState('ci_batches', '[]');
let currentTab    = 'review';

// ---- Startup: check for new batches ----
function checkNewBatches() {
  const newBatches = WEEKLY_BATCHES.filter(b => !loadedBatches.includes(b.batchId));
  if (newBatches.length === 0) return;

  const banner = document.getElementById('batch-banner-area');
  const total  = newBatches.reduce((s, b) => s + b.posts.length, 0);
  const latest = newBatches[0];

  banner.innerHTML = `
    <div class="batch-banner">
      <div class="batch-banner-icon">🌿</div>
      <div class="batch-banner-text" style="flex:1">
        <h3>新しい投稿案が届いています</h3>
        <p>${newBatches.length}バッチ・合計${total}投稿（${latest.note}）</p>
        <button class="btn-load-batch" onclick="loadNewBatches()">レビューキューに追加する</button>
      </div>
    </div>`;
}

function loadNewBatches() {
  const newBatches = WEEKLY_BATCHES.filter(b => !loadedBatches.includes(b.batchId));
  let added = 0;
  newBatches.forEach(b => {
    b.posts.forEach(p => {
      if (!reviewQueue.find(r => r.id === p.id)) {
        reviewQueue.push({ ...p, batchId: b.batchId, addedAt: Date.now() });
        added++;
      }
    });
    loadedBatches.push(b.batchId);
  });
  localStorage.setItem('ci_batches', JSON.stringify(loadedBatches));
  save();
  document.getElementById('batch-banner-area').innerHTML = '';
  renderReview();
  showToast(`✅ ${added}投稿をレビューキューに追加しました`);
}

// ---- Tab ----
function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  btn.classList.add('active');
  currentTab = tab;
  if (tab === 'review')   renderReview();
  if (tab === 'stock')    renderStock();
  if (tab === 'history')  renderHistory();
  if (tab === 'generate') renderGenerateStats();
}

// ---- Badges ----
function updateBadges() {
  setBadge('b-review',  reviewQueue.length);
  setBadge('b-stock',   stockList.length);
  setBadge('b-history', historyList.length);

  // Header week
  const latestBatch = WEEKLY_BATCHES[0];
  if (latestBatch) {
    document.getElementById('header-week').textContent = latestBatch.batchId;
    document.getElementById('last-batch-date').textContent = latestBatch.generatedAt;
  }
}
function setBadge(id, n) {
  const el = document.getElementById(id);
  if (!el) return;
  if (n > 0) { el.style.display = 'flex'; el.textContent = n; }
  else el.style.display = 'none';
}

// ---- Render: Review ----
function renderReview() {
  const el = document.getElementById('review-list');
  const sh = document.getElementById('review-section-header');
  if (reviewQueue.length === 0) {
    sh.textContent = '';
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <p>レビュー待ちの投稿はありません<br>上のバナーから今週のバッチを読み込んでください</p>
    </div>`;
    return;
  }
  sh.textContent = `レビュー待ち ${reviewQueue.length}件（バズ確度順）`;
  const sorted = [...reviewQueue].sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
  el.innerHTML = sorted.map(p => `
    <div class="card" id="card-${p.id}">
      <div class="card-meta">
        <span class="chip">${esc(p.pattern)}</span>
        <span class="chip chip-confidence">確度 ${p.confidence}%</span>
      </div>
      <div class="card-body">${nl(p.body)}</div>
      ${p.reply ? `<div class="card-reply">
        <div class="reply-label">追いリプ</div>
        <div class="reply-text">${nl(p.reply)}</div>
      </div>` : ''}
      ${p.tag ? `<div class="card-tag">${esc(p.tag)}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-skip"    onclick="skipPost('${p.id}')">スキップ</button>
        <button class="btn btn-approve" onclick="approvePost('${p.id}')">✓ ストックへ</button>
      </div>
    </div>`).join('');
}

// ---- Render: Stock ----
function renderStock() {
  const el = document.getElementById('stock-list');
  const sh = document.getElementById('stock-section-header');
  if (stockList.length === 0) {
    sh.textContent = '';
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📦</div>
      <p>ストックがまだありません<br>レビューで承認した投稿がここに溜まります</p>
    </div>`;
    return;
  }
  sh.textContent = `ストック ${stockList.length}件（コピーして投稿してください）`;
  el.innerHTML = stockList.map(p => `
    <div class="stock-card" id="sc-${p.id}">
      <div class="stock-meta">
        <span class="chip">${esc(p.pattern)}</span>
        ${p.posted ? `<span class="chip posted-chip">投稿済</span>` : ''}
        <span style="font-size:11px;color:var(--muted);margin-left:auto;">${fmtDate(p.addedAt)}</span>
      </div>
      <div class="stock-body">${nl(p.body)}</div>
      ${p.reply ? `<div class="stock-reply">
        <div class="reply-label">追いリプ</div>
        <div class="reply-text">${nl(p.reply)}</div>
      </div>` : ''}
      ${p.tag ? `<div class="card-tag" style="margin-bottom:10px;">${esc(p.tag)}</div>` : ''}
      <div class="stock-actions">
        <button class="btn-sm btn-copy-main" id="cp-${p.id}" onclick="copyPost('${p.id}','body')">📋 コピー</button>
        ${p.reply ? `<button class="btn-sm btn-copy-reply" onclick="copyPost('${p.id}','reply')">追いリプ</button>` : ''}
        <button class="btn-sm btn-posted" onclick="markPosted('${p.id}')">投稿済にする</button>
        <button class="btn-sm btn-del" onclick="deleteStock('${p.id}')">削除</button>
      </div>
    </div>`).join('');
}

// ---- Render: History ----
function renderHistory() {
  const el = document.getElementById('history-list');
  if (historyList.length === 0) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📊</div>
      <p>まだ投稿済み記録がありません<br>ストックで「投稿済にする」を押すと記録されます</p>
    </div>`;
    return;
  }

  // Sort newest first
  const sorted = [...historyList].sort((a,b) => (b.postedAt || 0) - (a.postedAt || 0));
  el.innerHTML = sorted.map(p => {
    const resultClass = p.result === 'buzz' ? 'result-buzz' : p.result === 'ok' ? 'result-ok' : p.result === 'miss' ? 'result-miss' : '';
    const resultLabel = p.result === 'buzz' ? '🔥 バズった' : p.result === 'ok' ? '👍 普通' : p.result === 'miss' ? '💤 不発' : '未記録';
    return `<div class="history-card">
      <div class="history-body">${nl(p.body)}</div>
      <div class="history-meta">
        <span class="chip">${esc(p.pattern)}</span>
        ${p.result ? `<span class="result-pill ${resultClass}">${resultLabel}</span>` : ''}
        <span style="font-size:11px;color:var(--muted)">${fmtDate(p.postedAt)}</span>
      </div>
      <div class="perf-row">
        <button class="perf-btn ${p.result==='buzz'?'active-buzz':''}" onclick="setResult('${p.id}','buzz')">🔥 バズった</button>
        <button class="perf-btn ${p.result==='ok'?'active-ok':''}"   onclick="setResult('${p.id}','ok')">👍 普通</button>
        <button class="perf-btn ${p.result==='miss'?'active-miss':''}" onclick="setResult('${p.id}','miss')">💤 不発</button>
      </div>
    </div>`;
  }).join('');
}

// ---- Render: Generate stats ----
function renderGenerateStats() {
  const allGenerated = WEEKLY_BATCHES.reduce((s,b) => s + b.posts.length, 0);
  document.getElementById('total-generated').textContent = allGenerated;
  document.getElementById('total-approved').textContent = stockList.length + historyList.length;
  document.getElementById('total-posted').textContent = historyList.length;
}

// ---- Actions ----
function approvePost(id) {
  const i = reviewQueue.findIndex(p => p.id === id);
  if (i < 0) return;
  const p = { ...reviewQueue[i], addedAt: Date.now() };
  reviewQueue.splice(i, 1);
  stockList.unshift(p);
  save();
  animateOut('card-' + id, 'right', renderReview);
  showToast('✅ ストックに追加しました');
}

function skipPost(id) {
  const i = reviewQueue.findIndex(p => p.id === id);
  if (i < 0) return;
  reviewQueue.splice(i, 1);
  save();
  animateOut('card-' + id, 'left', renderReview);
  showToast('スキップしました');
}

function deleteStock(id) {
  stockList = stockList.filter(p => p.id !== id);
  save();
  renderStock();
  showToast('削除しました');
}

function markPosted(id) {
  const i = stockList.findIndex(p => p.id === id);
  if (i < 0) return;
  const p = { ...stockList[i], posted: true, postedAt: Date.now(), result: null };
  stockList.splice(i, 1);
  historyList.unshift(p);
  save();
  renderStock();
  showToast('📮 投稿済みに移動しました');
}

function setResult(id, result) {
  const p = historyList.find(p => p.id === id);
  if (!p) return;
  p.result = result;
  save();
  renderHistory();
  showToast(result === 'buzz' ? '🔥 バズった！記録しました' : result === 'ok' ? '👍 記録しました' : '💤 記録しました');
}

function copyPost(id, type) {
  const p = stockList.find(p => p.id === id);
  if (!p) return;
  const text = type === 'reply' ? p.reply : p.body;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove();
    flashCopy(id, type);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => flashCopy(id, type)).catch(fallback);
  } else fallback();
}

function flashCopy(id, type) {
  if (type === 'body') {
    const btn = document.getElementById('cp-' + id);
    if (btn) {
      btn.textContent = 'コピー済！'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    }
  }
  showToast(type === 'reply' ? '追いリプをコピーしました' : '投稿本文をコピーしました');
}

// saveApiKey() と generatePosts() はUI刷新時に削除済み（GitHub Actions で自動生成）

// ---- Utils ----
function save() {
  localStorage.setItem('ci_review',  JSON.stringify(reviewQueue));
  localStorage.setItem('ci_stock',   JSON.stringify(stockList));
  localStorage.setItem('ci_history', JSON.stringify(historyList));
  updateBadges();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nl(s) { return esc(s).replace(/\n/g,'<br>'); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function animateOut(id, dir, cb) {
  const el = document.getElementById(id);
  if (!el) { cb(); return; }
  el.style.transition = 'transform 0.28s ease, opacity 0.28s ease';
  el.style.transform = `translateX(${dir === 'right' ? 70 : -70}px)`;
  el.style.opacity = '0';
  setTimeout(cb, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ---- Hard Reload ----
function hardReload() {
  showToast('最新版を取得中...');
  setTimeout(() => window.location.reload(), 500);
}


// ---- Init ----
checkNewBatches();
renderReview();
updateBadges();
</script>
</body>
