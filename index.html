<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CI Posts">
  <title>CI Threads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #6b8e7f;
      --primary-light: #e8f0ec;
      --accent: #c4956a;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --success: #4caf50;
      --danger: #ef5350;
      --warn: #ff9800;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    .header {
      padding: 14px 20px 12px;
      padding-top: calc(14px + env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-week { font-size: 11px; color: var(--accent); font-weight: 600;
      background: #fff3e0; padding: 3px 9px; border-radius: 12px; }

    /* Content */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    /* Tab bar */
    .tab-bar {
      display: flex; background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 10px 0; border: none; background: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-family: inherit;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-icon { font-size: 21px; position: relative; display: inline-block; }
    .badge {
      position: absolute; top: -3px; right: -8px;
      background: var(--accent); color: white;
      font-size: 9px; font-weight: 700; min-width: 15px; height: 15px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
    }

    /* Section header */
    .section-header {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; margin-top: 4px;
    }

    /* New batch banner */
    .batch-banner {
      background: linear-gradient(135deg, var(--primary), #4a7a6b);
      color: white; border-radius: 14px; padding: 16px 18px;
      margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
    }
    .batch-banner-icon { font-size: 28px; }
    .batch-banner-text h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .batch-banner-text p { font-size: 12px; opacity: 0.85; line-height: 1.4; }
    .btn-load-batch {
      margin-top: 10px; width: 100%; padding: 10px; background: rgba(255,255,255,0.2);
      color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    /* Review cards */
    .card {
      background: var(--surface); border-radius: 18px; padding: 20px;
      margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border);
      transition: transform 0.28s ease, opacity 0.28s ease;
    }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .chip {
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
    }
    .chip-confidence { background: #fff3e0; color: var(--accent); }
    .card-body {
      font-size: 15px; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .card-reply {
      margin-top: 12px; padding: 10px 14px;
      background: var(--bg); border-radius: 10px; border-left: 3px solid var(--primary);
    }
    .reply-label {
      font-size: 9px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
    }
    .reply-text { font-size: 13px; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }
    .card-tag { margin-top: 9px; font-size: 12px; color: var(--accent); font-weight: 500; }
    .card-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn { flex: 1; padding: 13px; border-radius: 12px; border: none;
      font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; }
    .btn:active { opacity: 0.82; transform: scale(0.98); }
    .btn-approve { background: var(--success); color: white; }
    .btn-skip { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-skip:active { background: #fde; }

    /* Stock cards */
    .stock-card {
      background: var(--surface); border-radius: 16px; padding: 17px;
      margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .stock-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .posted-chip { background: #e3f2fd; color: #1976d2; }
    .stock-body {
      font-size: 14px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word; margin-bottom: 10px;
    }
    .stock-reply {
      padding: 9px 12px; background: var(--bg); border-radius: 9px;
      border-left: 2px solid var(--primary); margin-bottom: 12px;
    }
    .stock-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn-sm {
      padding: 9px 14px; border-radius: 10px; border: none;
      font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer;
    }
    .btn-copy-main { background: var(--primary); color: white; flex: 1; }
    .btn-copy-main.copied { background: var(--success); }
    .btn-copy-reply { background: var(--primary-light); color: var(--primary); }
    .btn-posted { background: #e3f2fd; color: #1976d2; }
    .btn-del { background: none; color: var(--muted); border: 1px solid var(--border); }

    /* Performance tracker */
    .perf-row {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .perf-btn {
      flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 12px; font-family: inherit; cursor: pointer; background: var(--bg);
      text-align: center;
    }
    .perf-btn.active-buzz { background: #fff3cd; border-color: #ff9800; }
    .perf-btn.active-ok { background: #e8f5e9; border-color: #4caf50; }
    .perf-btn.active-miss { background: #fce4ec; border-color: #e91e63; }

    /* History view */
    .history-card {
      background: var(--surface); border-radius: 14px; padding: 15px;
      margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .history-body { font-size: 13px; color: var(--text); white-space: pre-wrap;
      word-break: break-word; line-height: 1.65; margin-bottom: 8px; }
    .history-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .result-pill {
      font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px;
    }
    .result-buzz { background: #fff3cd; color: #e65100; }
    .result-ok { background: #e8f5e9; color: #2e7d32; }
    .result-miss { background: #fce4ec; color: #880e4f; }

    /* Generate view */
    .gen-card { background: var(--surface); border-radius: 16px; padding: 20px;
      margin-bottom: 14px; box-shadow: var(--shadow); }
    .gen-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .gen-card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .btn-gen-main {
      width: 100%; padding: 15px; background: var(--primary); color: white;
      border: none; border-radius: 13px; font-size: 16px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }
    .btn-gen-main:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Empty state */
    .empty { text-align: center; padding: 56px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(76px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1a1a1a; color: white; padding: 10px 20px;
      border-radius: 22px; font-size: 13px; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Separator */
    .sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Research view - quick collect form */
    .form-row { margin-bottom: 12px; }
    .form-row-3 { display: flex; gap: 8px; }
    .form-row-3 > div { flex: 1; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .form-input {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); font-size: 14px; font-family: inherit; color: var(--text);
    }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    /* Tag filter chips */
    .chip-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip-filter {
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px;
      background: var(--surface); color: var(--muted); border: 1px solid var(--border);
      font-family: inherit; cursor: pointer;
    }
    .chip-filter.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Buzz library cards */
    .buzz-card {
      background: var(--surface); border-radius: 16px; padding: 17px;
      margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .buzz-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .buzz-body {
      font-size: 14px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word; margin-bottom: 6px;
    }
    .buzz-body.clamp {
      display: -webkit-box; -webkit-line-clamp: 8; -webkit-box-orient: vertical; overflow: hidden;
    }
    .buzz-expand { font-size: 12px; color: var(--primary); font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .buzz-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .buzz-why { font-size: 12px; color: var(--muted); background: var(--bg); padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; line-height: 1.6; }
    .buzz-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .buzz-link {
      text-decoration: none; display: inline-flex; align-items: center;
    }

    /* Dashboard bars */
    .dash-row { margin-bottom: 10px; }
    .dash-row-label { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; margin-bottom: 4px; }
    .dash-bar-track { background: var(--bg); border-radius: 6px; height: 8px; overflow: hidden; }
    .dash-bar-fill { background: var(--primary); height: 100%; border-radius: 6px; }
    .dash-subhead { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.6px; margin: 14px 0 8px; }
    .dash-subhead:first-child { margin-top: 0; }
    .dash-empty { font-size: 12px; color: var(--muted); line-height: 1.7; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">CI Threads</div>
      <div class="header-sub">クリスタルインセンス 投稿ストック</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-week" id="header-week"></div>
      <button onclick="hardReload()" style="background:var(--primary-light);border:none;color:var(--primary);font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;" title="最新版に更新">🔄</button>
    </div>
  </div>

  <div class="content">
    <!-- レビュー -->
    <div id="view-review" class="view active">
      <div id="batch-banner-area"></div>
      <div class="section-header" id="review-section-header"></div>
      <div id="review-list"></div>
    </div>

    <!-- ストック -->
    <div id="view-stock" class="view">
      <div class="section-header" id="stock-section-header"></div>
      <div id="stock-list"></div>
    </div>

    <!-- 実績 -->
    <div id="view-history" class="view">
      <div class="section-header">投稿済み・反応記録</div>
      <div id="history-list"></div>
    </div>

    <!-- 情報 -->
    <div id="view-generate" class="view">
      <div class="gen-card">
        <h3>🔄 週次自動更新</h3>
        <p>毎週月曜朝5時にClaudeが最新のThreadsトレンドを調べて投稿案を自動追加します。Macの電源オフでも動きます。</p>
        <button class="btn-gen-main" onclick="hardReload()">🔄 今すぐ最新版に更新</button>
        <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center;">新しいバッチがある場合、レビュータブにバナーが出ます</p>
      </div>
      <div class="gen-card">
        <h3>📊 統計</h3>
        <div style="font-size:13px;color:var(--muted);line-height:2;">
          最終更新: <span id="last-batch-date">—</span><br>
          累計生成: <span id="total-generated">0</span>投稿 ／
          承認済: <span id="total-approved">0</span>投稿 ／
          投稿済: <span id="total-posted">0</span>投稿
        </div>
      </div>
    </div>

    <!-- 研究 -->
    <div id="view-research" class="view">
      <div class="section-header">🔍 国産バズ・リサーチ</div>

      <!-- a) クイック収集フォーム -->
      <div class="gen-card">
        <h3>📥 バズ投稿をクイック収集</h3>
        <p>Threadsで見つけた「#国産」系のバズ投稿をコピペで登録します。</p>
        <div class="form-row">
          <label class="form-label">投稿URL（任意）</label>
          <input type="text" id="bz-url" class="form-input" placeholder="https://www.threads.net/...">
        </div>
        <div class="form-row">
          <label class="form-label">投稿本文 *</label>
          <textarea id="bz-body" class="form-input form-textarea" placeholder="投稿本文をペースト" rows="4"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">投稿者（任意）</label>
          <input type="text" id="bz-author" class="form-input" placeholder="@なしでもOK">
        </div>
        <div class="form-row">
          <label class="form-label">タグ</label>
          <select id="bz-tag" class="form-input">
            <option value="国産">#国産</option>
            <option value="国産を守ろう">#国産を守ろう</option>
            <option value="国産を選ぼう">#国産を選ぼう</option>
            <option value="国産メーカー品">#国産メーカー品</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row form-row-3">
          <div>
            <label class="form-label">❤️ いいね</label>
            <input type="number" id="bz-likes" class="form-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div>
            <label class="form-label">💬 リプ</label>
            <input type="number" id="bz-replies" class="form-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div>
            <label class="form-label">🔁 リポスト</label>
            <input type="number" id="bz-reposts" class="form-input" placeholder="0" min="0" inputmode="numeric">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">フック型</label>
          <select id="bz-hook" class="form-input">
            <option value="意外性">意外性</option>
            <option value="問いかけ">問いかけ</option>
            <option value="数字×メリット">数字×メリット</option>
            <option value="否定形・損失回避">否定形・損失回避</option>
            <option value="逆説">逆説</option>
            <option value="告白">告白</option>
            <option value="結論先出し">結論先出し</option>
            <option value="ストーリー">ストーリー</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">なぜバズったか一言メモ（任意）</label>
          <input type="text" id="bz-why" class="form-input" placeholder="例: 数字が具体的で信頼感がある">
        </div>
        <button class="btn-gen-main" onclick="saveBuzzPost()">💾 ライブラリに保存</button>
      </div>

      <!-- b) ライブラリ一覧 -->
      <div class="section-header" id="buzz-section-header">ライブラリ</div>
      <div class="chip-filter-row" id="buzz-tag-filter"></div>
      <div id="buzz-list"></div>

      <!-- c) 傾向ダッシュボード -->
      <div class="section-header">📈 傾向ダッシュボード</div>
      <div class="gen-card">
        <h3>ライブラリの傾向</h3>
        <div id="buzz-dashboard-lib"></div>
      </div>
      <div class="gen-card">
        <h3>自社投稿の傾向</h3>
        <div id="buzz-dashboard-own"></div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('review',this)">
      <div class="tab-icon">📥<span class="badge" id="b-review" style="display:none"></span></div>
      <span>レビュー</span>
    </button>
    <button class="tab-btn" onclick="switchTab('stock',this)">
      <div class="tab-icon">✅<span class="badge" id="b-stock" style="display:none"></span></div>
      <span>ストック</span>
    </button>
    <button class="tab-btn" onclick="switchTab('history',this)">
      <div class="tab-icon">📊<span class="badge" id="b-history" style="display:none"></span></div>
      <span>実績</span>
    </button>
    <button class="tab-btn" onclick="switchTab('generate',this)">
      <div class="tab-icon">📋</div>
      <span>情報</span>
    </button>
    <button class="tab-btn" onclick="switchTab('research',this)">
      <div class="tab-icon">🔍</div>
      <span>研究</span>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 【週次投稿バッチ】← Claudeが毎週ここを更新します
// batchId: "YYYY-WNN" 形式 (重複チェックに使用)
// ============================================================
const WEEKLY_BATCHES = [
  {
    "batchId": "2026-W30-buzz",
    "generatedAt": "2026-07-22",
    "note": "🔥国産バズ研究ドラフト（覚悟店クラスター傾向）",
    "posts": [
      {
        "id": "2026-W30-buzz-001",

        "reply": "香司の柴垣です。夜、仕事の手を止めて一本灯すと、頭の中の音がすっと静かになる。効能の話じゃなくて、ただの区切りなんです。よかったら、あなたの『一日の終わりの合図』も教えてください。",
        "tag": "#お香のある暮らし",
        "cta": false,
        "confidence": 78
      },
      {
        "id": "2026-W30-buzz-002",
        "pattern": "②意外な数字ゼロ型",
        "theme": "椨粉の入荷ゼロ（海外0人でしたの応用）",
        "body": "今日、椨（たぶ）の粉が一グラムも入荷しませんでした。\nお香の、主原料です。\n国産の椨を挽ける職人さんは、もう二人。\nその方が体調を崩せば、日本のお香づくりは静かに止まります。\nこれが『国産』の、ほんとうの距離感です",
        "reply": "煽るつもりはないんです。ただ、蛇口をひねれば水が出るみたいに、当たり前に国産の香りがあると思っていた自分に、時々ヒヤッとする。知ってもらうことからしか、残せないので。",
        "tag": "#国産を守ろう",
        "cta": false,
        "confidence": 82
      },
      {
        "id": "2026-W30-buzz-003",

// State
function loadState(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || fallback); }
  catch { localStorage.removeItem(key); return JSON.parse(fallback); }
}
let reviewQueue   = loadState('ci_review',  '[]');
let stockList     = loadState('ci_stock',   '[]');
let historyList   = loadState('ci_history', '[]');
let loadedBatches = loadState('ci_batches', '[]');
let currentTab    = 'review';

// ---- Startup: check for new batches ----
function checkNewBatches() {
  const newBatches = WEEKLY_BATCHES.filter(b => !loadedBatches.includes(b.batchId));
  if (newBatches.length === 0) return;

  const banner = document.getElementById('batch-banner-area');
  const total  = newBatches.reduce((s, b) => s + b.posts.length, 0);
  const latest = newBatches[0];

  banner.innerHTML = `
    <div class="batch-banner">
      <div class="batch-banner-icon">🌿</div>
      <div class="batch-banner-text" style="flex:1">
        <h3>新しい投稿案が届いています</h3>
        <p>${newBatches.length}バッチ・合計${total}投稿（${latest.note}）</p>
        <button class="btn-load-batch" onclick="loadNewBatches()">レビューキューに追加する</button>
      </div>
    </div>`;
}

function loadNewBatches() {
  const newBatches = WEEKLY_BATCHES.filter(b => !loadedBatches.includes(b.batchId));
  let added = 0;
  newBatches.forEach(b => {
    b.posts.forEach(p => {
      if (!reviewQueue.find(r => r.id === p.id)) {
        reviewQueue.push({ ...p, batchId: b.batchId, addedAt: Date.now() });
        added++;
      }
    });
    loadedBatches.push(b.batchId);
  });
  localStorage.setItem('ci_batches', JSON.stringify(loadedBatches));
  save();
  document.getElementById('batch-banner-area').innerHTML = '';
  renderReview();
  showToast(`✅ ${added}投稿をレビューキューに追加しました`);
}

// ---- Tab ----
function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  btn.classList.add('active');
  currentTab = tab;
  if (tab === 'review')   renderReview();
  if (tab === 'stock')    renderStock();
  if (tab === 'history')  renderHistory();
  if (tab === 'generate') renderGenerateStats();
  if (tab === 'research') openResearchTab();
}

  // Sort newest first
  const sorted = [...historyList].sort((a,b) => (b.postedAt || 0) - (a.postedAt || 0));

    return `<div class="history-card">
      <div class="history-body">${nl(p.body)}</div>

// ---- Actions ----
function approvePost(id) {
  const i = reviewQueue.findIndex(p => p.id === id);
  if (i < 0) return;
  const p = { ...reviewQueue[i], addedAt: Date.now() };
  reviewQueue.splice(i, 1);
  stockList.unshift(p);
  save();
  animateOut('card-' + id, 'right', renderReview);
  showToast('✅ ストックに追加しました');
}

function skipPost(id) {
  const i = reviewQueue.findIndex(p => p.id === id);
  if (i < 0) return;
  reviewQueue.splice(i, 1);
  save();
  animateOut('card-' + id, 'left', renderReview);
  showToast('スキップしました');
}

function deleteStock(id) {
  stockList = stockList.filter(p => p.id !== id);
  save();
  renderStock();
  showToast('削除しました');
}

function markPosted(id) {
  const i = stockList.findIndex(p => p.id === id);
  if (i < 0) return;
  const p = { ...stockList[i], posted: true, postedAt: Date.now(), result: null };
  stockList.splice(i, 1);
  historyList.unshift(p);
  save();
  queueSync();
  renderStock();
  showToast('📮 投稿済みに移動しました');
}

function setResult(id, result) {
  const p = historyList.find(p => p.id === id);
  if (!p) return;
  p.result = result;
  save();
  queueSync();
  renderHistory();
  showToast(result === 'buzz' ? '🔥 バズった！記録しました' : result === 'ok' ? '👍 記録しました' : '💤 記録しました');
}

// ---- 結果同期（D1へ送信 → 週次生成が学習する） ----
const SYNC_URL = '/api/results';
const SYNC_KEY = 'ci-threads-sync-v1';
let syncTimer = null;
function queueSync() {
  localStorage.setItem('ci_sync_dirty', '1');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncResults, 1500);
}
async function syncResults() {
  if (historyList.length === 0) { localStorage.removeItem('ci_sync_dirty'); return; }
  const posts = historyList.map(p => ({
    id: p.id,
    batchId: p.batchId || null,
    pattern: p.pattern || null,
    theme: p.theme || null,
    tag: p.tag || null,
    body: p.body || null,
    cta: !!p.cta,
    postedAt: p.postedAt || null,
    result: p.result || null
  }));
  try {
    const res = await fetch(SYNC_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-sync-key': SYNC_KEY },
      body: JSON.stringify({ posts })
    });
    if (res.ok) localStorage.removeItem('ci_sync_dirty');
  } catch { /* オフライン等。dirtyフラグが残り、次回ロード時に再送される */ }
}

function copyPost(id, type) {
  const p = stockList.find(p => p.id === id);
  if (!p) return;
  const text = type === 'reply' ? p.reply : p.body;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove();
    flashCopy(id, type);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => flashCopy(id, type)).catch(fallback);
  } else fallback();
}

function flashCopy(id, type) {
  if (type === 'body') {
    const btn = document.getElementById('cp-' + id);
    if (btn) {
      btn.textContent = 'コピー済！'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    }
  }
  showToast(type === 'reply' ? '追いリプをコピーしました' : '投稿本文をコピーしました');
}

// ---- Utils ----
function save() {
  localStorage.setItem('ci_review',  JSON.stringify(reviewQueue));
  localStorage.setItem('ci_stock',   JSON.stringify(stockList));

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nl(s) { return esc(s).replace(/\n/g,'<br>'); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function animateOut(id, dir, cb) {
  const el = document.getElementById(id);
  if (!el) { cb(); return; }
  el.style.transition = 'transform 0.28s ease, opacity 0.28s ease';
  el.style.transform = `translateX(${dir === 'right' ? 70 : -70}px)`;
  el.style.opacity = '0';
  setTimeout(cb, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ---- id生成（URLがあれば正規化ハッシュ、なければ本文先頭50字のハッシュ）----
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h.toString(36);
}
function normalizeUrl(u) {
  return u.trim().replace(/^https?:\/\//, '').replace(/\/+$/, '').split('?')[0].split('#')[0];
}
function makeBuzzId(url, body) {
  const src = (url && url.trim()) ? normalizeUrl(url) : (body || '').slice(0, 50);
  return 'bz-' + hashStr(src);
}

// ---- クイック収集フォーム ----
function saveBuzzPost() {
  const body = document.getElementById('bz-body').value.trim();
  if (!body) { showToast('本文を入力してください'); return; }
  const url    = document.getElementById('bz-url').value.trim();
  const author = document.getElementById('bz-author').value.trim().replace(/^@/, '');
  const tag    = document.getElementById('bz-tag').value;
  const hookType = document.getElementById('bz-hook').value;
  const whyBuzz  = document.getElementById('bz-why').value.trim();
  const likes   = parseInt(document.getElementById('bz-likes').value, 10);
  const replies = parseInt(document.getElementById('bz-replies').value, 10);
  const reposts = parseInt(document.getElementById('bz-reposts').value, 10);

  const id  = makeBuzzId(url, body);
  const now = Date.now();
  const entry = {
    id, url: url || null, author: author || null, tag, body,
    likes:   Number.isFinite(likes)   ? likes   : null,
    replies: Number.isFinite(replies) ? replies : null,
    reposts: Number.isFinite(reposts) ? reposts : null,
    hookType, pattern: null, whyBuzz: whyBuzz || null,
    source: 'manual', collectedAt: now, updatedAt: now
  };

  const i = buzzLibrary.findIndex(p => p.id === id);
  if (i >= 0) buzzLibrary[i] = { ...buzzLibrary[i], ...entry, collectedAt: buzzLibrary[i].collectedAt || now };
  else buzzLibrary.unshift(entry);

  if (!buzzPending.includes(id)) buzzPending.push(id);
  saveBuzzLocal();
  clearBuzzForm();
  renderBuzzList();
  renderBuzzDashboard();

  syncBuzzPending().then(ok => {
    showToast(ok ? '✅ ライブラリに保存しました' : '📥 ローカルに保存しました（後で自動的に再送します）');
  });
}

function clearBuzzForm() {
  ['bz-url', 'bz-body', 'bz-author', 'bz-likes', 'bz-replies', 'bz-reposts', 'bz-why'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('bz-tag').value  = '国産';
  document.getElementById('bz-hook').value = '意外性';
}

// ---- 未同期キューの再送 ----
async function syncBuzzPending() {
  if (buzzPending.length === 0) return true;
  const posts = buzzPending.map(id => buzzLibrary.find(p => p.id === id)).filter(Boolean);
  if (posts.length === 0) { buzzPending = []; saveBuzzLocal(); return true; }
  try {
    const res = await fetch(BUZZ_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-sync-key': SYNC_KEY },
      body: JSON.stringify({ posts })
    });
    if (res.ok) {
      buzzPending = [];
      saveBuzzLocal();
      return true;
    }
  } catch { /* オフライン等。次回タブオープン／オンライン復帰時に再送 */ }
  return false;
}

// ---- サーバーから取得してローカルキャッシュとマージ（id重複はサーバー優先）----
async function fetchBuzzLibrary() {
  try {
    const res = await fetch(BUZZ_URL);
    if (!res.ok) return;
    const data = await res.json();
    const serverPosts = Array.isArray(data.posts) ? data.posts : [];
    const serverMap = new Map(serverPosts.map(p => [p.id, {
      id: p.id, url: p.url, author: p.author, tag: p.tag, body: p.body,
      likes: p.likes, replies: p.replies, reposts: p.reposts,
      hookType: p.hook_type, pattern: p.pattern, whyBuzz: p.why_buzz,
      source: p.source, collectedAt: p.collected_at, updatedAt: p.updated_at
    }]));
    const merged = [...serverMap.values()];
    buzzLibrary.forEach(local => { if (!serverMap.has(local.id)) merged.push(local); });
    buzzLibrary = merged;
    saveBuzzLocal();
    renderBuzzList();
    renderBuzzDashboard();
  } catch { /* オフライン等。ローカルキャッシュの表示を維持 */ }
}

function openResearchTab() {
  renderBuzzList();
  renderBuzzDashboard();
  syncBuzzPending().then(() => fetchBuzzLibrary());
}

// ---- Render: タグ絞り込みチップ ----
function renderBuzzTagFilter() {
  const el = document.getElementById('buzz-tag-filter');
  const tags = ['all', ...BUZZ_TAGS];
  el.innerHTML = tags.map(t => {
    const label = t === 'all' ? 'すべて' : t;
    return `<button class="chip-filter ${buzzTagFilter === t ? 'active' : ''}" onclick="setBuzzTagFilter('${t}')">${esc(label)}</button>`;
  }).join('');
}
function setBuzzTagFilter(t) {
  buzzTagFilter = t;
  renderBuzzList();
}

function buzzNeedsClamp(body) {
  return body.length > 160 || body.split('\n').length > 8;
}

// ---- Render: ライブラリ一覧 ----
function renderBuzzList() {
  renderBuzzTagFilter();
  const el = document.getElementById('buzz-list');
  const sh = document.getElementById('buzz-section-header');
  let list = [...buzzLibrary];
  if (buzzTagFilter !== 'all') list = list.filter(p => p.tag === buzzTagFilter);
  list.sort((a, b) => (b.likes || 0) - (a.likes || 0));

  if (list.length === 0) {
    sh.textContent = 'ライブラリ';
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <p>まだ収集した投稿がありません<br>上のフォームからバズ投稿を登録してください</p>
    </div>`;
    return;
  }
  sh.textContent = `ライブラリ ${list.length}件（いいね数順）`;
  el.innerHTML = list.map(p => {
    const clampNeeded = buzzNeedsClamp(p.body || '');
    const expanded = !!buzzExpanded[p.id];
    return `
    <div class="buzz-card" id="bz-card-${p.id}">
      <div class="buzz-meta">
        ${p.tag ? `<span class="chip">#${esc(p.tag)}</span>` : ''}
        ${p.hookType ? `<span class="chip chip-confidence">${esc(p.hookType)}</span>` : ''}
        ${p.author ? `<span style="font-size:12px;color:var(--muted);margin-left:auto;">@${esc(p.author)}</span>` : ''}
      </div>
      <div class="buzz-body ${(clampNeeded && !expanded) ? 'clamp' : ''}">${nl(p.body)}</div>
      ${clampNeeded ? `<div class="buzz-expand" onclick="toggleBuzzExpand('${p.id}')">${expanded ? '折りたたむ ▲' : 'もっと見る ▼'}</div>` : ''}
      <div class="buzz-stats">
        <span>❤️ ${p.likes ?? '-'}</span>
        <span>💬 ${p.replies ?? '-'}</span>
        <span>🔁 ${p.reposts ?? '-'}</span>
      </div>
      ${p.whyBuzz ? `<div class="buzz-why">💡 ${esc(p.whyBuzz)}</div>` : ''}
      <div class="buzz-actions">
        <button class="btn-sm btn-copy-main" id="bzcp-${p.id}" onclick="copyBuzzPattern('${p.id}')">🧬 型をコピー</button>
        ${p.url ? `<a href="${esc(p.url)}" target="_blank" rel="noopener" class="btn-sm btn-copy-reply buzz-link">開く</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleBuzzExpand(id) {
  buzzExpanded[id] = !buzzExpanded[id];
  renderBuzzList();
}

function copyBuzzPattern(id) {
  const p = buzzLibrary.find(p => p.id === id);
  if (!p) return;
  const text = `【参考バズ投稿】フック型:${p.hookType || '不明'} / タグ:${p.tag || '不明'} / ❤️${p.likes ?? 0}\n本文:${p.body}\nなぜバズった:${p.whyBuzz || '不明'}\nこの型でクリスタルインセンス（国産お香）の投稿を作って`;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove();
    flashBuzzCopy(id);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => flashBuzzCopy(id)).catch(fallback);
  } else fallback();
}

function flashBuzzCopy(id) {
  const btn = document.getElementById('bzcp-' + id);
  if (btn) {
    btn.textContent = 'コピー済！'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '🧬 型をコピー'; btn.classList.remove('copied'); }, 2000);
  }
  showToast('型をコピーしました');
}

// ---- Render: 傾向ダッシュボード ----
function renderBuzzDashboard() {
  renderBuzzDashboardLib();
  renderBuzzDashboardOwn();
}

function renderBuzzDashboardLib() {
  const el = document.getElementById('buzz-dashboard-lib');
  if (buzzLibrary.length === 0) {
    el.innerHTML = `<div class="dash-empty">まだライブラリにデータがありません</div>`;
    return;
  }
  // タグ別 件数・平均いいね
  const tagStats = {};
  buzzLibrary.forEach(p => {
    const t = p.tag || 'その他';
    if (!tagStats[t]) tagStats[t] = { n: 0, likesSum: 0 };
    tagStats[t].n++;
    tagStats[t].likesSum += (p.likes || 0);
  });
  const maxTagN = Math.max(...Object.values(tagStats).map(s => s.n));
  const tagRows = Object.entries(tagStats)
    .sort((a, b) => b[1].n - a[1].n)
    .map(([t, s]) => {
      const avg = Math.round(s.likesSum / s.n);
      const pct = Math.round(s.n / maxTagN * 100);
      return `<div class="dash-row">
        <div class="dash-row-label"><span>#${esc(t)}（${s.n}件）</span><span>平均❤️${avg}</span></div>
        <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

  // フック型の分布
  const hookStats = {};
  buzzLibrary.forEach(p => {
    const h = p.hookType || '不明';
    hookStats[h] = (hookStats[h] || 0) + 1;
  });
  const maxHook = Math.max(...Object.values(hookStats));
  const hookRows = Object.entries(hookStats)
    .sort((a, b) => b[1] - a[1])
    .map(([h, n]) => {
      const pct = Math.round(n / maxHook * 100);
      return `<div class="dash-row">
        <div class="dash-row-label"><span>${esc(h)}</span><span>${n}件</span></div>
        <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%;background:var(--accent);"></div></div>
      </div>`;
    }).join('');

  el.innerHTML = `
    <div class="dash-subhead">タグ別（件数・平均いいね）</div>
    ${tagRows}
    <div class="dash-subhead">フック型の分布</div>
    ${hookRows}`;
}

function renderBuzzDashboardOwn() {
  const el = document.getElementById('buzz-dashboard-own');
  const labeled = historyList.filter(p => ['buzz', 'ok', 'miss'].includes(p.result));
  if (labeled.length < 3) {
    el.innerHTML = `<div class="dash-empty">結果を記録すると自社傾向が育ちます（現在${labeled.length}件）</div>`;
    return;
  }
  const stats = {};
  labeled.forEach(p => {
    const pt = p.pattern || '不明';
    if (!stats[pt]) stats[pt] = { buzz: 0, n: 0 };
    stats[pt].n++;
    if (p.result === 'buzz') stats[pt].buzz++;
  });
  const rows = Object.entries(stats)
    .filter(([, s]) => s.n >= 2)
    .sort((a, b) => (b[1].buzz / b[1].n) - (a[1].buzz / a[1].n))
    .map(([pt, s]) => {
      const rate = Math.round(s.buzz / s.n * 100);
      return `<div class="dash-row">
        <div class="dash-row-label"><span>${esc(pt)}</span><span>バズ率${rate}%（${s.n}件）</span></div>
        <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${rate}%"></div></div>
      </div>`;
    }).join('');
  el.innerHTML = rows || `<div class="dash-empty">2件以上記録があるパターンがまだありません</div>`;
}
